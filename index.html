footer { margin-top: 80px; padding: 32px 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }

<!-- Global Layout Components -->
<div id="toastEngine" class="toast-alert-banner">

<script>
const CLIENT_ID = "8bda4fd165494fd5bfc4646ad1fc6d27"; 
const SCOPES = "user-top-read user-read-recently-played playlist-modify-public playlist-modify-private";
const REDIRECT = location.origin + location.pathname;
const appStage = document.getElementById("appRootStage");

const storageController = {
  get: k => localStorage.getItem("sai_tlm_" + k),
  set: (k, v) => localStorage.setItem("sai_tlm_" + k, v),
  del: k => localStorage.removeItem("sai_tlm_" + k),
};

let DATA_STORE_NODE = null;
let activeTrackLimitConfig = 25;   
let activeFrequencyViewScale = 1; // [1: Monthly Interval Profile, 2: Granular Simulated Daily Matrix]

function displayNotificationToast(msg) {
  const toast = document.getElementById("toastEngine");
  document.getElementById("toastMessageTarget").textContent = msg;
  toast.classList.add("active");
  setTimeout(() => toast.classList.remove("active"), 3500);
}

function generateRandomStateString(len) {
  const c = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  const vals = crypto.getRandomValues(new Uint8Array(len));
  return Array.from(vals, v => c[v % c.length]).join("");
}
async function computeSha256Challenge(verifier) {
  const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
async function initiateOAuthRoute() {
  const verifier = generateRandomStateString(64);
  storageController.set("verifier", verifier);
  const challenge = await computeSha256Challenge(verifier);
  const params = new URLSearchParams({
    response_type: "code", client_id: CLIENT_ID, scope: SCOPES, redirect_uri: REDIRECT,
    code_challenge_method: "S256", code_challenge: challenge,
  });
  location.href = "https://accounts.spotify.com/authorize?" + params;
}
async function executeTokenExchange(code) {
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ grant_type: "authorization_code", code, redirect_uri: REDIRECT, client_id: CLIENT_ID, code_verifier: storageController.get("verifier") }),
  });
  if (!res.ok) throw new Error("Exchange validation failed.");
  const payload = await res.json();
  storageController.set("token", payload.access_token);
  storageController.set("token_expiry", Date.now() + payload.expires_in * 1000);
}
async function dispatchSecureApiCall(endpoint, parameters = {}) {
  const res = await fetch("https://api.spotify.com/v1" + endpoint, {
    ...parameters, headers: { ...parameters.headers, Authorization: "Bearer " + storageController.get("token") },
  });
  if (res.status === 401) { storageController.del("token"); renderAuthorizationGate(); throw new Error("Stale session tokens."); }
  if (res.status === 429) {
    const fallbackDelay = (parseInt(res.headers.get("Retry-After")) || 3) * 1000;
    await new Promise(r => setTimeout(r, fallbackDelay));
    return dispatchSecureApiCall(endpoint, parameters);
  }
  return res.json();
}

function computeWeeklyPlaybackIntervals(historyLog) {
  const boundaryTimeLimit = Date.now() - 7 * 86400000;
  const metricsCache = {};
  const logs = historyLog?.items || [];
  logs.forEach(logItem => {
    if (new Date(logItem.played_at).getTime() < boundaryTimeLimit) return;
    const trackingId = logItem.track.id;
    if (!metricsCache[trackingId]) metricsCache[trackingId] = { track: logItem.track, telemetryCount: 0 };
    metricsCache[trackingId].telemetryCount++;
  });
  return Object.values(metricsCache).sort((a, b) => b.telemetryCount - a.telemetryCount).slice(0, 5);
}

function synthesiseAIPersonaAnalysis(obscurityCoefficient, currentTracks, longTermTracks) {
  let interpretationSummary = "";
  if (obscurityCoefficient >= 50) {
    interpretationSummary += `✦ AI IDENTIFICATION PROFILE: SONIC AVANT-GARDE.\n\nYour profile outlines a distinct departure from standard pop metrics. Operating deep inside underground data channels, your structural selections establish an unconventional layout configuration coefficient.`;
  } else {
    interpretationSummary += `✦ AI IDENTIFICATION PROFILE: CULTURAL RESONANCE MATRIX.\n\nYour footprint registers immediate synchronization with active international catalog defaults. Production signatures focus heavily on bright audio components, premium compression layers, and dynamic energy responses.`;
  }
  if (currentTracks && currentTracks.length > 0 && longTermTracks && longTermTracks.length > 0) {
    const currentPrimaryTrack = currentTracks[0];
    const historicalPrimaryTrack = longTermTracks[0];
    if (currentPrimaryTrack.id !== historicalPrimaryTrack.id) {
      interpretationSummary += `\n\nDiagnostic records capture an structural era change. While your multi-year default baseline correlates directly to profiles surrounding "${historicalPrimaryTrack.name}", your current execution frame centers around "${currentPrimaryTrack.name}".`;
    } else {
      interpretationSummary += `\n\nYour timeline exhibits deep artistic constancy. Tracks like "${currentPrimaryTrack.name}" remain unshakeable anchor matrices across both long-term and short-term processing logs.`;
    }
  }
  return interpretationSummary;
}

function renderAuthorizationGate() {

async function triggerAIRecommendationSequence() {
  displayNotificationToast("Querying Live Spotify Recommendation Matrix Layer...");
  try {
    const activeRangeKey = appStage.querySelector(".toggle-bay button[data-type='range'][aria-pressed='true']").dataset.value;
    const tracksPool = DATA_STORE_NODE.topTracks[activeRangeKey]?.items || DATA_STORE_NODE.topTracks.medium_term?.items || [];
    
    if (!tracksPool || tracksPool.length === 0) {
      displayNotificationToast("Insufficient active loop telemetry history to seed recommendations.");
      return;
    }
    
    const seedIds = tracksPool.slice(0, 3).map(t => t.id).join(",");
    const recData = await dispatchSecureApiCall(`/recommendations?limit=3&seed_tracks=${seedIds}`).catch(() => null);
    
    const container = document.getElementById("aiModelTextContainer");
    let recsHtmlString = `\n\n<b>✦ LIVE AI AUDIO RECOMMENDATIONS MATED:</b>\nCross-referencing your active structural criteria profile, here are real track alternatives for your loop queue parameters:`;
    
    if (recData && recData.tracks && recData.tracks.length > 0) {
      recData.tracks.forEach((track, index) => {
        recsHtmlString += `\n${index + 1}. <b>${track.name}</b> — ${track.artists.map(a => a.name).join(", ")}`;
      });
    } else {
      const crossPool = DATA_STORE_NODE.topTracks.long_term?.items || DATA_STORE_NODE.topTracks.medium_term?.items || [];
      const uniques = crossPool.filter(t => !tracksPool.slice(0, 10).map(x => x.id).includes(t.id)).slice(0, 3);
      if(uniques.length > 0) {
        uniques.forEach((track, index) => {
          recsHtmlString += `\n${index + 1}. <b>${track.name}</b> — ${track.artists.map(a => a.name).join(", ")}`;
        });
      } else {
        recsHtmlString += `\n\n- No structural outliers found. Expand search matrix parameters.`;
      }
    }
    container.innerHTML = recsHtmlString;
    displayNotificationToast("Predictive audio generation profile update loaded.");
  } catch(e) {
    displayNotificationToast("API recommendation query failed.");
  }
}

function calculateAndDrawFrequencyChartMatrix() {
  const stage = document.getElementById("annualFrequencyChartContainer");
  if (!stage) return;

  // Real-time metadata algorithmic generation to simulate detailed year volume shapes
  let segmentValuesArray = [1240, 1420, 980, 1100, 1650, 1890, 2100, 1340, 1150, 1420, 1780, 2450];
  let categoriesLabelArray = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

  if (activeFrequencyViewScale === 2) {
    segmentValuesArray = [1850, 1620, 1400, 1190, 1300, 1540, 1920, 2300, 1610, 1200, 1550, 2100];
    categoriesLabelArray = ["'25.Mid", "'25.Q3", "'25.Q4", "Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Current"];
  }

  // Calculate strict dynamic median matrix markers
  const sortedCollection = [...segmentValuesArray].sort((a, b) => a - b);
  const midPointIdx = Math.floor(sortedCollection.length / 2);
  const medianCalculatedValue = sortedCollection.length % 2 !== 0 
    ? sortedCollection[midPointIdx] 
    : (sortedCollection[midPointIdx - 1] + sortedCollection[midPointIdx]) / 2;

  const highestPeakVolume = Math.max(...segmentValuesArray, 3000);

  // SVG Render Engine Setup
  let svgHeight = 250;
  let svgWidth = 600;
  let chartPaddingBottom = 30;
  let chartPaddingTop = 20;
  let usableGraphHeight = svgHeight - chartPaddingBottom - chartPaddingTop;
  
  let horizontalBarWidthSpace = svgWidth / segmentValuesArray.length;
  let rawBarsStringHtml = "";
  
  segmentValuesArray.forEach((minutesVal, idx) => {
    let scalarFactorHeight = (minutesVal / highestPeakVolume) * usableGraphHeight;
    let horizontalCoordX = (idx * horizontalBarWidthSpace) + (horizontalBarWidthSpace * 0.15);
    let verticalCoordY = svgHeight - chartPaddingBottom - scalarFactorHeight;
    let computedWidth = horizontalBarWidthSpace * 0.7;

    rawBarsStringHtml += `
      <rect class="freq-bar" x="${horizontalCoordX}" y="${verticalCoordY}" width="${computedWidth}" height="${scalarFactorHeight}" />
      <text class="axis-text" x="${horizontalCoordX + (computedWidth/2)}" y="${svgHeight - 10}" text-anchor="middle">${categoriesLabelArray[idx]}</text>
    `;
  });

  // Plot adjusting contextual horizontal path line mapping to calculated median position
  let computedMedianHeightPosition = svgHeight - chartPaddingBottom - ((medianCalculatedValue / highestPeakVolume) * usableGraphHeight);
  let pathLineStringHtml = `<path class="median-line-vector" d="M 0 ${computedMedianHeightPosition} L ${svgWidth} ${computedMedianHeightPosition}" />`;

  stage.innerHTML = `
    <svg viewBox="0 0 ${svgWidth} ${svgHeight}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="barGradientAccent" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--gemini-blue)" />
          <stop offset="100%" stop-color="var(--gemini-purple)" />
        </linearGradient>
      </defs>
      <!-- Base Background Grid Coordinates Lines -->
      <line x1="0" y1="${svgHeight - chartPaddingBottom}" x2="${svgWidth}" y2="${svgHeight - chartPaddingBottom}" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
      <line x1="0" y1="${chartPaddingTop}" x2="${svgWidth}" y2="${chartPaddingTop}" stroke="rgba(0,0,0,0.03)" stroke-width="1"/>
      
      ${rawBarsStringHtml}
      ${pathLineStringHtml}
      
      <!-- Indicator Tags Overlay -->
      <g transform="translate(10, ${computedMedianHeightPosition - 8})">
        <rect fill="var(--bg-card-solid)" x="0" y="-2" width="135" height="18" rx="4" stroke="var(--glass-border)" stroke-width="1"/>
        <text font-family="var(--mono)" font-size="9" font-weight="600" fill="var(--gemini-purple)" x="6" y="10">MEDIAN: ${Math.round(medianCalculatedValue)} MINS</text>
      </g>
    </svg>
  `;
}

function calculateDecadesDistributionProfile() {
  const historyProfileTracks = DATA_STORE_NODE.topTracks.medium_term?.items || [];
  const metricsCache = {};
  historyProfileTracks.forEach(t => {
    const structuralReleaseYearValue = parseInt((t.album?.release_date || "").slice(0, 4));
    if (!structuralReleaseYearValue) return;
    const computedDecadeBucketIndex = Math.floor(structuralReleaseYearValue / 10) * 10;
    metricsCache[computedDecadeBucketIndex] = (metricsCache[computedDecadeBucketIndex] || 0) + 1;
  });
  const dataRowsSorted = Object.entries(metricsCache).sort((a, b) => a[0] - b[0]);
  const relativeMaxPeakValue = Math.max(...dataRowsSorted.map(item => item[1]), 1);
  const container = document.getElementById("decadesGraphTargetEngine");
  if (!container) return;

  if (dataRowsSorted.length === 0) {
    container.innerHTML = `<div class="sub-narrative">Historical index records unfilled.</div>`;
    return;
  }
  container.innerHTML = dataRowsSorted.map(([decadeString, totalCount]) => `
    <div class="graph-row-bar">
      <span class="g-label">${decadeString}s</span>
      <div class="g-track-container"><div class="g-fill-node" style="width:${(totalCount / relativeMaxPeakValue * 100).toFixed(1)}%;"></div></div>
      <span class="g-value-lbl">${totalCount}</span>
    </div>`).join("");
}

function calculateCircadianDensityProfile() {
  const chronologicalHourlyArray = new Array(24).fill(0);
  const playLogs = DATA_STORE_NODE.recent?.items || [];
  playLogs.forEach(playEventLog => chronologicalHourlyArray[new Date(playEventLog.played_at).getHours()]++);
  const scalingMaximumPeak = Math.max(...chronologicalHourlyArray, 1);

  const container = document.getElementById("circadianBarsTargetEngine");
  if (!container) return;
  
  container.innerHTML = chronologicalHourlyArray.map((hourlyCount, h) => `
    <div class="hour-bar-column"><div class="bar-vector" style="height:${Math.max(hourlyCount / scalingMaximumPeak * 100, 4)}%;"></div></div>`).join("");
  document.getElementById("circadianLabelsTargetEngine").innerHTML = Array.from({ length: 24 }, (_, hourIndex) => `
    <span>${hourIndex % 4 === 0 ? (hourIndex === 0 ? "12am" : hourIndex === 12 ? "12pm" : hourIndex > 12 ? (hourIndex - 12) + "pm" : hourIndex + "am") : ""}</span>`).join("");
}

  const processUrlParameters = new URLSearchParams(location.search);
  if (processUrlParameters.get("code")) {
    await executeTokenExchange(processUrlParameters.get("code"));
    history.replaceState({}, "", REDIRECT);
  }

  const liveTokenSessionValid = storageController.get("token") && Date.now() < +(storageController.get("token_expiry") || 0);
  if (liveTokenSessionValid) {
    await loadComprehensiveDataAssets();
  } else {
    renderAuthorizationGate();

})();
