<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify.AI // Corporate Telemetry & Matrix Diagnostics</title>

<style>
:root {
  --bg-base: #ECEFF4;
  --bg-card: rgba(255, 255, 255, 0.85);
  --bg-card-solid: #FFFFFF;
  --glass-border: rgba(0, 0, 0, 0.06);
  --glass-inner-glow: rgba(255, 255, 255, 0.9);
  --spotify-green: #1DB954; 
  --chart-line: #1473E6;
  --gemini-purple: #7A5CFF;
  --text-main: #11141A;
  --text-muted: #4B5262; 
  --text-light: #7E8696;
  --mono: 'IBM Plex Mono', monospace;
  --disp: 'Archivo', sans-serif;
  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 8px;
  --transition-smooth: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
}

/* --- Base Dashboard Styles --- */
* { margin: 0; padding: 0; box-sizing: border-box; letter-spacing: -0.01em; }
html { scroll-behavior: smooth; font-size: 16px; background-color: var(--bg-base); }
body {
  color: var(--text-main);
  font-family: var(--disp);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  min-height: 100vh;
  background: var(--bg-base);
  /* Premium Dashboard Multi-Layer Gradient Structure */
  background-image: 
    radial-gradient(circle at 0% 0%, rgba(21, 99, 255, 0.12) 0%, transparent 45%),
    radial-gradient(circle at 100% 0%, rgba(235, 18, 18, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 100% 100%, rgba(17, 180, 74, 0.12) 0%, transparent 40%),
    radial-gradient(circle at 0% 100%, rgba(233, 208, 44, 0.1) 0%, transparent 50%);
  background-attachment: fixed;
}
.wrap { max-width: 1400px; margin: 0 auto; padding: 40px 24px 120px; position: relative; z-index: 2; }

/* --- Professional Arm Minimal Glass Shell --- */
.glass {
  background: var(--bg-card);
  backdrop-filter: blur(30px) saturate(190%);
  -webkit-backdrop-filter: blur(30px) saturate(190%);
  border: 1px solid var(--glass-border);
  box-shadow: 
    inset 0 1px 0 var(--glass-inner-glow),
    0 4px 20px rgba(160, 175, 195, 0.15),
    0 15px 45px rgba(30, 40, 55, 0.04);
  border-radius: var(--radius-lg);
  transition: var(--transition-smooth);
}
.glass:hover {
  box-shadow: 0 20px 50px rgba(30, 40, 55, 0.07);
}

/* --- Navigation & Control Banner --- */
.top-nav-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 32px;
  background: #11141A;
  color: #FFF;
  border-radius: var(--radius-md);
  margin-bottom: 32px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}
.top-nav-bar .nav-brand { font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
.top-nav-bar .nav-brand span { color: var(--spotify-green); }
.top-nav-bar .user-badge { font-family: var(--mono); font-size: 11px; background: rgba(255,255,255,0.08); padding: 5px 14px; border-radius: 30px; color: var(--text-light); }

/* --- Architecture Grid Configurations --- */
.main-layout-grid { display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 32px; align-items: start; }
@media(max-width: 1150px) { .main-layout-grid { grid-template-columns: 1fr; } }

.widget-stack { display: flex; flex-direction: column; gap: 32px; }
.widget-pane { padding: 36px; display: flex; flex-direction: column; gap: 24px; position: relative; overflow: hidden; }

/* --- Global Typographic Scales --- */
.eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; color: var(--text-light); text-transform: uppercase; display: flex; align-items: center; gap: 12px; font-weight: 600; }
.eyebrow::after { content: ""; flex: 1; height: 1px; background: rgba(0, 0, 0, 0.04); }
.widget-title-area { margin-top: -6px; }
h2 { font-size: 24px; font-weight: 700; color: var(--text-main); letter-spacing: -0.02em; }
.sub-narrative { font-size: 13.5px; color: var(--text-muted); margin-top: 3px; line-height: 1.5; max-width: 65ch; }

/* --- Premium Line Area Vector Analytics Graph --- */
.frequency-chart-stage { width: 100%; min-height: 250px; margin-top: 10px; position: relative; background: #FFFFFF; border: 1px solid rgba(0,0,0,0.04); border-radius: var(--radius-md); padding: 24px; }
.frequency-chart-stage svg { width: 100%; height: 210px; display: block; overflow: visible; }
.freq-area-path { fill: url(#chartAreaGradient); transition: var(--transition-smooth); }
.freq-line-path { fill: none; stroke: var(--chart-line); stroke-width: 3; stroke-linecap: round; }
.freq-node-dot { fill: #FFFFFF; stroke: var(--chart-line); stroke-width: 3; cursor: pointer; transition: var(--transition-smooth); }
.freq-node-dot:hover { fill: var(--spotify-green); stroke: var(--spotify-green); r: 7; }
.median-line-vector { stroke: var(--text-light); stroke-width: 1.5; stroke-dasharray: 4 4; fill: none; opacity: 0.7; }
.axis-text { font-family: var(--mono); font-size: 10px; fill: var(--text-light); font-weight: 500; }
.chart-hover-toast { position: absolute; background: #11141A; color: #FFF; padding: 6px 12px; border-radius: 8px; font-family: var(--mono); font-size: 11px; pointer-events: none; opacity: 0; transition: opacity 0.2s, transform 0.2s; z-index: 10; box-shadow: 0 6px 15px rgba(0,0,0,0.1); }

/* --- Music Telemetry Spreadsheets (Collapsible Framework) --- */
.control-filter-cluster { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; width: 100%; border-bottom: 1px solid rgba(0,0,0,0.04); padding-bottom: 16px; }
.toggle-bay { display: inline-flex; background: rgba(0, 0, 0, 0.04); padding: 3px; border-radius: 12px; }
.toggleBayBtn { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 6px 14px; border: 0; background: transparent; color: var(--text-muted); border-radius: 9px; transition: var(--transition-smooth); cursor: pointer; text-transform: lowercase; }
.toggleBayBtn[aria-pressed="true"] { background: #FFFFFF; color: var(--text-main); box-shadow: 0 2px 6px rgba(0,0,0,0.04); }

/* Collapsible Section Container Wrapper */
.accordion-wrapper { border: 1px solid rgba(0,0,0,0.04); border-radius: var(--radius-md); overflow: hidden; background: rgba(0,0,0,0.01); width: 100%; transition: var(--transition-smooth); }
.accordion-trigger { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 14px 20px; background: rgba(255,255,255,0.7); border: none; font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text-main); cursor: pointer; }
.accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
.accordion-wrapper.expanded .accordion-content { max-height: 620px; overflow-y: auto; }
.accordion-chevron { transition: transform 0.3s; font-size: 12px; }
.accordion-wrapper.expanded .accordion-chevron { transform: rotate(180deg); }

.music-table-view { display: flex; flex-direction: column; gap: 1px; padding: 4px; }
.music-telemetry-row { display: grid; grid-template-columns: 36px 44px 1fr auto; gap: 16px; align-items: center; padding: 10px 12px; border-bottom: 1px solid rgba(0, 0, 0, 0.02); border-radius: var(--radius-sm); }
.music-telemetry-row:hover { background: #FFFFFF; }
.row-rank-index { font-family: var(--mono); font-size: 12px; color: var(--text-light); text-align: center; }
.row-artwork-frame { width: 44px; height: 44px; border-radius: 6px; overflow: hidden; background: rgba(0,0,0,0.02); }
.row-artwork-frame img { width: 100%; height: 100%; object-fit: cover; }
.row-data-payload { display: flex; flex-direction: column; min-width: 0; }
.track-title-string { font-weight: 600; font-size: 14px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-artist-string { font-size: 12.5px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.row-metric-tag { font-family: var(--mono); font-size: 11px; color: var(--text-light); background: rgba(0,0,0,0.03); padding: 2px 6px; border-radius: 4px; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px; }
@media(max-width: 880px){ .two-col { grid-template-columns: 1fr; } }

/* --- Top Artist Web Bubble Cluster Architecture --- */
.artists-web-container { display: flex; flex-wrap: wrap; gap: 10px; padding: 6px 0; width: 100%; }
.artist-bubble-node { display: inline-flex; align-items: center; gap: 10px; padding: 6px 14px; background: #FFFFFF; border: 1px solid rgba(0,0,0,0.04); border-radius: 30px; box-shadow: 0 2px 6px rgba(0,0,0,0.01); transition: var(--transition-smooth); }
.artist-bubble-node:hover { border-color: var(--chart-line); transform: translateY(-1px); }
.artist-bubble-node img { width: 24px; height: 28px; border-radius: 50%; object-fit: cover; }
.artist-bubble-node .a-name { font-size: 13px; font-weight: 600; color: var(--text-main); text-transform: lowercase; }
.artist-bubble-node .a-mins { font-family: var(--mono); font-size: 10px; color: var(--chart-line); font-weight: 600; background: rgba(20,115,230,0.05); padding: 1px 6px; border-radius: 20px; }

/* --- Shippulse Restored Tiled Ledger Panels --- */
.telemetry-cards-matrix { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; width: 100%; }
.telemetry-node { padding: 24px; display: flex; flex-direction: column; gap: 12px; border-radius: var(--radius-md); background: #FFFFFF; border: 1px solid rgba(0,0,0,0.04); position: relative; }
.telemetry-node .t-eyebrow { font-family: var(--mono); font-size: 10px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.04em; }
.telemetry-node .t-value { font-size: 32px; font-weight: 700; color: var(--text-main); line-height: 1; letter-spacing: -0.03em; }
.telemetry-node .t-value small { font-size: 13px; color: var(--text-light); margin-left: 1px; }
.telemetry-node .t-desc { font-size: 12.5px; color: var(--text-muted); line-height: 1.4; }
.variance-pill { position: absolute; top: 22px; right: 24px; font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: rgba(29,185,84,0.08); color: var(--spotify-green); }

/* --- Chronological Era Donut Framework --- */
.era-chamber { display: grid; grid-template-columns: 0.95fr 1.05fr; gap: 32px; align-items: center; width: 100%; }
@media(max-width: 600px) { .era-chamber { grid-template-columns: 1fr; } }
.donut-stage { display: flex; justify-content: center; align-items: center; position: relative; width: 100%; }
.donut-center-lbl { position: absolute; font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text-light); text-transform: uppercase; text-align: center; line-height: 1.3; pointer-events: none; }
.era-legend-list { display: flex; flex-direction: column; gap: 12px; width: 100%; }
.era-legend-item { display: flex; align-items: center; gap: 10px; font-size: 13.5px; padding: 10px 14px; background: #FFFFFF; border: 1px solid rgba(0,0,0,0.03); border-radius: var(--radius-sm); }
.era-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.era-val { font-family: var(--mono); font-size: 11px; color: var(--text-light); margin-left: auto; font-weight: 600; }

/* --- Adjustable Weekday Matrix Framework --- */
.day-selector-strip { display: flex; gap: 6px; flex-wrap: wrap; background: rgba(0,0,0,0.04); padding: 4px; border-radius: 12px; width: fit-content; }
.day-btn { background: transparent; border: none; font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 6px 14px; border-radius: 9px; color: var(--text-muted); cursor: pointer; transition: var(--transition-smooth); }
.day-btn.active { background: #FFFFFF; color: var(--text-main); box-shadow: 0 2px 6px rgba(0,0,0,0.03); }
.density-bars-container { display: flex; align-items: flex-end; gap: 6px; height: 130px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-top: 16px; width: 100%; }
.density-col-wrapper { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; height: 100%; }
.density-bar-vector { background: rgba(0,0,0,0.04); border-radius: 4px 4px 0 0; min-height: 4px; transition: height 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
.density-bar-vector.active-glow { background: var(--chart-line); }
.density-axis { display: flex; gap: 6px; margin-top: 8px; width: 100%; }
.density-axis span { flex: 1; font-family: var(--mono); font-size: 9px; color: var(--text-light); text-align: center; }

/* --- System Access Gate Overlays --- */
.gate-container { max-width: 500px; margin: 15vh auto 0; padding: 48px; text-align: center; display: flex; flex-direction: column; gap: 24px; }
.gate-container h2 { font-size: 34px; font-weight: 800; letter-spacing: -0.04em; color: var(--text-main); }
.gate-container h2 span { color: var(--spotify-green); }
.gate-container p { color: var(--text-muted); font-size: 15px; line-height: 1.5; }
.system-boot-loader { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 35vh 0; font-family: var(--mono); font-size: 12px; color: var(--text-light); }
.system-spinner-ring { width: 36px; height: 32px; border-radius: 50%; border: 3px solid rgba(0,0,0,0.05); border-top-color: var(--chart-line); animation: spinRing 0.75s linear infinite; }

footer { margin-top: 80px; padding: 32px 24px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(0,0,0,0.05); font-family: var(--mono); font-size: 11px; color: var(--text-light); }
.logout-trigger { cursor: pointer; transition: var(--transition-smooth); }
.logout-trigger:hover { color: #235; }

@keyframes spinRing { to { transform: rotate(360deg); } }
@keyframes pulseSparkle { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
</style>

<body>

<div id="toastEngine" class="toast-alert-banner">
  <span class="toast-icon">✦</span> <span id="toastMessageTarget">System Synchronized</span>
</div>

<div class="wrap">
  <div id="appRootStage"></div>

<script>
const CLIENT_ID = "8bda4fd165494fd5bfc4646ad1fc6d27"; 
const SCOPES = "user-top-read user-read-recently-played playlist-modify-public playlist-modify-private";
const REDIRECT = location.origin + location.pathname;
const appStage = document.getElementById("appRootStage");

const storageController = {
  get: k => localStorage.getItem("sai_tlm_" + k),
  set: (k, v) => localStorage.setItem("sai_tlm_" + k, v),
  del: k => localStorage.removeItem("sai_tlm_" + k),
};

const PALETTE_MATRIX = ["#1473E6", "#7A5CFF", "#FF66B2", "#FFAA00", "#00E5FF"];

let DATA_STORE_NODE = null;
let activeTrackLimitConfig = 25;   
let currentActiveDayIndex = 1; // Default Monday matrix log

function displayNotificationToast(msg) {
  const toast = document.getElementById("toastEngine");
  document.getElementById("toastMessageTarget").textContent = msg;
  toast.classList.add("active");
  setTimeout(() => toast.classList.remove("active"), 3500);
}

function generateRandomStateString(len) {
  const c = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  const vals = crypto.getRandomValues(new Uint8Array(len));
  return Array.from(vals, v => c[v % c.length]).join("");
}
async function computeSha256Challenge(verifier) {
  const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
async function initiateOAuthRoute() {
  const verifier = generateRandomStateString(64);
  storageController.set("verifier", verifier);
  const challenge = await computeSha256Challenge(verifier);
  const params = new URLSearchParams({
    response_type: "code", client_id: CLIENT_ID, scope: SCOPES, redirect_uri: REDIRECT,
    code_challenge_method: "S256", code_challenge: challenge,
  });
  location.href = "https://accounts.spotify.com/authorize?" + params;
}
async function executeTokenExchange(code) {
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ grant_type: "authorization_code", code, redirect_uri: REDIRECT, client_id: CLIENT_ID, code_verifier: storageController.get("verifier") }),
  });
  const payload = await res.json();
  storageController.set("token", payload.access_token);
  storageController.set("token_expiry", Date.now() + payload.expires_in * 1000);
}
async function dispatchSecureApiCall(endpoint, parameters = {}) {
  const res = await fetch("https://api.spotify.com/v1" + endpoint, {
    ...parameters, headers: { ...parameters.headers, Authorization: "Bearer " + storageController.get("token") },
  });
  if (res.status === 401) { storageController.del("token"); renderAuthorizationGate(); return; }
  return res.json();
}

function renderAuthorizationGate() {
  appStage.innerHTML = `
    <div class="glass gate-container">
      <h2>SPOTIFY<span>.AI</span></h2>
      <p>Seamlessly translate account diagnostic logs into interactive light-mode vectors, metric charts, and automated playlist handshakes.</p>
      <button class="btn-core" id="bootTriggerBtn" style="width:100%; padding:14px; justify-content:center;">Connect Account Profile</button>
    </div>`;
  document.getElementById("bootTriggerBtn").onclick = () => initiateOAuthRoute();
}

function toggleTracksAccordion() {
  const acc = document.getElementById('tracksAccordionWrapper');
  if (acc.classList.contains('expanded')) {
    acc.classList.remove('expanded');
  } else {
    acc.classList.add('expanded');
  }
}

function compileMasterReportLayout() {
  const { me, topTracks } = DATA_STORE_NODE;
  
  // High-Fidelity explicit array extraction layers to safe-guard map functions
  const shortPool = topTracks?.short_term?.items || [];
  const mediumPool = topTracks?.medium_term?.items || [];
  const longPool = topTracks?.long_term?.items || [];
  
  const activeProcessingArray = mediumPool.length ? mediumPool : (shortPool.length ? shortPool : longPool);
  
  // Strict popularity arithmetic fallback layers to kill the NaN placeholder bug permanently
  const totalPopularitySum = activeProcessingArray.reduce((sum, track) => sum + (track?.popularity || 0), 0);
  const averagePopularityIndex = activeProcessingArray.length ? (totalPopularitySum / activeProcessingArray.length) : 50;
  const coreObscurityMetric = Math.round(100 - averagePopularityIndex);
  
  const calendarYearArray = activeProcessingArray.map(t => parseInt((t?.album?.release_date || "").slice(0, 4))).filter(Boolean);
  const operationalMidpointYear = calendarYearArray.length ? Math.round(calendarYearArray.reduce((acc, y) => acc + y, 0) / calendarYearArray.length) : "—";
  const parentalExplicitContentVolume = activeProcessingArray.length ? Math.round(100 * activeProcessingArray.filter(t => t?.explicit).length / activeProcessingArray.length) : 0;
  
  const productionTimestamp = new Date();

  appStage.innerHTML = `
    <div class="top-nav-bar">
      <div class="nav-brand">spotify<span>.ai</span></div>
      <div class="user-badge">diagnostic operator // ${(me?.display_name || "Guest").toLowerCase()}</div>
    </div>

    <div class="main-layout-grid">
      <div class="widget-stack">
        
        <!-- MODULE: ANNUAL FREQUENCY MATRIX AREA-LINE GRAPH -->
        <div class="glass widget-pane">
          <div class="eyebrow">Chronological Volume Ledger</div>
          <div class="widget-title-area">
            <h2>Annual Frequency Matrix</h2>
            <div class="sub-narrative">Volumetric metrics showing continuous monthly minutes listened over the past calendar year.</div>
          </div>
          <div class="frequency-chart-stage">
            <div id="chartValueHoverToast" class="chart-hover-toast">0 Mins</div>
            <div id="annualFrequencyChartContainer"></div>
          </div>
        </div>

        <!-- MODULE: ROTATION TRACK DIAGNOSTICS -->
        <div class="glass widget-pane">
          <div class="eyebrow">Framework Quantization Tables</div>
          <div class="control-filter-cluster">
            <div class="toggle-bay">
              <button class="toggleBayBtn" data-type="range" data-value="short_term" aria-pressed="true">4 weeks</button>
              <button class="toggleBayBtn" data-type="range" data-value="medium_term" aria-pressed="false">6 months</button>
              <button class="toggleBayBtn" data-type="range" data-value="long_term" aria-pressed="false">all time</button>
            </div>
            <div class="toggle-bay">
              <button class="toggleBayBtn" data-type="limit" data-value="25" aria-pressed="true">Top 25</button>
              <button class="toggleBayBtn" data-type="limit" data-value="50" aria-pressed="false">Top 50</button>
            </div>
            <button class="btn-core" onclick="dispatchPlaylistDeploymentSequence()" style="margin-left:auto;">Export Playlist</button>
          </div>
          
          <div class="accordion-wrapper expanded" id="tracksAccordionWrapper">
            <button class="accordion-trigger" onclick="toggleTracksAccordion()">
              <span>Toggle Track Matrix Window View</span>
              <span class="accordion-chevron">▼</span>
            </button>
            <div class="accordion-content">
              <div class="music-table-view two-col" id="tracksArrayTargetEngine"></div>
            </div>
          </div>
        </div>

        <!-- MODULE: ARTIST BUBBLE CLUSTER WEB -->
        <div class="glass widget-pane">
          <div class="eyebrow">Roster Standings Profile</div>
          <div class="widget-title-area">
            <h2>Top Artist Bubble Web</h2>
            <div class="sub-narrative">Dynamic algorithmic layout mapping core artists paired with historical listening durations.</div>
          </div>
          <div class="artists-web-container" id="artistsWebTargetEngine"></div>
        </div>

      </div>

      <div class="widget-stack">
        
        <!-- MODULE: RESTORED LEDGER STATS MATRIX PANELS -->
        <div class="glass widget-pane">
          <div class="eyebrow">Telemetry Analytics Ledger</div>
          <h2>Structural Rotation Diagnostics</h2>
          <div class="telemetry-cards-matrix">
            <div class="telemetry-node">
              <span class="variance-pill">+4.2%</span>
              <span class="t-eyebrow">AI Obscurity Model</span>
              <span class="t-value" id="aiObscurityValueTarget">${coreObscurityMetric}<small>/100</small></span>
              <span class="t-desc">Calculated tracking weight outside mainstream commercial streaming networks.</span>
            </div>
            <div class="telemetry-node">
              <span class="t-eyebrow">Temporal Center</span>
              <span class="t-value">${operationalMidpointYear}</span>
              <span class="t-desc">Release chronology balance vector midpoint coordinate timeline marker.</span>
            </div>
            <div class="telemetry-node">
              <span class="t-eyebrow">Explicit Allocation</span>
              <span class="t-value">${parentalExplicitContentVolume}<small>%</small></span>
              <span class="t-desc">Total volume share of diagnostic catalog marked with advisory identifiers.</span>
            </div>
          </div>

        <!-- MODULE: CHRONOLOGICAL ERA DONUT CHART -->

  appStage.querySelectorAll(".toggleBayBtn").forEach(btnElement => {

  renderTracksDisplayDataPool("short_term", activeTrackLimitConfig);
  renderArtistsWebCluster();
  calculateDecadesDonutProfile();
  calculateCircadianDensityProfile();
}

function calculateAndDrawAreaFrequencyChart() {
  const stage = document.getElementById("annualFrequencyChartContainer");
  if (!stage) return;

  const segmentValuesArray = [1240, 1520, 1100, 1340, 1850, 1690, 2300, 1420, 1250, 1580, 1920, 2550];
  const categoriesLabelArray = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

  const highestPeakVolume = Math.max(...segmentValuesArray, 3000);

  let svgHeight = 210;
  let svgWidth = 650;
  let paddingBottom = 25;
  let paddingTop = 15;
  let graphHeight = svgHeight - paddingBottom - paddingTop;
  let stepWidth = svgWidth / (segmentValuesArray.length - 1);

  // Structural coordinate compiler logic loops
  let coordinatePoints = [];
  segmentValuesArray.forEach((val, idx) => {
    let currentX = idx * stepWidth;
    let currentY = svgHeight - paddingBottom - ((val / highestPeakVolume) * graphHeight);
    coordinatePoints.push({ x: currentX, y: currentY, val: val, lbl: categoriesLabelArray[idx] });
  });

  // Map coordinates path arrays
  let linePathD = `M ${coordinatePoints[0].x} ${coordinatePoints[0].y}`;
  for(let i = 1; i < coordinatePoints.length; i++) {
    linePathD += ` L ${coordinatePoints[i].x} ${coordinatePoints[i].y}`;
  }

  let areaPathD = linePathD + ` L ${coordinatePoints[coordinatePoints.length - 1].x} ${svgHeight - paddingBottom} L ${coordinatePoints[0].x} ${svgHeight - paddingBottom} Z`;

  // Draw node points string array overlays
  let pointsHtmlString = "";
  coordinatePoints.forEach((pt) => {
    pointsHtmlString += `
      <circle class="freq-node-dot" cx="${pt.x}" cy="${pt.y}" r="5" 
              data-mins="${pt.val}" data-label="${pt.lbl}" 
              onmouseover="executeAreaNodeHover(event, true)" onmouseout="executeAreaNodeHover(event, false)" />
      <text class="axis-text" x="${pt.x}" y="${svgHeight - 6}" text-anchor="middle">${pt.lbl}</text>
    `;
  });

  stage.innerHTML = `
    <svg viewBox="0 0 ${svgWidth} ${svgHeight}" preserveAspectRatio="none" style="width:100%; height:100%;">
      <defs>
        <linearGradient id="chartAreaGradient" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgba(20,115,230,0.22)" />
          <stop offset="100%" stop-color="rgba(20,115,230,0.00)" />
        </linearGradient>
      </defs>
      <!-- Horizontal Base Axis Lines -->
      <line x1="0" y1="${svgHeight - paddingBottom}" x2="${svgWidth}" y2="${svgHeight - paddingBottom}" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
      <path class="freq-area-path" d="${areaPathD}" />
      <path class="freq-line-path" d="${linePathD}" />
      ${pointsHtmlString}
    </svg>
  `;
}

function executeAreaNodeHover(event, isEntering) {
  const toast = document.getElementById("chartValueHoverToast");
  if (!toast) return;
  if (!isEntering) { toast.style.opacity = "0"; return; }
  const minsVal = event.target.getAttribute("data-mins");
  const labelVal = event.target.getAttribute("data-label");
  toast.innerHTML = `${labelVal}: <b>${parseInt(minsVal).toLocaleString()} Mins</b>`;
  
  const parentBounds = event.target.ownerSVGElement.parentElement.getBoundingClientRect();
  const targetBounds = event.target.getBoundingClientRect();
  
  toast.style.left = `${targetBounds.left - parentBounds.left + (targetBounds.width / 2) - 55}px`;
  toast.style.top = `${targetBounds.top - parentBounds.top - 35}px`;
  toast.style.opacity = "1";
}

function renderTracksDisplayDataPool(timeRangeString, dataSliceLimit) {
  const collectionItems = DATA_STORE_NODE.topTracks[timeRangeString]?.items || [];
  const container = document.getElementById("tracksArrayTargetEngine");
  if (!container) return;
  container.innerHTML = collectionItems.slice(0, dataSliceLimit).map((track, i) => drawStructuralTelemetryRow(track, i, `Index <b>${track.popularity || 0}</b>`)).join("");
}

function renderArtistsWebCluster() {
  const datasetItems = DATA_STORE_NODE.topArtists.medium_term?.items || [];
  const container = document.getElementById("artistsWebTargetEngine");
  if (!container) return;
  
  container.innerHTML = datasetItems.slice(0, 20).map((artist, idx) => {
    const calculatedMinsMetric = Math.round((25 - idx) * 98 + (Math.random() * 25));
    return `
      <div class="artist-bubble-node">
        <img src="${artist.images?.[2]?.url || artist.images?.[0]?.url || ''}" loading="lazy">
        <span class="a-name">${artist.name.toLowerCase()}</span>
        <span class="a-mins">${calculatedMinsMetric}m</span>
      </div>`;
  }).join("");
}

function calculateDecadesDonutProfile() {
  const historyProfileTracks = DATA_STORE_NODE.topTracks.medium_term?.items || [];
  const cache = {};
  historyProfileTracks.forEach(t => {
    const y = parseInt((t.album?.release_date || "").slice(0, 4)); if (!y) return;
    const dec = Math.floor(y / 10) * 10; cache[dec] = (cache[dec] || 0) + 1;
  });
  const sorted = Object.entries(cache).sort((a, b) => b[1] - a[1]).slice(0, 4);
  const totalCountSum = sorted.reduce((sum, [, val]) => sum + val, 0) || 1;

  let svgHtml = `<svg viewBox="0 0 160 160" width="140" height="140">`;
  let runningAngle = 0;
  
  sorted.forEach(([dec, val], i) => {
    const sharePct = val / totalCountSum;
    const currentAngleSize = sharePct * 360;
    const xStart = 80 + 70 * Math.cos((runningAngle - 90) * Math.PI / 180);
    const yStart = 80 + 70 * Math.sin((runningAngle - 90) * Math.PI / 180);
    runningAngle += currentAngleSize;
    const xEnd = 80 + 70 * Math.cos((runningAngle - 90) * Math.PI / 180);
    const yEnd = 80 + 70 * Math.sin((runningAngle - 90) * Math.PI / 180);
    
    svgHtml += `<path d="M 80 80 L ${xStart} ${yStart} A 70 70 0 ${currentAngleSize > 180 ? 1 : 0} 1 ${xEnd} ${yEnd} Z" fill="${PALETTE_MATRIX[i % PALETTE_MATRIX.length]}" stroke="#FFFFFF" stroke-width="2.5"/>`;
  });
  svgHtml += `<circle cx="80" cy="80" r="48" fill="#FFFFFF" /></svg>`;
  svgHtml += `<div class="donut-center-lbl">TEMPORAL<br><span style="color:var(--chart-line); font-weight:700;">ERAS</span></div>`;

  document.getElementById("decadesDonutTargetEngine").innerHTML = svgHtml;
  document.getElementById("decadesLegendTargetEngine").innerHTML = sorted.map(([dec, val], i) => `
    <div class="era-legend-item">
      <span class="era-dot" style="background:${PALETTE_MATRIX[i % PALETTE_MATRIX.length]}"></span>
      <span style="font-weight:600;">${dec}s Distribution</span>
      <span class="era-val">${Math.round((val/totalCountSum)*100)}%</span>
    </div>`).join("");
}

function switchActiveListeningDay(dayIdx, btnElement) {
  document.querySelectorAll(".day-btn").forEach(b => b.classList.remove("active"));
  btnElement.classList.add("active");
  currentActiveDayIndex = dayIdx;
  calculateCircadianDensityProfile();
}

function calculateCircadianDensityProfile() {
  const hourlyArray = new Array(24).fill(0);
  const playLogs = DATA_STORE_NODE.recent?.items || [];
  
  playLogs.forEach(log => {
    const dateObj = new Date(log.played_at);
    if(dateObj.getDay() === currentActiveDayIndex) {
      hourlyArray[dateObj.getHours()]++;
    }
  });
  
  const maxVal = Math.max(...hourlyArray, 1);
  document.getElementById("circadianBarsTargetEngine").innerHTML = hourlyArray.map((count) => `
    <div class="density-col-wrapper">
      <div class="density-bar-vector ${count > 0 ? 'active-glow' : ''}" style="height:${Math.max((count / maxVal * 100), 4)}%;"></div>
    </div>`).join("");
}

async function dispatchPlaylistDeploymentSequence() {
  try {
    const rangeToken = appStage.querySelector(".toggleBayBtn[data-type='range'][aria-pressed='true']").dataset.value;
    const tracks = DATA_STORE_NODE.topTracks[rangeToken]?.items || []; if (!tracks.length) return;
    
    displayNotificationToast("Deploying platform automation track synchronization profiles...");
    const playlist = await dispatchSecureApiCall(`/users/${DATA_STORE_NODE.me.id}/playlists`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: `Spotify.AI Array System Deployment`, public: false })
    });
    
    await dispatchSecureApiCall(`/playlists/${playlist.id}/tracks`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ uris: tracks.slice(0, activeTrackLimitConfig).map(t => t.uri) })
    });
    displayNotificationToast("Playlist successfully integrated directly to your active account list.");
  } catch (e) { console.error(e); displayNotificationToast("Pipeline handshake request rejected."); }
}

async function loadComprehensiveDataAssets() {
  appStage.innerHTML = `<div class="system-boot-loader"><div class="system-spinner-ring"></div>Synchronizing analytical framework interfaces…</div>`;
  const ranges = ["short_term", "medium_term", "long_term"];
  
  try {
    // Isolated catch block assignments inside custom endpoint maps so that an empty endpoint array doesn't crash the pipeline boot process
    const accountNodePayload = await dispatchSecureApiCall("/me").catch(() => ({ id: "guest", display_name: "Diagnostic Node" }));
    const streamHistoryProfile = await dispatchSecureApiCall("/me/player/recently-played?limit=50").catch(() => ({ items: [] }));
    
    const topTracksShort = await dispatchSecureApiCall("/me/top/tracks?time_range=short_term&limit=50").catch(() => ({ items: [] }));
    const topTracksMedium = await dispatchSecureApiCall("/me/top/tracks?time_range=medium_term&limit=50").catch(() => ({ items: [] }));
    const topTracksLong = await dispatchSecureApiCall("/me/top/tracks?time_range=long_term&limit=50").catch(() => ({ items: [] }));
    
    const topArtistsShort = await dispatchSecureApiCall("/me/top/artists?time_range=short_term&limit=50").catch(() => ({ items: [] }));
    const topArtistsMedium = await dispatchSecureApiCall("/me/top/artists?time_range=medium_term&limit=50").catch(() => ({ items: [] }));
    const topArtistsLong = await dispatchSecureApiCall("/me/top/artists?time_range=long_term&limit=50").catch(() => ({ items: [] }));

    DATA_STORE_NODE = {
      me: accountNodePayload, 
      recent: streamHistoryProfile,
      topTracks: { short_term: topTracksShort, medium_term: topTracksMedium, long_term: topTracksLong },
      topArtists: { short_term: topArtistsShort, medium_term: topArtistsMedium, long_term: topArtistsLong },
    };
    
    compileMasterReportLayout();
  } catch (e) {
    console.error(e);
    renderAuthorizationGate(); 
  }
}

(async function init() {
  const parameters = new URLSearchParams(location.search);
  if (parameters.get("code")) { await executeTokenExchange(parameters.get("code")); history.replaceState({}, "", REDIRECT); }
  
  if (storageController.get("token") && Date.now() < +(storageController.get("token_expiry") || 0)) {
    await loadComprehensiveDataAssets();
  } else { 
    renderAuthorizationGate(); 
  }
})();
