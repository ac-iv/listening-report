<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yourmusicstats.ai — your listening, decoded</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,300..900&family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F2F5F3;
  --ink: #0C0F0D;
  --muted: #4A544E;
  --faint: #8A958E;
  --card: rgba(255, 255, 255, 0.62);
  --card-solid: #FFFFFF;
  --line: rgba(12, 15, 13, 0.07);
  --green: #1DB954;
  --green-deep: #0E5A2B;
  --green-soft: rgba(29, 185, 84, 0.09);
  --green-hover: #1ed760;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Archivo', sans-serif;
  --serif: 'Instrument Serif', serif;
  --r-lg: 26px;
  --r-md: 16px;
  --r-sm: 11px;
  --ease: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; background: var(--bg); }
body {
  font-family: var(--sans); color: var(--ink); line-height: 1.55;
  -webkit-font-smoothing: antialiased; min-height: 100vh; overflow-x: hidden;
  background: var(--bg);
  background-image:
    radial-gradient(circle at 12% -6%, rgba(29, 185, 84, 0.18) 0%, transparent 44%),
    radial-gradient(circle at 98% 6%, rgba(12, 15, 13, 0.07) 0%, transparent 42%),
    radial-gradient(circle at 90% 98%, rgba(29, 185, 84, 0.14) 0%, transparent 44%),
    radial-gradient(circle at 2% 96%, rgba(125, 227, 165, 0.16) 0%, transparent 46%);
  background-attachment: fixed;
}
:focus-visible { outline: 2px solid var(--green); outline-offset: 2px; border-radius: 6px; }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition: none !important; animation: none !important; } }

.wrap { max-width: 1280px; margin: 0 auto; padding: 28px 24px 100px; }
@media (max-width: 640px) { .wrap { padding: 16px 14px 80px; } }

/* ---------- liquid glass surfaces ---------- */
.glass {
  position: relative;
  background: var(--card);
  backdrop-filter: blur(32px) saturate(180%);
  -webkit-backdrop-filter: blur(32px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.65);
  border-radius: var(--r-lg);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.95),
    inset 0 -1px 0 rgba(12, 15, 13, 0.03),
    0 4px 18px rgba(110, 130, 118, 0.13),
    0 20px 55px rgba(14, 24, 18, 0.06);
  transition: var(--ease);
}
.glass::before {
  content: ""; position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
  background: linear-gradient(118deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 38%);
  opacity: 0.65;
}
.glass > * { position: relative; }

/* ---------- masthead: no box, just type ---------- */
.masthead {
  display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; flex-wrap: wrap;
  padding: 20px 6px 28px;
}
.mast-kicker { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--faint); margin-bottom: 8px; }
.mast-brand { font-size: clamp(27px, 4.4vw, 42px); font-weight: 900; letter-spacing: -0.045em; line-height: 1; text-transform: lowercase; color: var(--ink); }
.mast-brand em { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--green); letter-spacing: -0.01em; }
.mast-right { display: flex; align-items: center; gap: 10px; padding-bottom: 8px; }
.user-chip {
  display: flex; align-items: center; gap: 9px; font-family: var(--mono); font-size: 11px; color: var(--muted);
  background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255, 255, 255, 0.75); padding: 5px 13px 5px 6px; border-radius: 30px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 4px 14px rgba(14, 24, 18, 0.07);
}
.user-chip img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
.user-chip.no-img { padding-left: 13px; }

/* ---------- ad slots: reserved, empty, honest ---------- */
.ad-slot {
  width: 100%; max-width: 728px; height: 90px; margin: 0 auto 30px;
  background: rgba(12, 15, 13, 0.055); border: 1px dashed rgba(12, 15, 13, 0.14);
  border-radius: var(--r-md); display: flex; align-items: center; justify-content: center;
}
.ad-slot.mid { margin: 0 auto; }
.ad-slot span { font-family: var(--mono); font-size: 9.5px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faint); }
@media (max-width: 640px) { .ad-slot { height: 60px; } }

/* ---------- tab nav ---------- */
.tabs {
  display: flex; gap: 4px; padding: 5px; border-radius: 40px; width: fit-content;
  margin: 0 auto 30px; max-width: 100%; overflow-x: auto; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  font-family: var(--mono); font-size: 11px; font-weight: 600; text-transform: lowercase;
  letter-spacing: 0.02em; padding: 10px 19px; border: 0; border-radius: 30px;
  background: transparent; color: var(--muted); cursor: pointer; white-space: nowrap; transition: var(--ease);
}
.tab-btn:hover { color: var(--ink); }
.tab-btn.active { background: var(--ink); color: #FFF; }
@media (max-width: 640px) { .tabs { justify-content: flex-start; width: 100%; } }

/* ---------- panes & type ---------- */
.pane { padding: 30px; display: flex; flex-direction: column; gap: 20px; }
@media (max-width: 640px) { .pane { padding: 20px 16px; } }
.kicker { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faint); display: flex; align-items: center; gap: 12px; }
.kicker::after { content: ""; flex: 1; height: 1px; background: var(--line); }
.pane h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.2; }
.pane h2 em, .persona em { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--green-deep); letter-spacing: 0; }
.pane .sub { font-size: 13.5px; color: var(--muted); max-width: 62ch; margin-top: -12px; }
.caption { font-family: var(--mono); font-size: 10px; color: var(--faint); }

.grid-2 { display: grid; grid-template-columns: 1.08fr 0.92fr; gap: 24px; align-items: start; }
@media (max-width: 1080px) { .grid-2 { grid-template-columns: 1fr; } }
.stack { display: flex; flex-direction: column; gap: 24px; }

/* ---------- the read (hero) ---------- */
.persona { font-size: clamp(34px, 4.6vw, 52px); font-weight: 900; letter-spacing: -0.035em; line-height: 1.05; }
.persona em { color: var(--green); }
.persona-vibe { font-family: var(--mono); font-size: 11px; font-weight: 600; text-transform: lowercase; color: var(--green-deep); background: var(--green-soft); padding: 6px 14px; border-radius: 30px; width: fit-content; }
.read-body { font-size: 16px; color: var(--muted); line-height: 1.7; max-width: 64ch; }
.read-body b { color: var(--ink); font-weight: 700; }
.read-actions { display: flex; gap: 10px; flex-wrap: wrap; }

/* ---------- buttons & controls ---------- */
.btn {
  font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: lowercase;
  border: none; border-radius: 40px; padding: 13px 26px; cursor: pointer; transition: var(--ease);
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-green { background: var(--green); color: #04220F; }
.btn-green:hover { background: var(--green-hover); transform: translateY(-1px); box-shadow: 0 10px 24px rgba(29,185,84,0.32); }
.btn-ink { background: var(--ink); color: #FFF; }
.btn-ink:hover { background: #1C211E; transform: translateY(-1px); }
.btn-ghost { background: rgba(12,15,13,0.05); color: var(--ink); }
.btn-ghost:hover { background: rgba(12,15,13,0.1); }
.mini-btn {
  font-family: var(--mono); font-size: 9.5px; font-weight: 600; text-transform: lowercase; letter-spacing: 0.03em;
  background: rgba(12,15,13,0.05); color: var(--muted); border: none; border-radius: 30px; padding: 7px 14px;
  cursor: pointer; transition: var(--ease); white-space: nowrap;
}
.mini-btn:hover { background: var(--green-soft); color: var(--green-deep); }

.pills { display: inline-flex; background: rgba(12, 15, 13, 0.05); padding: 3px; border-radius: 12px; max-width: 100%; overflow-x: auto; scrollbar-width: none; }
.pills::-webkit-scrollbar { display: none; }
.pill {
  font-family: var(--mono); font-size: 10.5px; font-weight: 600; padding: 7px 15px; border: 0;
  background: transparent; color: var(--muted); border-radius: 9px; cursor: pointer; transition: var(--ease); white-space: nowrap;
}
.pill[aria-pressed="true"] { background: #FFF; color: var(--ink); box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
.controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding-bottom: 16px; border-bottom: 1px solid var(--line); }

/* ---------- stat cards ---------- */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(205px, 1fr)); gap: 16px; }
@media (max-width: 640px) { .stats { grid-template-columns: 1fr 1fr; gap: 10px; } }
.stat { background: var(--card-solid); border: 1px solid var(--line); border-radius: var(--r-md); padding: 20px; display: flex; flex-direction: column; gap: 8px; }
.stat .s-label { font-family: var(--mono); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--faint); }
.stat .s-value { font-size: 32px; font-weight: 900; letter-spacing: -0.03em; line-height: 1.05; display: flex; align-items: baseline; gap: 3px; }
.stat .s-value small { font-size: 13px; font-weight: 600; color: var(--faint); letter-spacing: 0; }
.stat .s-value.txt { font-size: 17.5px; line-height: 1.3; letter-spacing: -0.01em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* ---------- side quest cards: art-forward tiles ---------- */
.quest-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
@media (max-width: 640px) { .quest-grid { grid-template-columns: 1fr; } }
.quest-card {
  display: flex; align-items: center; gap: 16px; padding: 16px;
  background: var(--card-solid); border: 1px solid var(--line); border-radius: var(--r-md); transition: var(--ease);
}
.quest-card:hover { transform: translateY(-2px) rotate(-0.4deg); box-shadow: 0 14px 30px rgba(14, 24, 18, 0.1); }
.quest-card .q-art {
  width: 74px; height: 74px; border-radius: 14px; overflow: hidden; flex-shrink: 0;
  background: var(--green-soft); display: flex; align-items: center; justify-content: center; font-size: 28px;
  transform: rotate(-2.5deg); box-shadow: 0 6px 16px rgba(14, 24, 18, 0.16); border: 2px solid #FFF;
}
.quest-card .q-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
.quest-card .q-body { min-width: 0; display: flex; flex-direction: column; gap: 3px; }
.quest-card .q-label { font-family: var(--mono); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--green-deep); background: var(--green-soft); padding: 3px 9px; border-radius: 20px; width: fit-content; }
.quest-card .q-value { font-size: 16.5px; font-weight: 800; letter-spacing: -0.015em; line-height: 1.25; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.quest-card .q-flair { font-family: var(--serif); font-style: italic; font-size: 13.5px; color: var(--muted); line-height: 1.35; }

/* ---------- horizontal bar charts ---------- */
.hbars { display: flex; flex-direction: column; gap: 10px; }
.hbar-row { display: grid; grid-template-columns: 118px 1fr 30px; gap: 10px; align-items: center; }
.hbar-label { font-family: var(--mono); font-size: 9.5px; font-weight: 600; color: var(--muted); text-transform: lowercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hbar-track { height: 13px; border-radius: 8px; background: rgba(12, 15, 13, 0.06); overflow: hidden; }
.hbar-fill { height: 100%; border-radius: 8px; background: var(--green); min-width: 5px; }
.hbar-fill.alt { background: var(--green-deep); }
.hbar-count { font-family: var(--mono); font-size: 10px; color: var(--faint); text-align: right; }

/* ---------- chart tooltip ---------- */
.chart-box { position: relative; }
.chart-tip {
  position: absolute; background: var(--ink); color: #FFF; font-family: var(--mono); font-size: 10.5px;
  padding: 7px 12px; border-radius: 8px; pointer-events: none; opacity: 0; transition: opacity 0.15s;
  white-space: nowrap; z-index: 20; box-shadow: 0 10px 24px rgba(12, 15, 13, 0.28);
}

/* ---------- lore charts ---------- */
.pane h3 { font-size: 17px; font-weight: 800; letter-spacing: -0.015em; }
.lore-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 34px; }
@media (max-width: 880px) { .lore-grid { grid-template-columns: 1fr; } }
.lore-col { display: flex; flex-direction: column; gap: 14px; }
.stat .s-desc { font-size: 12px; color: var(--muted); line-height: 1.45; }
.stat .s-flair { font-family: var(--serif); font-style: italic; font-size: 15px; color: var(--green-deep); }
@media (max-width: 640px) { .stat { padding: 15px; } .stat .s-value { font-size: 25px; } }

/* obscurity dial */
.dial-row { display: flex; align-items: center; gap: 6px; }
.dial-row svg { flex-shrink: 0; }

/* ---------- ranked rows ---------- */
.track-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 0 26px; }
@media (max-width: 880px) { .track-cols { grid-template-columns: 1fr; } }
.row {
  display: grid; grid-template-columns: 34px 46px 1fr 94px; gap: 14px; align-items: center;
  padding: 9px 10px; border-radius: var(--r-sm); border-bottom: 1px solid rgba(12,15,13,0.04); transition: var(--ease);
}
.row:hover { background: #FFF; }
.rank { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--faint); text-align: center; }
.rank.medal {
  width: 26px; height: 26px; margin: 0 auto; border-radius: 50%; background: var(--green); color: #04220F;
  font-weight: 600; display: flex; align-items: center; justify-content: center; font-size: 11px;
}
.art { width: 46px; height: 46px; border-radius: 9px; overflow: hidden; background: rgba(12,15,13,0.04); flex-shrink: 0; }
.art img { width: 100%; height: 100%; object-fit: cover; display: block; }
.row-meta { min-width: 0; }
.row-meta .t-name { font-weight: 650; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-meta .t-artist { font-size: 12.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.pop-cell { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.pop-cell .pop-num { font-family: var(--mono); font-size: 10.5px; color: var(--faint); }
.pop-track { width: 60px; height: 4px; border-radius: 3px; background: rgba(12,15,13,0.07); overflow: hidden; }
.pop-fill { height: 100%; border-radius: 3px; background: var(--green); }
.pop-recent { font-family: var(--mono); font-size: 9px; font-weight: 600; color: var(--green-deep); background: var(--green-soft); padding: 1px 7px; border-radius: 20px; }
.deep-pop { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--green-deep); background: var(--green-soft); padding: 3px 9px; border-radius: 20px; justify-self: end; }

/* ---------- recommendations ---------- */
.rec-row {
  display: grid; grid-template-columns: 46px 1fr auto; gap: 14px; align-items: center;
  padding: 9px 10px; border-radius: var(--r-sm); border-bottom: 1px solid rgba(12,15,13,0.04); transition: var(--ease);
}
.rec-row:hover { background: #FFF; }
.rec-reason { font-family: var(--mono); font-size: 9px; font-weight: 600; color: var(--green-deep); background: var(--green-soft); padding: 3px 9px; border-radius: 20px; white-space: nowrap; max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
@media (max-width: 640px) { .rec-reason { display: none; } }
.rec-empty { display: flex; flex-direction: column; align-items: flex-start; gap: 14px; padding: 8px 0; }

/* ---------- artist cards ---------- */
.artist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(235px, 1fr)); gap: 14px; }
@media (max-width: 640px) { .artist-grid { grid-template-columns: 1fr; } }
.artist-card {
  position: relative; display: flex; align-items: center; gap: 14px; padding: 14px 16px;
  background: var(--card-solid); border: 1px solid var(--line); border-radius: var(--r-md); transition: var(--ease);
}
.artist-card:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(14,24,18,0.09); }
.artist-card img, .artist-card .a-fallback { width: 54px; height: 54px; border-radius: 50%; object-fit: cover; background: rgba(12,15,13,0.05); flex-shrink: 0; }
.artist-card .a-fallback { display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--faint); }
.artist-card .a-meta { min-width: 0; }
.artist-card .a-name { font-weight: 700; font-size: 14.5px; text-transform: lowercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 28px; }
.artist-card .a-genres { font-size: 11.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.artist-card .a-rank { position: absolute; top: 10px; right: 12px; font-family: var(--mono); font-size: 10px; font-weight: 600; color: var(--faint); }
.artist-card.top .a-rank { color: var(--green); }

.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  display: inline-flex; align-items: center; gap: 8px; padding: 7px 14px; background: var(--card-solid);
  border: 1px solid var(--line); border-radius: 30px; font-size: 12.5px; font-weight: 600; text-transform: lowercase;
}
.chip .c-count { font-family: var(--mono); font-size: 10px; color: var(--green-deep); background: var(--green-soft); padding: 1px 7px; border-radius: 20px; }

/* ---------- charts ---------- */
.chart-box { background: var(--card-solid); border: 1px solid var(--line); border-radius: var(--r-md); padding: 22px 18px 14px; }
.bars { display: flex; align-items: flex-end; gap: 6px; height: 140px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; gap: 5px; min-width: 0; }
.bar-col .bar-val { font-family: var(--mono); font-size: 9.5px; color: var(--faint); }
.bar-col .bar { width: 100%; max-width: 34px; border-radius: 5px 5px 2px 2px; background: rgba(12,15,13,0.06); min-height: 4px; transition: height 0.4s ease; }
.bar-col .bar.on { background: var(--green); }
.bar-col .bar.peak { background: var(--green-deep); }
.chart-note { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
.day-hero { font-family: var(--mono); font-size: 10px; font-weight: 600; text-transform: lowercase; color: var(--green-deep); background: var(--green-soft); padding: 5px 12px; border-radius: 30px; }
.bar-labels { display: flex; gap: 6px; margin-top: 8px; }
.bar-labels span { flex: 1; font-family: var(--mono); font-size: 9px; color: var(--faint); text-align: center; overflow: hidden; white-space: nowrap; }
.empty-note { font-size: 12.5px; color: var(--faint); text-align: center; padding: 30px 12px; }

.era-split { display: grid; grid-template-columns: 0.9fr 1.1fr; gap: 26px; align-items: center; }
@media (max-width: 600px) { .era-split { grid-template-columns: 1fr; } }
.donut-stage { display: flex; justify-content: center; align-items: center; position: relative; }
.donut-lbl { position: absolute; font-family: var(--mono); font-size: 10px; font-weight: 600; color: var(--faint); text-transform: uppercase; letter-spacing: 0.08em; pointer-events: none; }
.legend { display: flex; flex-direction: column; gap: 8px; }
.legend-item { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; padding: 9px 13px; background: var(--card-solid); border: 1px solid var(--line); border-radius: var(--r-sm); }
.legend-item .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.legend-item .l-val { font-family: var(--mono); font-size: 10.5px; color: var(--faint); margin-left: auto; }

/* ---------- playlist studio ---------- */
.preset-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(215px, 1fr)); gap: 14px; }
.preset {
  text-align: left; background: var(--card-solid); border: 1px solid var(--line); border-radius: var(--r-md);
  padding: 20px; cursor: pointer; transition: var(--ease); font-family: var(--sans); display: flex; flex-direction: column; gap: 6px;
}
.preset:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(14,24,18,0.1); border-color: rgba(29,185,84,0.4); }
.preset .p-emoji { font-size: 20px; }
.preset .p-name { font-weight: 750; font-size: 15px; letter-spacing: -0.01em; }
.preset .p-desc { font-size: 12px; color: var(--muted); line-height: 1.45; }
.preset .p-tag { font-family: var(--mono); font-size: 9.5px; color: var(--green-deep); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }

.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-family: var(--mono); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--faint); }
.field input[type="text"], .field select {
  font-family: var(--sans); font-size: 14px; font-weight: 500; color: var(--ink);
  background: var(--card-solid); border: 1px solid rgba(12,15,13,0.12); border-radius: var(--r-sm);
  padding: 12px 14px; width: 100%; transition: var(--ease); appearance: none;

/* ---------- story cards ---------- */

/* ---------- login / loader / toast / footer ---------- */

}

footer { margin-top: 70px; padding-top: 26px; display: flex; justify-content: space-between; align-items: center; gap: 12px; border-top: 1px solid var(--line); font-family: var(--mono); font-size: 10.5px; color: var(--faint); flex-wrap: wrap; }

</style>

<body>

<div id="toast" class="toast" role="status"></div>
<div class="wrap"><div id="app"></div></div>

<script>
/* ============================================================
   yourmusicstats.ai — config, auth (PKCE), data
   ============================================================ */
const CLIENT_ID = "8bda4fd165494fd5bfc4646ad1fc6d27";
const SCOPES = "user-top-read user-read-recently-played playlist-modify-public playlist-modify-private";
const REDIRECT = location.origin + location.pathname;

const app = document.getElementById("app");
const store = {
  get: k => localStorage.getItem("sai_tlm_" + k),
  set: (k, v) => localStorage.setItem("sai_tlm_" + k, v),
  del: k => localStorage.removeItem("sai_tlm_" + k),
};

const PALETTE = ["#1DB954", "#0E5A2B", "#7DE3A5", "#0C0F0D", "#8A958E", "#C9EFD8"];
const RANGE_LABEL = { short_term: "last 4 weeks", medium_term: "last 6 months", long_term: "all time" };
const RANGE_SHORT = { short_term: "4 WEEKS", medium_term: "6 MONTHS", long_term: "ALL TIME" };
const YEAR_NOW = new Date().getFullYear();

let DATA = null;
const state = {
  tab: "dash",
  trackRange: "short_term",
  trackLimit: 25,
  artistRange: "short_term",
  storyTemplate: "read",
  storyRange: "short_term",
  storyTheme: "glass",
  lastPlaylist: null,
  recs: null,
  recsLoading: false,
  demo: false,
  readNonce: 0,
  weeklyScale: "all",
};

/* ---------- tiny utils ---------- */
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove("show"), 3400);
}
function shuffleArr(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function hashStr(s) {
  let h = 2166136261;
  for (const c of String(s)) { h ^= c.charCodeAt(0); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
function mulberry32(a) {
  return function () {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const pickFrom = (rng, arr) => arr[Math.floor(rng() * arr.length)];
function fmtFollowers(n) {
  if (!n && n !== 0) return null;
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(".0", "") + "m";
  if (n >= 1e3) return Math.round(n / 1e3) + "k";
  return String(n);
}
function median(arr) {
  if (!arr.length) return 0;
  const s = [...arr].sort((a, b) => a - b);
  const m = Math.floor(s.length / 2);
  return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
}
function hourLabel(h) { return h === 0 ? "12am" : h === 12 ? "12pm" : h > 12 ? (h - 12) + "pm" : h + "am"; }

/* ---------- local play log ----------
   spotify only ever hands over the last 50 plays, so we quietly bank them
   in localStorage on every visit and the history compounds over time. */
function playLog() {
  if (state.demo) return state.demoLog || [];
  try { return JSON.parse(store.get("playlog") || "[]"); } catch (e) { return []; }
}
function mergePlayLog(items) {
  if (state.demo || !items?.length) return;
  try {
    const log = playLog();
    const seen = new Set(log.map(e => e.k));
    items.forEach(i => {
      if (!i?.played_at) return;
      const k = i.played_at + "|" + (i.track?.id || "");
      if (seen.has(k)) return;
      seen.add(k);
      log.push({ k, at: i.played_at, ms: i.track?.duration_ms || 210000 });
    });
    log.sort((a, b) => new Date(b.at) - new Date(a.at));
    store.set("playlog", JSON.stringify(log.slice(0, 4000)));
  } catch (e) { /* storage full or blocked — charts fall back to whatever loads */ }
}

/* ---------- OAuth (PKCE) ---------- */
function randString(len) {
  const c = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  const vals = crypto.getRandomValues(new Uint8Array(len));
  return Array.from(vals, v => c[v % c.length]).join("");
}
async function sha256Challenge(verifier) {
  const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
async function login() {
  const verifier = randString(64);
  store.set("verifier", verifier);
  const challenge = await sha256Challenge(verifier);
  const params = new URLSearchParams({
    response_type: "code", client_id: CLIENT_ID, scope: SCOPES, redirect_uri: REDIRECT,
    code_challenge_method: "S256", code_challenge: challenge,
  });
  location.href = "https://accounts.spotify.com/authorize?" + params;
}
async function exchangeToken(code) {
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ grant_type: "authorization_code", code, redirect_uri: REDIRECT, client_id: CLIENT_ID, code_verifier: store.get("verifier") }),
  });
  const payload = await res.json();
  store.set("token", payload.access_token);
  store.set("token_expiry", Date.now() + payload.expires_in * 1000);
}
async function api(endpoint, opts = {}) {
  const res = await fetch("https://api.spotify.com/v1" + endpoint, {
    ...opts, headers: { ...opts.headers, Authorization: "Bearer " + store.get("token") },
  });
  if (res.status === 401) { store.del("token"); renderLogin(); throw new Error("expired"); }
  if (res.status === 204) return {};
  return res.json();
}
async function apiStrict(endpoint, opts = {}) {
  const res = await fetch("https://api.spotify.com/v1" + endpoint, {
    ...opts, headers: { ...opts.headers, Authorization: "Bearer " + store.get("token") },
  });
  if (res.status === 401) { store.del("token"); renderLogin(); throw new Error("expired"); }
  if (!res.ok) throw new Error("http " + res.status);
  if (res.status === 204) return {};
  return res.json();
}

/* ---------- data ---------- */
async function loadData() {
  app.innerHTML = `<div class="loader"><div class="spinner"></div>reading your history. no judgment. some judgment.</div>`;
  try {
    const safe = p => p.catch(() => ({ items: [] }));
    const [me, recent, tS, tM, tL, aS, aM, aL] = await Promise.all([
      api("/me"),
      safe(api("/me/player/recently-played?limit=50")),
      safe(api("/me/top/tracks?time_range=short_term&limit=50")),
      safe(api("/me/top/tracks?time_range=medium_term&limit=50")),
      safe(api("/me/top/tracks?time_range=long_term&limit=50")),
      safe(api("/me/top/artists?time_range=short_term&limit=50")),
      safe(api("/me/top/artists?time_range=medium_term&limit=50")),
      safe(api("/me/top/artists?time_range=long_term&limit=50")),
    ]);
    DATA = {
      me,
      recent,
      topTracks: { short_term: tS, medium_term: tM, long_term: tL },
      topArtists: { short_term: aS, medium_term: aM, long_term: aL },
    };
    await rehydrateData();
    mergePlayLog(DATA.recent?.items || []);
    renderShell();
  } catch (e) {
    if (e.message !== "expired") renderLogin();
  }
}

/* Spotify sometimes ships top-lists with zeroed popularity or empty genres.
   Best-effort refetch from the canonical /tracks and /artists endpoints. */
async function rehydrateData() {
  /* spotify occasionally ships null or partial objects in top lists — drop the husks */
  ["short_term", "medium_term", "long_term"].forEach(r => {
    if (DATA.topTracks[r]?.items) DATA.topTracks[r].items = DATA.topTracks[r].items.filter(t => t && (t.id || t.name));
    if (DATA.topArtists[r]?.items) DATA.topArtists[r].items = DATA.topArtists[r].items.filter(a => a && (a.id || a.name));
  });
  try {
    const byTrackId = {};
    ["short_term", "medium_term", "long_term"].forEach(r =>
      (DATA.topTracks[r]?.items || []).forEach(t => { if (t.id) (byTrackId[t.id] = byTrackId[t.id] || []).push(t); }));
    const tIds = Object.keys(byTrackId);
    const zeroShare = tIds.length ? tIds.filter(id => !(byTrackId[id][0].popularity > 0)).length / tIds.length : 0;
    if (tIds.length && zeroShare > 0.4) {
      for (let i = 0; i < tIds.length; i += 50) {
        const res = await apiStrict("/tracks?ids=" + tIds.slice(i, i + 50).join(","));
        (res.tracks || []).forEach(ft => {
          if (ft && byTrackId[ft.id]) byTrackId[ft.id].forEach(t => {
            t.popularity = ft.popularity;
            if (!t.album?.release_date && ft.album) t.album = ft.album;
          });
        });
      }
    }
  } catch (e) { /* keep whatever we had */ }
  try {
    const byArtistId = {};
    ["short_term", "medium_term", "long_term"].forEach(r =>
      (DATA.topArtists[r]?.items || []).forEach(a => { if (a.id) (byArtistId[a.id] = byArtistId[a.id] || []).push(a); }));
    const aIds = Object.keys(byArtistId);
    const emptyShare = aIds.length ? aIds.filter(id => !(byArtistId[id][0].genres || []).length).length / aIds.length : 0;
    const missingBits = aIds.some(id => byArtistId[id].some(a => !a.name || !(a.images || []).length));
    if (aIds.length && (emptyShare > 0.5 || missingBits)) {
      for (let i = 0; i < aIds.length; i += 50) {
        const res = await apiStrict("/artists?ids=" + aIds.slice(i, i + 50).join(","));
        (res.artists || []).forEach(fa => {
          if (fa && byArtistId[fa.id]) byArtistId[fa.id].forEach(a => {
            if (!a.name) a.name = fa.name;
            if (!(a.images || []).length) a.images = fa.images || [];
            if (!a.followers) a.followers = fa.followers;
            if (!(a.genres || []).length) a.genres = fa.genres || [];
          });
        });
      }
    }
  } catch (e) { /* keep whatever we had */ }
}

/* ============================================================
   metrics — everything the read + cards are built from
   ============================================================ */
function analysisPool(range) {
  if (range) return DATA.topTracks[range]?.items || [];
  const t = DATA.topTracks;
  return (t.medium_term?.items?.length ? t.medium_term.items : (t.short_term?.items?.length ? t.short_term.items : (t.long_term?.items || [])));
}
function bestArtists() {
  const a = DATA.topArtists;
  return (a.medium_term?.items?.length ? a.medium_term.items : (a.short_term?.items?.length ? a.short_term.items : (a.long_term?.items || [])));
}
function getMetrics() {
  if (getMetrics._cache) return getMetrics._cache;
  const pool = analysisPool();
  const artists = bestArtists();
  const recentItems = DATA.recent?.items || [];

  /* scored on a curve: your ten most mainstream tracks drag you down,
     and the top of the scale has to be earned */
  const pops = pool.map(t => t.popularity || 0);
  const avgPop = pops.length ? pops.reduce((s, p) => s + p, 0) / pops.length : 50;
  const guilt = [...pops].sort((a, b) => b - a).slice(0, 10);
  const guiltPop = guilt.length ? guilt.reduce((s, p) => s + p, 0) / guilt.length : avgPop;
  const rawObs = Math.max(0, 100 - (0.7 * avgPop + 0.3 * guiltPop));
  const obscurity = Math.min(99.9, Math.max(0.1, Math.round(Math.pow(rawObs / 100, 1.3) * 1000) / 10));

  const years = pool.map(t => parseInt((t.album?.release_date || "").slice(0, 4))).filter(Boolean);
  const avgYear = years.length ? Math.round(years.reduce((s, y) => s + y, 0) / years.length) : YEAR_NOW;
  const tasteAge = Math.max(0, YEAR_NOW - avgYear);

  const explicit = pool.length ? Math.round(100 * pool.filter(t => t.explicit).length / pool.length) : 0;

  const uniqueArtists = new Set(pool.map(t => t.artists?.[0]?.id).filter(Boolean)).size;
  const variety = pool.length ? uniqueArtists / pool.length : 0.6;

  const shortIds = new Set((DATA.topTracks.short_term?.items || []).map(t => t.id));
  const longItems = DATA.topTracks.long_term?.items || [];
  const overlap = longItems.filter(t => shortIds.has(t.id)).length;
  const consistency = (shortIds.size && longItems.length) ? overlap / Math.min(shortIds.size, longItems.length) : 0;

  let night = 0, peak = null;
  if (recentItems.length) {
    const hours = new Array(24).fill(0);
    recentItems.forEach(i => hours[new Date(i.played_at).getHours()]++);
    const nightPlays = recentItems.filter(i => { const h = new Date(i.played_at).getHours(); return h >= 22 || h < 4; }).length;
    night = nightPlays / recentItems.length;
    const h = hours.indexOf(Math.max(...hours));
    peak = h === 0 ? "12am" : h === 12 ? "12pm" : h > 12 ? (h - 12) + "pm" : h + "am";
  }

  const genreCounts = {};
  artists.forEach(a => (a.genres || []).forEach(g => { genreCounts[g] = (genreCounts[g] || 0) + 1; }));
  const genres = Object.entries(genreCounts).sort((a, b) => b[1] - a[1]);

  getMetrics._cache = {
    obscurity, avgYear, tasteAge, explicit, variety, uniqueArtists,
    consistency, night, nightPct: Math.round(night * 100), peak,
    topArtist: artists[0]?.name || null,
    topGenre: genres[0]?.[0] || null,
    genres,
    poolSize: pool.length,
  };
  return getMetrics._cache;
}
function recentPlayCounts() {
  const counts = {};
  (DATA.recent?.items || []).forEach(i => { const id = i.track?.id; if (id) counts[id] = (counts[id] || 0) + 1; });
  return counts;
}
function estPlays(rank, range) {
  const top1 = { short_term: 55, medium_term: 260, long_term: 900 }[range] || 100;
  const floor = range === "long_term" ? 8 : 3;
  return Math.max(floor, Math.round(top1 / Math.pow(rank, 0.72)));
}
function obscureTop(n = 5, range) {
  const pool = analysisPool(range).slice();
  pool.sort((a, b) => (a.popularity || 0) - (b.popularity || 0));
  return pool.slice(0, n);
}
function hasGenreData() { return getMetrics().genres.length > 0; }
function obscurityTitle(o) {
  if (o >= 70) return "actual gatekeeper";
  if (o >= 52) return "certified digger";
  if (o >= 34) return "tastefully off-center";
  if (o >= 18) return "radio friendly";
  return "chart citizen";
}

/* ============================================================
   side quests — extremely specific stats nobody asked for
   ============================================================ */
function sideQuests() {
  const q = [];
  const pool = analysisPool();
  const recentItems = DATA.recent?.items || [];

  /* on loop */
  const rc = recentPlayCounts();
  let loopId = null, loopN = 0;
  Object.entries(rc).forEach(([id, n]) => { if (n > loopN) { loopN = n; loopId = id; } });
  if (loopN >= 2) {
    const it = recentItems.find(i => i.track?.id === loopId)?.track;
    if (it) q.push({ label: "on loop", value: it.name, img: it.album?.images?.[1]?.url || it.album?.images?.[0]?.url, flair: `×${loopN} in your last 50 plays. ${loopN >= 5 ? "blink twice if you need help." : loopN >= 3 ? "it's giving fixation." : "twice is a pattern."}` });
  }

  /* you ghosted */
  const shortA = new Set((DATA.topArtists.short_term?.items || []).map(a => a.id));
  if (shortA.size) {
    const ghost = (DATA.topArtists.long_term?.items || []).slice(0, 10).find(a => a.id && !shortA.has(a.id));
    if (ghost?.name) q.push({ label: "you ghosted", value: ghost.name, img: ghost.images?.[1]?.url || ghost.images?.[0]?.url, emoji: "👻", flair: "an all-time favorite with zero recent presence. do they know?" });
  }

  /* forever song */
  const rankMap = r => { const map = {}; (DATA.topTracks[r]?.items || []).forEach((t, i) => { if (t.id) map[t.id] = i; }); return map; };
  const rS = rankMap("short_term"), rM = rankMap("medium_term"), rL = rankMap("long_term");
  let fBest = null, fScore = Infinity;
  Object.keys(rS).forEach(id => {
    if (id in rM && id in rL) { const sc = rS[id] + rM[id] + rL[id]; if (sc < fScore) { fScore = sc; fBest = id; } }
  });
  if (fBest) {
    const t = (DATA.topTracks.short_term?.items || []).find(x => x.id === fBest);
    if (t) q.push({ label: "your forever song", value: t.name, img: t.album?.images?.[1]?.url || t.album?.images?.[0]?.url, emoji: "💍", flair: "top-ranked in every single timeline. married." });
  }

  /* 3am confession */
  const late = recentItems
    .map(i => ({ i, d: new Date(i.played_at) }))
    .filter(x => x.d.getHours() >= 0 && x.d.getHours() <= 4);
  if (late.length) {
    late.sort((a, b) => Math.abs(a.d.getHours() - 3) - Math.abs(b.d.getHours() - 3));
    const p = late[0];
    const hh = p.d.getHours() === 0 ? 12 : p.d.getHours();
    if (p.i.track?.name) q.push({ label: "3am confession", value: p.i.track.name, img: p.i.track.album?.images?.[1]?.url || p.i.track.album?.images?.[0]?.url, emoji: "🌙", flair: `caught at ${hh}:${String(p.d.getMinutes()).padStart(2, "0")}am. no judgment. some judgment.` });
  }

  /* main character */
  if (pool.length >= 20) {
    const counts = {};
    pool.forEach(t => { const n = t.artists?.[0]?.name; if (n) counts[n] = (counts[n] || 0) + 1; });
    const top = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
    if (top) {
      const pct = Math.round(top[1] / pool.length * 100);
      if (pct >= 15) {
        const aObj = bestArtists().find(a => a.name === top[0]);
        q.push({ label: "main character", value: top[0], img: aObj?.images?.[1]?.url || aObj?.images?.[0]?.url, emoji: "🎬", flair: `${pct}% of your rotation is one artist. it's giving era.` });
      }
    }
  }

  /* the one that got away */
  const sIds = new Set((DATA.topTracks.short_term?.items || []).map(t => t.id));
  const mIds = new Set((DATA.topTracks.medium_term?.items || []).map(t => t.id));
  const away = (DATA.topTracks.long_term?.items || []).find(t => t.id && !sIds.has(t.id) && !mIds.has(t.id));
  if (away?.name) q.push({ label: "the one that got away", value: away.name, img: away.album?.images?.[1]?.url || away.album?.images?.[0]?.url, emoji: "🥀", flair: "an all-time favorite you haven't touched in months. what happened?" });

  /* attention span check */
  const longest = pool.reduce((best, t) => ((t.duration_ms || 0) > (best?.duration_ms || 0) ? t : best), null);
  if (longest && longest.duration_ms > 300000) {
    const mm = Math.floor(longest.duration_ms / 60000);
    const ss = String(Math.floor((longest.duration_ms % 60000) / 1000)).padStart(2, "0");
    q.push({ label: "attention span check", value: longest.name, img: longest.album?.images?.[1]?.url || longest.album?.images?.[0]?.url, emoji: "⏳", flair: `you sit through ${mm}:${ss} of this. voluntarily.` });
  }

  /* library span */
  const yrs = pool.map(t => parseInt((t.album?.release_date || "").slice(0, 4))).filter(Boolean);
  if (yrs.length >= 5) {
    const a = Math.min(...yrs), b = Math.max(...yrs);
    if (b - a >= 10) q.push({ label: "library span", value: `${a} → ${b}`, emoji: "📼", flair: `${b - a} years of range. musically well-traveled.` });
  }

  return q.slice(0, 6);
}

/* what your song titles are about — token match, no regex drama */
function titleThemes() {
  const cats = [
    ["yearning", ["love", "heart", "miss", "need", "want", "hold", "stay", "forever", "kiss", "baby", "beautiful"]],
    ["crying", ["cry", "crying", "tears", "sad", "hurt", "sorry", "alone", "lonely", "broken", "blue", "pain", "goodbye"]],
    ["the club", ["dance", "party", "club", "move", "body", "floor", "shake", "bounce", "dancing"]],
    ["money", ["money", "rich", "gold", "cash", "diamond", "diamonds", "expensive", "paid", "million"]],
    ["god???", ["god", "heaven", "hell", "angel", "angels", "devil", "pray", "holy", "saint", "soul", "sin", "church", "gospel", "communion"]],
    ["being unwell", ["crazy", "mad", "insane", "sick", "fever", "high", "smoke", "drunk", "toxic", "haunted", "cursed", "dead", "ghost", "funeral"]],
    ["the night", ["night", "midnight", "moon", "dark", "3am", "2am", "late", "nocturnal"]],
  ];
  const pool = analysisPool();
  return cats.map(([label, words]) => {
    const n = pool.filter(t => {
      const tokens = " " + (t.name || "").toLowerCase().replace(/[^a-z0-9']+/g, " ") + " ";
      return words.some(w => tokens.includes(" " + w + " "));
    }).length;
    return [label, n];
  }).filter(([, n]) => n > 0).sort((a, b) => b[1] - a[1]).slice(0, 6);
}
function chartTitleThemes() {

  const max = rows[0][1];

/* attention span spectrum — track lengths, judged */
function chartAttention() {
  const durs = analysisPool().map(t => t.duration_ms).filter(Boolean);
  if (durs.length < 5) return `<div class="empty-note">not enough track data yet.</div>`;
  const defs = [
    ["under 2:30", "tiktok core", d => d < 150000],
    ["2:30–3:30", "radio brain", d => d >= 150000 && d < 210000],
    ["3:30–5:00", "album cut appreciator", d => d >= 210000 && d < 300000],
    ["5:00+", "prog tendencies", d => d >= 300000],

  const rows = defs.map(([range, nick, fn]) => [range, nick, durs.filter(fn).length]);
  const max = Math.max(...rows.map(r => r[2]), 1);
  const win = rows.reduce((a, b) => (b[2] > a[2] ? b : a));
  return `<div class="hbars">${rows.map(([range, nick, c]) => `
    <div class="hbar-row"><span class="hbar-label">${esc(range)}</span><div class="hbar-track"><div class="hbar-fill alt" style="width:${Math.max(c / max * 100, 4)}%"></div></div><span class="hbar-count">${c}</span></div>`).join("")}</div>

}

function pickArchetype(m) {
  const candidates = [
    ["gatekeeper", (m.obscurity - 50) / 50],
    ["chart_citizen", (28 - m.obscurity) / 28],
    ["time_traveler", (m.tasteAge - 16) / 14],
    ["loyalist", (m.consistency - 0.35) / 0.4],
    ["monogamist", (0.42 - m.variety) / 0.3],
    ["free_agent", (m.variety - 0.78) / 0.2],
    ["night_creature", (m.night - 0.32) / 0.3],
  ];
  candidates.sort((a, b) => b[1] - a[1]);
  const [key, score] = candidates[0];
  return score > 0.12 ? key : "omnivore";
}

function buildRead() {
  const m = getMetrics();
  const key = pickArchetype(m);
  const arch = ARCHETYPES[key];
  const seed = hashStr((DATA.me?.id || "guest") + "::" + key + "::" + state.readNonce);
  const rng = mulberry32(seed);

  const parts = [pickFrom(rng, arch.openers)];

  if (m.topArtist && m.topGenre) {
    parts.push(pickFrom(rng, [
      `<b>${esc(m.topArtist)}</b> is basically your roommate at this point, and <b>${esc(m.topGenre)}</b> is doing most of the emotional heavy lifting.`,

  if (m.peak) {
    parts.push(m.night >= 0.35
      ? pickFrom(rng, [
          `also, <b>${m.nightPct}%</b> of your recent listening happens after 10pm, which is either romantic or concerning.`,
          `peak listening hour: <b>${m.peak}</b>. the moon knows your playlists better than the sun does.`,

          `your busiest listening hour is <b>${m.peak}</b>, which is almost suspiciously well-adjusted.`,

  const closers = [];
  if (m.explicit >= 55) closers.push(`and <b>${m.explicit}%</b> of your top songs are explicit. your aux privileges are under review.`);
  if (m.tasteAge >= 21) closers.push(`your average song came out in <b>${m.avgYear}</b> — old enough to legally drink. let that sink in.`);
  else if (m.tasteAge >= 12) closers.push(`your average song is from <b>${m.avgYear}</b>. not old, just... seasoned.`);

  if (!closers.length) closers.push(`final verdict: <b>${m.obscurity}/100</b> obscurity, taste age <b>${m.tasteAge}</b>. genuinely one of the listeners of all time.`);
  parts.push(pickFrom(rng, closers));

  return { key, name: arch.name, vibe: arch.vibe, text: parts.join(" ") };

async function generateRecs() {
  const paint = () => { const t = document.getElementById("recsTarget"); if (t) t.innerHTML = recsBlock(); };
  if (state.demo) { state.recs = demoRecs(); state.recsSource = "live"; paint(); return; }
  state.recsLoading = true;
  state.recsNote = "";
  paint();

  const known = new Set();
  ["short_term", "medium_term", "long_term"].forEach(r => (DATA.topTracks[r]?.items || []).forEach(t => known.add(t.id)));
  (DATA.recent?.items || []).forEach(i => { if (i.track?.id) known.add(i.track.id); });
  const seenNames = new Set();
  const keyOf = t => (t.name + "::" + (t.artists?.[0]?.name || "")).toLowerCase();
  const m = getMetrics();
  const roster = bestArtists();
  const seeds = roster.slice(3, 15);
  let pool = [];
  const addTrack = (t, because) => {
    if (!t?.id || known.has(t.id) || seenNames.has(keyOf(t))) return;
    seenNames.add(keyOf(t));
    const popScore = m.obscurity >= 50 ? (100 - (t.popularity || 0)) : (t.popularity || 0);
    pool.push({ track: t, because: "bc " + because, score: popScore + Math.random() * 20 });
  };

  let failures = 0, lastErr = "";
  try {
    /* tier 1 — artist top tracks (blocked with 403 for some newer dev-mode apps) */
    if (seeds.length) {
      const results = await Promise.all(seeds.slice(0, 8).map(a =>
        apiStrict(`/artists/${a.id}/top-tracks?market=US`)
          .then(res => ({ artist: a, tracks: res.tracks || [] }))
          .catch(e => { if (e.message === "expired") throw e; failures++; lastErr = e.message; return { artist: a, tracks: [] }; })
      ));
      results.forEach(({ artist, tracks }) => tracks.forEach(t => addTrack(t, artist.name)));
    }
    /* tier 2 — search, still open to all apps */
    if (!pool.length && seeds.length) {
      const results = await Promise.all(seeds.slice(0, 6).map(a =>
        apiStrict(`/search?type=track&limit=10&q=${encodeURIComponent('artist:"' + a.name + '"')}`)
          .then(res => ({ artist: a, tracks: res.tracks?.items || [] }))
          .catch(e => { if (e.message === "expired") throw e; lastErr = e.message; return { artist: a, tracks: [] }; })
      ));
      results.forEach(({ artist, tracks }) => tracks.forEach(t => addTrack(t, artist.name)));
    }
    if (pool.length) {
      pool.sort((a, b) => b.score - a.score);
      state.recs = pool.slice(0, 10);
      state.recsSource = "live";
    } else {
      /* tier 3 — the vault: songs you loved and dropped. zero api calls, cannot fail. */
      const shortIds = new Set((DATA.topTracks.short_term?.items || []).map(t => t.id));
      const vaultSeen = new Set();
      const vault = [];
      [...(DATA.topTracks.medium_term?.items || []), ...(DATA.topTracks.long_term?.items || [])].forEach(t => {
        if (!t?.id || shortIds.has(t.id) || vaultSeen.has(t.id)) return;
        vaultSeen.add(t.id);
        vault.push({ track: t, because: "you dropped this" });
      });
      shuffleArr(vault);
      state.recs = vault.slice(0, 10);
      state.recsSource = "vault";
      state.recsNote = state.recs.length
        ? (failures ? `spotify blocks live picks for this app (${lastErr}) — so here are songs from your own history you've abandoned. bring one back.` : "nothing new found outside your charts — so here are songs you've abandoned. bring one back.")
        : "spotify wouldn't give up anything new and your history is too consistent to mine. genuinely impressive.";
    }
  } catch (e) {
    if (e.message === "expired") return;
    state.recs = [];
    state.recsNote = "couldn't reach spotify (" + e.message + "). give it a minute and try again.";
    state.recsSource = "vault";
  }
  state.recsLoading = false;
  paint();
}

/* ---------- charts ---------- */
function setWeeklyScale(s) {
  state.weeklyScale = s;
  const target = document.getElementById("weeklyChartTarget");
  if (target) target.innerHTML = chartWeekly();
  document.querySelectorAll("#weeklyPills .pill").forEach(b => b.setAttribute("aria-pressed", b.dataset.scale === s));
}
function chartWeekly() {
  const log = playLog();
  if (!log.length) return `<div class="empty-note">no listening logged yet — play some music and come back.</div>`;
  const windowDays = { two: 14, eight: 56, all: 9999 }[state.weeklyScale] || 9999;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const earliest = log.reduce((min, e) => Math.min(min, +new Date(e.at)), Date.now());
  const earliestDay = new Date(earliest);
  earliestDay.setHours(0, 0, 0, 0);
  const startMs = Math.max(today.getTime() - (windowDays - 1) * 86400000, earliestDay.getTime());

  const perDate = {};
  log.forEach(e => {
    const t = new Date(e.at);
    if (+t < startMs) return;
    const k = t.toDateString();
    perDate[k] = (perDate[k] || 0) + (e.ms || 210000) / 60000;
  });
  const buckets = [[], [], [], [], [], [], []];
  for (let t = startMs, guard = 0; t <= today.getTime() && guard < 400; t += 86400000, guard++) {
    const d = new Date(t);
    buckets[d.getDay()].push(perDate[d.toDateString()] || 0);
  }
  const order = [1, 2, 3, 4, 5, 6, 0];
  const labels = ["mon", "tue", "wed", "thu", "fri", "sat", "sun"];
  const totals = order.map(w => buckets[w].reduce((s, v) => s + v, 0));
  const top = Math.max(...totals);
  const max = Math.max(top, 1);
  const big = top > 0 ? labels[totals.indexOf(top)] : null;
  const grand = totals.reduce((s, v) => s + v, 0);
  const daysCovered = Object.keys(perDate).length;
  const fmtDur = v => v >= 60 ? (v / 60).toFixed(1).replace(".0", "") + "h" : Math.round(v) + "m";
  return `
    <div class="bars">${totals.map(v => `
      <div class="bar-col"><span class="bar-val">${v > 0 ? fmtDur(v) : ""}</span><div class="bar ${v > 0 ? "on" : ""} ${top > 0 && v === top ? "peak" : ""}" style="height:${Math.max(v / max * 100, 3)}%"></div></div>`).join("")}
    </div>
    <div class="bar-labels">${labels.map(l => `<span>${l}</span>`).join("")}</div>
    <div class="chart-note">${big ? `<span class="day-hero">your big day: ${big}</span>` : ""}<span class="caption">${fmtDur(grand)} total in this window · ${daysCovered} day${daysCovered === 1 ? "" : "s"} logged</span></div>`;
}
function chartClock() {
  const log = playLog();
  if (!log.length) return `<div class="empty-note">no plays logged yet.</div>`;
  const plays = new Array(24).fill(0);
  const mins = new Array(24).fill(0);
  log.forEach(e => {
    const h = new Date(e.at).getHours();
    plays[h]++;
    mins[h] += (e.ms || 210000) / 60000;
  });
  const maxP = Math.max(...plays, 1);
  const maxM = Math.max(...mins, 1);
  const W = 660, HH = 190, pb = 26, pt = 20;
  const gh = HH - pb - pt;
  const bw = W / 24;
  const peakH = plays.indexOf(maxP);

  let barsSvg = "", labelsSvg = "";
  const linePts = [];
  for (let h = 0; h < 24; h++) {
    const bh = Math.max((plays[h] / maxP) * gh, 2);
    const bx = h * bw + 2.5;
    barsSvg += `<rect x="${bx.toFixed(1)}" y="${(HH - pb - bh).toFixed(1)}" width="${(bw - 5).toFixed(1)}" height="${bh.toFixed(1)}" rx="3" fill="${plays[h] ? "rgba(29,185,84,0.42)" : "rgba(12,15,13,0.05)"}"><title>${hourLabel(h)}: ${plays[h]} play${plays[h] === 1 ? "" : "s"} · ${Math.round(mins[h])} min</title></rect>`;
    linePts.push(`${(h * bw + bw / 2).toFixed(1)},${(HH - pb - (mins[h] / maxM) * gh).toFixed(1)}`);
    if (h % 3 === 0) labelsSvg += `<text x="${(h * bw + bw / 2).toFixed(1)}" y="${HH - 8}" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9.5" fill="#8A958E">${hourLabel(h)}</text>`;
  }
  const peakX = Math.min(Math.max(peakH * bw + bw / 2, 46), W - 46);
  const peakY = HH - pb - (plays[peakH] / maxP) * gh;
  let hoverSvg = "";
  for (let h = 0; h < 24; h++) {
    hoverSvg += `<rect x="${(h * bw).toFixed(1)}" y="0" width="${bw.toFixed(1)}" height="${HH - pb}" fill="transparent" data-hour="${hourLabel(h)}" data-plays="${plays[h]}" data-mins="${Math.round(mins[h])}" onmouseover="clockTip(event, true)" onmouseout="clockTip(event, false)" style="cursor: crosshair;"/>`;
  }
  return `
    <div class="chart-tip" id="clockTip"></div>
    <svg viewBox="0 0 ${W} ${HH}" style="width:100%; height:auto; display:block; overflow:visible;">
      <line x1="0" y1="${HH - pb}" x2="${W}" y2="${HH - pb}" stroke="rgba(12,15,13,0.08)" stroke-width="1"/>
      ${barsSvg}
      <polyline points="${linePts.join(" ")}" fill="none" stroke="#0C0F0D" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${(peakH * bw + bw / 2).toFixed(1)}" cy="${peakY.toFixed(1)}" r="4.5" fill="#1DB954" stroke="#FFFFFF" stroke-width="2"/>

function clockTip(evt, on) {
  const tip = document.getElementById("clockTip");
  if (!tip) return;
  if (!on) { tip.style.opacity = "0"; return; }
  const d = evt.target.dataset;
  tip.textContent = `${d.hour} — ${d.plays} play${d.plays === "1" ? "" : "s"} · ${d.mins} min`;
  const box = tip.parentElement.getBoundingClientRect();
  const r = evt.target.getBoundingClientRect();
  tip.style.left = Math.max(4, Math.min(r.left - box.left + r.width / 2 - 62, box.width - 150)) + "px";
  tip.style.top = Math.max(2, r.top - box.top - 6) + "px";
  tip.style.opacity = "1";
}
function chartDecades() {
  const pool = analysisPool();
  const counts = {};
  pool.forEach(t => {
    const y = parseInt((t.album?.release_date || "").slice(0, 4));
    if (!y) return;
    const dec = Math.floor(y / 10) * 10;
    counts[dec] = (counts[dec] || 0) + 1;
  });
  const rows = Object.entries(counts).sort((a, b) => a[0] - b[0]);
  const total = rows.reduce((s, [, v]) => s + v, 0) || 1;
  if (!rows.length) return { donut: `<div class="empty-note">not enough data yet.</div>`, legend: "" };

  let svg = `<svg viewBox="0 0 200 200" width="150" height="150" style="transform: rotate(-90deg);" aria-hidden="true">`;
  let angle = 0;
  rows.forEach(([dec, count], i) => {
    const slice = (count / total) * 360;
    if (rows.length === 1) {
      svg += `<circle cx="100" cy="100" r="85" fill="${PALETTE[i % PALETTE.length]}"/>`;
      angle += slice;
      return;
    }
    const x1 = 100 + 85 * Math.cos(angle * Math.PI / 180);
    const y1 = 100 + 85 * Math.sin(angle * Math.PI / 180);
    angle += slice;
    const x2 = 100 + 85 * Math.cos(angle * Math.PI / 180);
    const y2 = 100 + 85 * Math.sin(angle * Math.PI / 180);
    svg += `<path d="M 100 100 L ${x1} ${y1} A 85 85 0 ${slice > 180 ? 1 : 0} 1 ${x2} ${y2} Z" fill="${PALETTE[i % PALETTE.length]}" stroke="#FFFFFF" stroke-width="2.5"/>`;
  });
  svg += `<circle cx="100" cy="100" r="50" fill="#FFFFFF"/></svg><span class="donut-lbl">eras</span>`;
  const legend = rows.map(([dec, count], i) =>
    `<div class="legend-item"><span class="dot" style="background:${PALETTE[i % PALETTE.length]}"></span>${dec}s<span class="l-val">${Math.round(count / total * 100)}%</span></div>`).join("");
  return { donut: svg, legend };
}

function loadImg(url) {
  return new Promise(res => {
    if (!url) return res(null);
    const im = new Image();
    im.crossOrigin = "anonymous";
    im.onload = () => res(im);
    im.onerror = () => res(null);
    im.src = url;
  });
}
function rr(c, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}
function clipText(ctx, text, maxW) {
  if (ctx.measureText(text).width <= maxW) return text;
  let t = text;
  while (t.length > 1 && ctx.measureText(t + "…").width > maxW) t = t.slice(0, -1);
  return t + "…";
}
function wrapLines(ctx, text, maxW, maxLines) {
  const words = text.split(/\s+/);
  const lines = [];
  let line = "";
  for (const w of words) {
    const test = line ? line + " " + w : w;
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line);
      line = w;
      if (lines.length === maxLines - 1) break;
    } else line = test;
  }
  if (line && lines.length < maxLines) lines.push(line);
  if (lines.length === maxLines && words.join(" ").length > lines.join(" ").length) {
    lines[maxLines - 1] = clipText(ctx, lines[maxLines - 1] + "…", maxW);
  }
  return lines;
}
function drawMixedTitle(ctx, x, y, w1, w2, size, inkColor) {
  ctx.font = `900 ${size}px Archivo, sans-serif`;
  ctx.fillStyle = inkColor;
  ctx.fillText(w1, x, y);
  const width1 = ctx.measureText(w1).width;
  ctx.font = `italic 400 ${size}px "Instrument Serif", serif`;
  ctx.fillText(" " + w2, x + width1, y);
  const width2 = ctx.measureText(" " + w2).width;
  ctx.font = `900 ${size}px Archivo, sans-serif`;
  ctx.fillStyle = "#1DB954";
  ctx.fillText(".", x + width1 + width2, y);
}

async function renderStoryCard() {
  const cv = document.getElementById("storyCanvas");
  if (!cv) return;
  const ctx = cv.getContext("2d");
  const W = 1080, H = 1920;
  const theme = STORY_THEMES[state.storyTheme];
  const tpl = state.storyTemplate;

  try {
    await Promise.all([
      document.fonts.load('900 104px Archivo'), document.fonts.load('800 44px Archivo'),
      document.fonts.load('500 34px Archivo'), document.fonts.load('italic 400 104px "Instrument Serif"'),
      document.fonts.load('600 26px "IBM Plex Mono"'),
    ]);
  } catch (e) { /* fallback fonts */ }

  /* background + orbs */
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = theme.bg;
  ctx.fillRect(0, 0, W, H);
  theme.orbs.forEach(o => {
    const g = ctx.createRadialGradient(o.x * W, o.y * H, 0, o.x * W, o.y * H, o.r * W);
    g.addColorStop(0, o.color);
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  });

  /* glass card */
  const cx = 70, cy = 200, cw = W - 140, ch = 1520;
  ctx.save();
  ctx.shadowColor = "rgba(10,20,14,0.2)";
  ctx.shadowBlur = 70;
  ctx.shadowOffsetY = 26;
  rr(ctx, cx, cy, cw, ch, 56);
  ctx.fillStyle = theme.card;
  ctx.fill();
  ctx.restore();
  rr(ctx, cx, cy, cw, ch, 56);
  ctx.strokeStyle = theme.cardStroke;
  ctx.lineWidth = 2;
  ctx.stroke();

  /* header label */
  const labels = { read: "THE READ", roast: "THE ROAST", receipts: "THE RECEIPTS", sidequests: "SIDE QUESTS", obscurity: "OBSCURITY REPORT", deepcuts: "DEEP CUTS · " + RANGE_SHORT[state.storyRange], tracks: "TOP TRACKS · " + RANGE_SHORT[state.storyRange], artists: "TOP ARTISTS · " + RANGE_SHORT[state.storyRange] };
  ctx.textBaseline = "alphabetic";
  ctx.textAlign = "left";
  try { ctx.letterSpacing = "4px"; } catch (e) {}
  ctx.font = '600 23px "IBM Plex Mono", monospace';
  ctx.fillStyle = "#1DB954";
  ctx.fillText(clipText(ctx, "YOURMUSICSTATS.AI · " + labels[tpl], cw - 148), cx + 74, cy + 116);
  try { ctx.letterSpacing = "0px"; } catch (e) {}

  if (tpl === "read") await storyRead(ctx, theme, cx, cy, cw, ch);
  else if (tpl === "roast") await storyRoast(ctx, theme, cx, cy, cw, ch);
  else if (tpl === "sidequests") await storySideQuests(ctx, theme, cx, cy, cw, ch);
  else if (tpl === "receipts") await storyReceipts(ctx, theme, cx, cy, cw, ch);
  else if (tpl === "obscurity") await storyObscurity(ctx, theme, cx, cy, cw, ch);
  else await storyList(ctx, theme, cx, cy, cw, ch, tpl);

  /* footers */
  const user = (DATA.me?.display_name || "me").toLowerCase();
  const dateStr = new Date().toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" }).toLowerCase();
  ctx.font = '500 26px "IBM Plex Mono", monospace';
  ctx.fillStyle = theme.faint;
  ctx.textAlign = "left";
  ctx.fillText("@" + user, cx + 74, cy + ch - 66);
  ctx.textAlign = "right";
  ctx.fillText(dateStr, cx + cw - 74, cy + ch - 66);
  ctx.textAlign = "center";
  ctx.font = '600 26px "IBM Plex Mono", monospace';
  ctx.fillText("yourmusicstats.ai", W / 2, cy + ch + 92);
  ctx.textAlign = "left";
}

async function storyRead(ctx, theme, cx, cy, cw, ch) {
  const m = getMetrics();
  const r = readPlainText();
  const nameWords = r.name.split(" ");
  const w1 = nameWords[0];
  const w2 = nameWords.slice(1).join(" ");

  ctx.font = "500 34px Archivo, sans-serif";
  ctx.fillStyle = theme.muted;
  ctx.fillText("i am", cx + 74, cy + 214);

  let size = 104;
  while (size > 56) {
    ctx.font = `900 ${size}px Archivo, sans-serif`;
    const wid1 = ctx.measureText(w1).width;
    ctx.font = `italic 400 ${size}px "Instrument Serif", serif`;
    const wid2 = ctx.measureText(" " + w2).width;
    if (wid1 + wid2 + 44 < cw - 148) break;
    size -= 6;
  }
  drawMixedTitle(ctx, cx + 74, cy + 332, w1, w2, size, theme.ink);

  ctx.font = '600 26px "IBM Plex Mono", monospace';
  ctx.fillStyle = "#1DB954";
  ctx.fillText(clipText(ctx, r.vibe, cw - 148), cx + 74, cy + 400);

  /* body — hard cap on line count so it can never run into the stats strip */
  const stripY = cy + ch - 250;
  const bodyTop = cy + 496;
  const lineH = 58;
  const maxLines = Math.floor((stripY - 90 - bodyTop) / lineH);
  ctx.font = "500 37px Archivo, sans-serif";
  ctx.fillStyle = theme.muted;
  const lines = wrapLines(ctx, r.plain, cw - 148, maxLines);
  lines.forEach((line, i) => ctx.fillText(line, cx + 74, bodyTop + i * lineH));

  /* stats strip */
  ctx.strokeStyle = theme.divider;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx + 74, stripY - 58);
  ctx.lineTo(cx + cw - 74, stripY - 58);
  ctx.stroke();
  const thirdStat = m.topGenre ? ["top genre", m.topGenre] : ["status", obscurityTitle(m.obscurity)];
  const stats = [["obscurity", m.obscurity + "/100"], ["taste age", m.tasteAge + " yrs"], thirdStat];
  const colW = (cw - 148) / 3;
  stats.forEach(([label, val], i) => {
    const sx = cx + 74 + i * colW;
    ctx.font = '600 21px "IBM Plex Mono", monospace';
    ctx.fillStyle = theme.faint;
    ctx.fillText(label.toUpperCase(), sx, stripY);
    ctx.font = "800 38px Archivo, sans-serif";
    ctx.fillStyle = theme.ink;
    ctx.fillText(clipText(ctx, String(val), colW - 34), sx, stripY + 54);
  });
}

async function storyRoast(ctx, theme, cx, cy, cw, ch) {
  drawMixedTitle(ctx, cx + 74, cy + 256, "the", "roast", 104, theme.ink);
  ctx.font = "500 34px Archivo, sans-serif";
  ctx.fillStyle = theme.muted;
  ctx.fillText("generated from my actual data. rude.", cx + 74, cy + 318);

  const lines = roastLines();
  let y = cy + 456;
  lines.forEach((line, i) => {
    if (i > 0) {
      ctx.strokeStyle = theme.divider;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx + 74, y - 66);
      ctx.lineTo(cx + cw - 74, y - 66);
      ctx.stroke();
    }
    ctx.font = '600 30px "IBM Plex Mono", monospace';
    ctx.fillStyle = "#1DB954";
    ctx.fillText("0" + (i + 1), cx + 74, y);
    ctx.font = "600 40px Archivo, sans-serif";
    ctx.fillStyle = theme.ink;
    const wrapped = wrapLines(ctx, line, cw - 280, 3);
    wrapped.forEach((w, j) => ctx.fillText(w, cx + 156, y + j * 54));
    y += wrapped.length * 54 + 78;
  });
}

async function storySideQuests(ctx, theme, cx, cy, cw, ch) {
  drawMixedTitle(ctx, cx + 74, cy + 256, "side", "quests", 104, theme.ink);
  ctx.font = "500 34px Archivo, sans-serif";
  ctx.fillStyle = theme.muted;
  ctx.fillText("extremely specific stats nobody asked for", cx + 74, cy + 318);

  const qs = sideQuests().slice(0, 4);
  if (!qs.length) {
    ctx.font = "500 34px Archivo, sans-serif";
    ctx.fillStyle = theme.faint;
    ctx.fillText("not enough listening history yet", cx + 74, cy + 480);
    return;
  }
  const y0 = cy + 452;
  const rowH = 262;
  qs.forEach((q, i) => {
    const y = y0 + i * rowH;
    if (i > 0) {
      ctx.strokeStyle = theme.divider;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx + 74, y - 52);
      ctx.lineTo(cx + cw - 74, y - 52);
      ctx.stroke();
    }
    ctx.font = '600 24px "IBM Plex Mono", monospace';
    ctx.fillStyle = "#1DB954";
    ctx.fillText(q.label.toUpperCase(), cx + 74, y);
    ctx.font = "800 46px Archivo, sans-serif";
    ctx.fillStyle = theme.ink;
    ctx.fillText(clipText(ctx, q.value, cw - 148), cx + 74, y + 64);
    ctx.font = 'italic 400 32px "Instrument Serif", serif';
    ctx.fillStyle = theme.muted;
    const flairLines = wrapLines(ctx, q.flair, cw - 148, 2);
    flairLines.forEach((f, j) => ctx.fillText(f, cx + 74, y + 122 + j * 42));
  });
}

async function storyReceipts(ctx, theme, cx, cy, cw, ch) {
  const m = getMetrics();
  drawMixedTitle(ctx, cx + 74, cy + 256, "the", "receipts", 104, theme.ink);
  ctx.font = "500 34px Archivo, sans-serif";
  ctx.fillStyle = theme.muted;
  ctx.fillText("my listening, quantified", cx + 74, cy + 318);

  const cells = [
    { label: "OBSCURITY", value: String(m.obscurity), unit: "/100", flair: obscurityTitle(m.obscurity) },
    { label: "TASTE AGE", value: String(m.tasteAge), unit: " yrs", flair: "avg release " + m.avgYear },
    { label: "RANGE", value: String(m.uniqueArtists), unit: "/" + (m.poolSize || 50), flair: m.variety >= 0.75 ? "commitment issues" : m.variety <= 0.45 ? "ride or die energy" : "healthy balance" },
    { label: "PEAK HOUR", value: m.peak || "—", unit: "", flair: m.night >= 0.35 ? "nocturnal, noted" : "daylight approved" },
  ];
  const gx0 = cx + 74, gy0 = cy + 402;
  const gap = 36;
  const cellW = (cw - 148 - gap) / 2;
  const cellH = 386;
  cells.forEach((c, i) => {
    const x = gx0 + (i % 2) * (cellW + gap);
    const y = gy0 + Math.floor(i / 2) * (cellH + gap);
    rr(ctx, x, y, cellW, cellH, 34);
    ctx.fillStyle = theme.cellBg;
    ctx.fill();
    rr(ctx, x, y, cellW, cellH, 34);
    ctx.strokeStyle = theme.cardStroke;
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.font = '600 24px "IBM Plex Mono", monospace';
    ctx.fillStyle = theme.faint;
    ctx.fillText(c.label, x + 44, y + 80);

    ctx.font = "900 86px Archivo, sans-serif";
    ctx.fillStyle = theme.ink;
    const shown = clipText(ctx, c.value, cellW - 88);
    ctx.fillText(shown, x + 44, y + 198);
    if (c.unit) {
      const vw = ctx.measureText(shown).width;
      ctx.font = '600 30px "IBM Plex Mono", monospace';
      ctx.fillStyle = theme.faint;
      ctx.fillText(c.unit, x + 44 + vw + 10, y + 198);
    }
    ctx.font = 'italic 400 34px "Instrument Serif", serif';
    ctx.fillStyle = "#1DB954";
    ctx.fillText(clipText(ctx, c.flair, cellW - 88), x + 44, y + 288);
  });

  ctx.font = "500 30px Archivo, sans-serif";
  ctx.fillStyle = theme.faint;
  ctx.fillText("run yours at yourmusicstats.ai", cx + 74, gy0 + cellH * 2 + gap + 96);
}

async function storyObscurity(ctx, theme, cx, cy, cw, ch) {
  const m = getMetrics();
  drawMixedTitle(ctx, cx + 74, cy + 256, "the", "deep end", 100, theme.ink);
  ctx.font = "500 34px Archivo, sans-serif";
  ctx.fillStyle = theme.muted;
  ctx.fillText("my obscurity score", cx + 74, cy + 318);

  /* gauge */
  const gx = cx + cw / 2, gy = cy + 690;
  const R = 265;
  ctx.lineWidth = 30;
  ctx.lineCap = "round";
  ctx.strokeStyle = theme.divider;
  ctx.beginPath();
  ctx.arc(gx, gy, R, Math.PI * 0.8, Math.PI * 2.2);
  ctx.stroke();
  ctx.strokeStyle = "#1DB954";
  ctx.beginPath();
  ctx.arc(gx, gy, R, Math.PI * 0.8, Math.PI * (0.8 + 1.4 * (Math.max(1, m.obscurity) / 100)));
  ctx.stroke();

  ctx.textAlign = "center";
  ctx.font = "900 185px Archivo, sans-serif";
  ctx.fillStyle = theme.ink;
  ctx.fillText(String(m.obscurity), gx, gy + 50);
  ctx.font = '600 32px "IBM Plex Mono", monospace';
  ctx.fillStyle = theme.faint;
  ctx.fillText("/100", gx, gy + 116);
  ctx.font = 'italic 400 58px "Instrument Serif", serif';
  ctx.fillStyle = "#1DB954";
  ctx.fillText(obscurityTitle(m.obscurity), gx, gy + R + 106);
  ctx.textAlign = "left";

  /* top 3 deepest cuts — sits well above the card footer */
  const cuts = obscureTop(3);
  const listY = gy + R + 196;
  ctx.font = '600 23px "IBM Plex Mono", monospace';
  ctx.fillStyle = theme.faint;
  ctx.fillText("MY DEEPEST CUTS", cx + 74, listY);
  cuts.forEach((t, i) => {
    const y = listY + 58 + i * 56;
    ctx.font = "700 33px Archivo, sans-serif";
    ctx.fillStyle = theme.ink;
    ctx.fillText(clipText(ctx, `${i + 1}. ${t.name}`, cw - 340), cx + 74, y);
    ctx.font = '600 23px "IBM Plex Mono", monospace';
    ctx.fillStyle = "#1DB954";
    ctx.textAlign = "right";
    ctx.fillText((t.popularity || 0) + " pop", cx + cw - 74, y);
    ctx.textAlign = "left";
  });
}

async function storyList(ctx, theme, cx, cy, cw, ch, tpl) {
  const isTracks = tpl === "tracks";
  const isDeep = tpl === "deepcuts";
  const items = isDeep
    ? obscureTop(5, state.storyRange)
    : (isTracks ? (DATA.topTracks[state.storyRange]?.items || []) : (DATA.topArtists[state.storyRange]?.items || [])).slice(0, 5);

  const titles = { tracks: ["on", "repeat"], artists: ["heavy", "rotation"], deepcuts: ["deep", "cuts"] };
  drawMixedTitle(ctx, cx + 70, cy + 260, titles[tpl][0], titles[tpl][1], 104, theme.ink);
  ctx.font = "500 34px Archivo, sans-serif";
  ctx.fillStyle = theme.muted;
  const subs = { tracks: "my top 5 tracks right now · plays estimated", artists: "my top 5 artists right now", deepcuts: "the 5 least popular songs i love" };
  ctx.fillText(subs[tpl], cx + 74, cy + 322);

  const rowsTop = cy + 420;
  const rowH = 200;
  const artSize = 144;
  const useAlbum = isTracks || isDeep;
  const imgs = await Promise.all(items.map(it => {
    const url = useAlbum ? (it.album?.images?.[0]?.url || it.album?.images?.[1]?.url) : (it.images?.[0]?.url || it.images?.[1]?.url);
    return loadImg(url);
  }));

  if (!items.length) {
    ctx.font = "500 34px Archivo, sans-serif";
    ctx.fillStyle = theme.faint;
    ctx.fillText("not enough listening history for this window yet", cx + 74, rowsTop + 60);
    return;
  }

  items.forEach((it, i) => {
    const ry = rowsTop + i * rowH;
    const artX = cx + 70, artY = ry;
    if (i > 0) {
      ctx.strokeStyle = theme.divider;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx + 70, ry - 28);
      ctx.lineTo(cx + cw - 70, ry - 28);
      ctx.stroke();
    }
    ctx.save();
    if (useAlbum) rr(ctx, artX, artY, artSize, artSize, 26);
    else { ctx.beginPath(); ctx.arc(artX + artSize / 2, artY + artSize / 2, artSize / 2, 0, Math.PI * 2); }
    ctx.clip();
    if (imgs[i]) {
      ctx.drawImage(imgs[i], artX, artY, artSize, artSize);
    } else {
      ctx.fillStyle = PALETTE[i % PALETTE.length];
      ctx.fillRect(artX, artY, artSize, artSize);
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.font = "800 64px Archivo, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText((it.name || "?")[0].toUpperCase(), artX + artSize / 2, artY + artSize / 2 + 22);
      ctx.textAlign = "left";
    }
    ctx.restore();

    const textX = artX + artSize + 44;
    const maxTextW = cx + cw - 70 - textX - (isDeep ? 185 : isTracks ? 220 : 140);
    const subLine = useAlbum ? (it.artists || []).map(a => a.name).join(", ") : ((it.genres || [])[0] || "");
    ctx.font = "800 44px Archivo, sans-serif";
    ctx.fillStyle = theme.ink;
    ctx.fillText(clipText(ctx, it.name || "", maxTextW), textX, ry + 68);
    ctx.font = "500 32px Archivo, sans-serif";
    ctx.fillStyle = theme.muted;
    ctx.fillText(clipText(ctx, subLine, maxTextW), textX, ry + 116);

    let sideLabel, sideColor, sideFont;
    if (isDeep) { sideLabel = (it.popularity || 0) + " pop"; sideColor = "#1DB954"; sideFont = 30; }
    else if (isTracks) { sideLabel = "~" + estPlays(i + 1, state.storyRange) + " plays"; sideColor = i === 0 ? "#1DB954" : theme.faint; sideFont = 26; }
    else { sideLabel = String(i + 1).padStart(2, "0"); sideColor = i === 0 ? "#1DB954" : theme.faint; sideFont = 30; }
    ctx.font = `600 ${sideFont}px "IBM Plex Mono", monospace`;
    ctx.fillStyle = sideColor;
    ctx.textAlign = "right";
    ctx.fillText(sideLabel, cx + cw - 74, ry + 92);
    ctx.textAlign = "left";
  });
}

function downloadStory() {
  const cv = document.getElementById("storyCanvas");
  if (!cv) return;
  try {
    const a = document.createElement("a");
    a.download = `yourmusicstats-${state.storyTemplate}.png`;
    a.href = cv.toDataURL("image/png");
    a.click();
    toast("Story card downloaded. Go post it.");
  } catch (e) {
    toast("Couldn't export — some album art blocked it. Try a different template or window.");
  }
}

/* ============================================================
   boot
   ============================================================ */
(async function boot() {
  const params = new URLSearchParams(location.search);
  if (params.get("code")) {
    await exchangeToken(params.get("code"));
    history.replaceState({}, "", REDIRECT);
  }
  if (store.get("token") && Date.now() < +(store.get("token_expiry") || 0)) {
    await loadData();
  } else {
    renderLogin();
  }
})();

</script>
