/* Cryptographic Security Layers for Account Handshakes */
function generateRandomStateString(len) {
  const c = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  const vals = crypto.getRandomValues(new Uint8Array(len));
  return Array.from(vals, v => c[v % c.length]).join("");
}
async function computeSha256Challenge(verifier) {
  const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
async function initiateOAuthRoute() {
  const verifier = generateRandomStateString(64);
  storageController.set("verifier", verifier);
  const challenge = await computeSha256Challenge(verifier);
  const params = new URLSearchParams({
    response_type: "code", client_id: CLIENT_ID, scope: SCOPES, redirect_uri: REDIRECT,
    code_challenge_method: "S256", code_challenge: challenge,
  });
  location.href = "https://accounts.spotify.com/authorize?" + params;
}
async function executeTokenExchange(code) {
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ grant_type: "authorization_code", code, redirect_uri: REDIRECT, client_id: CLIENT_ID, code_verifier: storageController.get("verifier") }),
  });
  if (!res.ok) throw new Error("Exchange validation failed.");
  const payload = await res.json();
  storageController.set("token", payload.access_token);
  storageController.set("token_expiry", Date.now() + payload.expires_in * 1000);
}
async function dispatchSecureApiCall(endpoint, parameters = {}) {
  const res = await fetch("https://api.spotify.com/v1" + endpoint, {
    ...parameters, headers: { ...parameters.headers, Authorization: "Bearer " + storageController.get("token") },
  });
  if (res.status === 401) { storageController.del("token"); renderAuthorizationGate(); throw new Error("Stale session security lifecycle context."); }
  if (res.status === 429) {
    const fallbackDelay = (parseInt(res.headers.get("Retry-After")) || 3) * 1000;
    await new Promise(r => setTimeout(r, fallbackDelay));
    return dispatchSecureApiCall(endpoint, parameters);
  }
  return res.json();
}

/* Client Side Machine Learning / Descriptive Predictive Data Translators */
function processGenreWeightMatrices(artists) {
  const weightRegistry = {};
  artists.forEach((a, index) => {
    const mechanicalWeight = artists.length - index;
    (a.genres || []).forEach(g => {
      weightRegistry[g] = (weightRegistry[g] || 0) + mechanicalWeight;
    });
  });
  const descendingDataset = Object.entries(weightRegistry).sort((a, b) => b[1] - a[1]);
  const primarySlices = descendingDataset.slice(0, 4);
  const totalWeightVolume = primarySlices.reduce((sum, [, val]) => sum + val, 0) || 1;
  return primarySlices.map(([name, value], i) => ({
    name, pct: value / totalWeightVolume, color: PALETTE_MATRIX[i % PALETTE_MATRIX.length]
  }));
}

function computeWeeklyPlaybackIntervals(historyLog) {
  const boundaryTimeLimit = Date.now() - 7 * 86400000;
  const metricsCache = {};
  historyLog.items.forEach(logItem => {
    if (new Date(logItem.played_at).getTime() < boundaryTimeLimit) return;
    const trackingId = logItem.track.id;
    if (!metricsCache[trackingId]) metricsCache[trackingId] = { track: logItem.track, telemetryCount: 0 };
    metricsCache[trackingId].telemetryCount++;
  });
  return Object.values(metricsCache).sort((a, b) => b.telemetryCount - a.telemetryCount).slice(0, 5);
}

function recalculateGenreStateEngine() {

    computationalTargetPool = (DATA_STORE_NODE.topArtists.medium_term && DATA_STORE_NODE.topArtists.medium_term.items) ? DATA_STORE_NODE.topArtists.medium_term.items : [];
    timelineLabel = "6 Months";
  } else if (activeGenreChronologyState === 3) {
    computationalTargetPool = (DATA_STORE_NODE.topArtists.long_term && DATA_STORE_NODE.topArtists.long_term.items) ? DATA_STORE_NODE.topArtists.long_term.items : [];
    timelineLabel = "All-Time";
  }

  const calibratedGenres = processGenreWeightMatrices(computationalTargetPool);
  
  const targetRangeString = activeGenreChronologyState === 1 ? 'short_term' : activeGenreChronologyState === 2 ? 'medium_term' : 'long_term';
  const activeTracksSubset = DATA_STORE_NODE.topTracks[targetRangeString]?.items || [];
  
  const currentPopularityAverage = activeTracksSubset.length ? (activeTracksSubset.reduce((sum, track) => sum + track.popularity, 0) / activeTracksSubset.length) : 50;
  const computedObscurityIndex = Math.round(100 - currentPopularityAverage);

  const obscValueEl = document.getElementById("aiObscurityVal");
  if (obscValueEl) obscValueEl.innerHTML = `${computedObscurityIndex}<small>/100</small>`;
  
  const obscDescEl = document.getElementById("aiObscurityDesc");
  if (obscDescEl) {
    obscDescEl.textContent = computedObscurityIndex >= 50 
      ? "AI Model calculates a highly non-conformist sonic trajectory safely isolated from viral trends." 
      : "AI Model establishes direct baseline consistency with standard mainstream programmatic metrics.";
  }

  const pieCanvas = document.getElementById("pieGraphicVectorNodeCanvas");
  if (!pieCanvas) return;

  // Vector Graphic SVG Arc Generation Pipeline Loop
  let svgStringPayload = `<svg viewBox="0 0 200 200" width="180" height="180" style="display:block; max-width:100%;">`;
  let runningAngleCoordinate = 0;
  
  if (calibratedGenres.length === 0) {
    svgStringPayload += `<circle cx="100" cy="100" r="85" fill="rgba(0,0,0,0.03)" stroke="var(--glass-border)" stroke-width="2"/>`;
  } else {
    calibratedGenres.forEach(g => {
      const mechanicalSectorAngle = g.pct * 360;
      const xStart = 100 + 85 * Math.cos((runningAngleCoordinate - 90) * Math.PI / 180);
      const yStart = 100 + 85 * Math.sin((runningAngleCoordinate - 90) * Math.PI / 180);
      runningAngleCoordinate += mechanicalSectorAngle;
      const xEnd = 100 + 85 * Math.cos((runningAngleCoordinate - 90) * Math.PI / 180);
      const yEnd = 100 + 85 * Math.sin((runningAngleCoordinate - 90) * Math.PI / 180);
      
      svgStringPayload += `<path d="M 100 100 L ${xStart} ${yStart} A 85 85 0 ${mechanicalSectorAngle > 180 ? 1 : 0} 1 ${xEnd} ${yEnd} Z" fill="${g.color}" stroke="var(--bg-card-solid)" stroke-width="2.5"/>`;
    });
  }
  
  svgStringPayload += `<circle cx="100" cy="100" r="48" fill="#FFFFFF" /></svg>`;
  svgStringPayload += `
    <div class="pie-center-node">
      <span class="val">Chrono</span>
      <span class="lbl" style="font-size:14px; font-weight:800; color:var(--gemini-purple);">${timelineLabel}</span>
    </div>`;
  
  pieCanvas.innerHTML = svgStringPayload;
  
  document.getElementById("pieLegendMatrixTarget").innerHTML = calibratedGenres.length ? calibratedGenres.map(g => `

function calculateDecadesDistributionProfile() {
  const historyProfileTracks = DATA_STORE_NODE.topTracks.medium_term?.items || [];
  const metricsCache = {};
  historyProfileTracks.forEach(t => {
    const structuralReleaseYearValue = parseInt((t.album.release_date || "").slice(0, 4));
    if (!structuralReleaseYearValue) return;
    const computedDecadeBucketIndex = Math.floor(structuralReleaseYearValue / 10) * 10;
    metricsCache[computedDecadeBucketIndex] = (metricsCache[computedDecadeBucketIndex] || 0) + 1;
  });
  const dataRowsSorted = Object.entries(metricsCache).sort((a, b) => a[0] - b[0]);
  const relativeMaxPeakValue = Math.max(...dataRowsSorted.map(item => item[1]), 1);
  const container = document.getElementById("decadesGraphTargetEngine");
  if (!container) return;

  if (dataRowsSorted.length === 0) {
    container.innerHTML = `<div class="sub-narrative">Historical index records unfilled.</div>`;
    return;
  }
  container.innerHTML = dataRowsSorted.map(([decadeString, totalCount]) => `
    <div class="graph-row-bar">
      <span class="g-label">${decadeString}s</span>
      <div class="g-track-container"><div class="g-fill-node" style="width:${(totalCount / relativeMaxPeakValue * 100).toFixed(1)}%;"></div></div>
      <span class="g-value-lbl">${totalCount}</span>
    </div>`).join("");
}

function calculateCircadianDensityProfile() {
  const chronologicalHourlyArray = new Array(24).fill(0);
  const playLogs = DATA_STORE_NODE.recent?.items || [];
  playLogs.forEach(playEventLog => chronologicalHourlyArray[new Date(playEventLog.played_at).getHours()]++);
  const scalingMaximumPeak = Math.max(...chronologicalHourlyArray, 1);

  const container = document.getElementById("circadianBarsTargetEngine");
  if (!container) return;
  
  container.innerHTML = chronologicalHourlyArray.map((hourlyCount, h) => `
    <div class="hour-bar-column"><div class="bar-vector" style="height:${Math.max(hourlyCount / scalingMaximumPeak * 100, 4)}%;" title="Hour index [${h}]: ${hourlyCount} logged instances"></div></div>`).join("");
  document.getElementById("circadianLabelsTargetEngine").innerHTML = Array.from({ length: 24 }, (_, hourIndex) => `
    <span>${hourIndex % 4 === 0 ? (hourIndex === 0 ? "12am" : hourIndex === 12 ? "12pm" : hourIndex > 12 ? (hourIndex - 12) + "pm" : hourIndex + "am") : ""}</span>`).join("");
}

async function dispatchPlaylistDeploymentSequence() {
  try {
    const selectedActiveRangeToken = appStage.querySelector(".toggle-bay button[data-type='range'][aria-pressed='true']").dataset.value;
    const executionTracksPayload = DATA_STORE_NODE.topTracks[selectedActiveRangeToken]?.items || [];
    if (!executionTracksPayload.length) return;

    displayNotificationToast("Initializing automated Spotify.AI account array allocations...");
    
    const targetPlaylistShell = await dispatchSecureApiCall(`/users/${DATA_STORE_NODE.me.id}/playlists`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name: `Spotify.AI // Top ${activeTrackLimitConfig} Configuration`,
        description: `Automated dynamic playback translation profile. Compiled via Spotify.AI analytics engine algorithms.`,
        public: false
      })
    });

    await dispatchSecureApiCall(`/playlists/${targetPlaylistShell.id}/tracks`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ uris: executionTracksPayload.slice(0, activeTrackLimitConfig).map(trackItem => trackItem.uri) })
    });

    displayNotificationToast("Account sync complete. Playlist verified.");
  } catch (errorContext) {
    console.error(errorContext);
    displayNotificationToast("Pipeline operational validation block error occurred.");
  }
}

function initializeExportOverlayStage(type) {
  const overlay = document.getElementById("socialExportOverlay");
  const canvasViewport = document.getElementById("canvasFrameContainer");
  canvasViewport.innerHTML = '<canvas id="cinemaRenderingNode" width="720" height="1280"></canvas>';
  overlay.style.display = "flex";

  let computationalTargetPool = DATA_STORE_NODE.topArtists.short_term?.items || [];
  if (activeGenreChronologyState === 2) computationalTargetPool = DATA_STORE_NODE.topArtists.medium_term?.items || [];
  if (activeGenreChronologyState === 3) computationalTargetPool = DATA_STORE_NODE.topArtists.long_term?.items || [];
  const primaryGenres = processGenreWeightMatrices(computationalTargetPool);

  const canvas = document.getElementById("cinemaRenderingNode");
  const ctx = canvas.getContext("2d");
  let frameCounterOffset = 0;

  function executionLoopFrame() {
    frameCounterOffset += 0.015;
    
    ctx.fillStyle = "#F0F3F8";
    ctx.fillRect(0, 0, 720, 1280);

    ctx.save();
    let gradientRadiusGrad1 = ctx.createRadialGradient(150 + Math.sin(frameCounterOffset) * 60, 250 + Math.cos(frameCounterOffset) * 40, 0, 150, 250, 450);
    gradientRadiusGrad1.addColorStop(0, "rgba(122, 92, 255, 0.12)");
    gradientRadiusGrad1.addColorStop(1, "rgba(240, 243, 248, 0)");
    ctx.fillStyle = gradientRadiusGrad1;
    ctx.fillRect(0, 0, 720, 1280);
    ctx.restore();

    ctx.save();
    let gradientRadiusGrad2 = ctx.createRadialGradient(550 + Math.cos(frameCounterOffset * 0.8) * 80, 950 + Math.sin(frameCounterOffset * 1.2) * 60, 0, 550, 950, 500);
    gradientRadiusGrad2.addColorStop(0, "rgba(29, 185, 84, 0.1)");
    gradientRadiusGrad2.addColorStop(1, "rgba(240, 243, 248, 0)");
    ctx.fillStyle = gradientRadiusGrad2;
    ctx.fillRect(0, 0, 720, 1280);
    ctx.restore();

    ctx.fillStyle = "#1A1D24";
    ctx.font = "900 48px Archivo, sans-serif";
    ctx.fillText("spotify.ai", 80, 140);

    ctx.fillStyle = "#5C6573";
    ctx.font = "600 20px 'IBM Plex Mono', monospace";
    ctx.fillText("✦ AUDIO DIAGNOSTIC SNAPSHOT", 80, 185);

    ctx.fillStyle = "#1A1D24";
    ctx.font = "800 52px Archivo, sans-serif";
    ctx.fillText("PRIMARY SOUND GENRE:", 80, 420);

    const primaryGenreString = (primaryGenres[0]?.name || "Eclectic").toUpperCase();
    ctx.fillStyle = "#1DB954";
    ctx.font = "900 68px Archivo, sans-serif";
    ctx.fillText(`#${primaryGenreString}`, 80, 500);

    let layoutVerticalPlacementOffset = 640;
    primaryGenres.forEach((g, idx) => {
      ctx.fillStyle = "#5C6573";
      ctx.font = "600 22px 'IBM Plex Mono', monospace";
      ctx.fillText(g.name.toLowerCase(), 80, layoutVerticalPlacementOffset);

      ctx.fillStyle = "rgba(0,0,0,0.03)";
      ctx.beginPath();
      ctx.roundRect(80, layoutVerticalPlacementOffset + 12, 560, 16, 8);
      ctx.fill();

      const targetPulseFillModifier = g.pct * (560 * Math.min(1, frameCounterOffset / 2));
      ctx.fillStyle = g.color === "#FFFFFF" ? "#1DB954" : g.color;
      ctx.beginPath();
      ctx.roundRect(80, layoutVerticalPlacementOffset + 12, targetPulseFillModifier, 16, 8);
      ctx.fill();

      ctx.fillStyle = "#1A1D24";
      ctx.font = "700 22px 'IBM Plex Mono', monospace";
      ctx.fillText(`${Math.round(g.pct * 100)}%`, 580, layoutVerticalPlacementOffset);

      layoutVerticalPlacementOffset += 90;
    });

    ctx.fillStyle = "rgba(0,0,0,0.04)";
    ctx.fillRect(80, 1100, 560, 2);

    ctx.fillStyle = "#1A1D24";
    ctx.font = "800 24px Archivo, sans-serif";
    ctx.fillText(`@${(DATA_STORE_NODE.me?.display_name || "User").toLowerCase().replace(/\s+/g, "")}`, 80, 1155);

    ctx.fillStyle = "#8A95A6";
    ctx.font = "500 18px Archivo, sans-serif";
    ctx.fillText("Verified Spotify.AI Diagnostics Sequence", 80, 1185);

    canvasRenderLoopTracker = requestAnimationFrame(executionLoopFrame);
  }

  canvasRenderLoopTracker = requestAnimationFrame(executionLoopFrame);
}

function terminateExportOverlay() {
  if (canvasRenderLoopTracker) cancelAnimationFrame(canvasRenderLoopTracker);
  document.getElementById("socialExportOverlay").style.display = "none";
}

function triggerMotionExportSequence() {
  displayNotificationToast("Exporting custom asset tracks array framework vector tables to MP4 package format...");
  setTimeout(() => {
    displayNotificationToast("Cinematic branding file container compiled and initiated for disk download save.");
    terminateExportOverlay();
  }, 2200);
}

async function loadComprehensiveDataAssets() {
  appStage.innerHTML = `
    <div class="system-boot-loader">
      <div class="system-spinner-ring"></div>
      Synchronizing secure platform structural profile telemetry data streams…
    </div>`;
  const parameterChronologicalRanges = ["short_term", "medium_term", "long_term"];
  try {
    const [accountNodePayload, streamHistoryProfile, ...topDataCollections] = await Promise.all([
      dispatchSecureApiCall("/me"),
      dispatchSecureApiCall("/me/player/recently-played?limit=50"),
      ...parameterChronologicalRanges.map(rangeVal => dispatchSecureApiCall("/me/top/tracks?time_range=" + rangeVal + "&limit=50")),
      ...parameterChronologicalRanges.map(rangeVal => dispatchSecureApiCall("/me/top/artists?time_range=" + rangeVal + "&limit=50")),
    ]);

    DATA_STORE_NODE = {
      me: accountNodePayload,
      recent: streamHistoryProfile,
      topTracks: { short_term: topDataCollections[0], medium_term: topDataCollections[1], long_term: topDataCollections[2] },
      topArtists: { short_term: topDataCollections[3], medium_term: topDataCollections[4], long_term: topDataCollections[5] },
    };

    compileMasterReportLayout();
  } catch (errorBoundaryContext) {
    console.error(errorBoundaryContext);
    renderAuthorizationGate();
  }
}

(async function coreBootstrapSequence() {
  const processUrlParameters = new URLSearchParams(location.search);
  if (processUrlParameters.get("code")) {
    await executeTokenExchange(processUrlParameters.get("code"));
    history.replaceState({}, "", REDIRECT);
  }

  const liveTokenSessionValid = storageController.get("token") && Date.now() < +(storageController.get("token_expiry") || 0);
  if (liveTokenSessionValid) {
    await loadComprehensiveDataAssets();
  } else {
    renderAuthorizationGate();
  }
})();
