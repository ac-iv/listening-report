<style>
:root {
  --bg-base: #ECEFF4;
  --bg-card: rgba(255, 255, 255, 0.75);
  --bg-card-solid: #FFFFFF;
  --glass-border: rgba(0, 0, 0, 0.06);
  --glass-inner-glow: rgba(255, 255, 255, 0.9);
  --spotify-green: #1DB954; 
  --spotify-green-hover: #1ED760;
  --chart-line: #11141A;
  --gemini-purple: #7A5CFF;
  --text-main: #11141A;
  --text-muted: #4B5262; 
  --text-light: #7E8696;
  --mono: 'IBM Plex Mono', monospace;
  --disp: 'Archivo', sans-serif;
  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 8px;
  --transition-smooth: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
}

/* --- Base Layout --- */
* { margin: 0; padding: 0; box-sizing: border-box; letter-spacing: -0.01em; }
html { scroll-behavior: smooth; font-size: 16px; background-color: var(--bg-base); }
body {
  color: var(--text-main); font-family: var(--disp); line-height: 1.6;
  -webkit-font-smoothing: antialiased; overflow-x: hidden; min-height: 100vh;
  background: var(--bg-base);
  background-image: 
    radial-gradient(circle at 0% 0%, rgba(15, 99, 255, 0.08) 0%, transparent 45%),
    radial-gradient(circle at 100% 0%, rgba(235, 18, 18, 0.06) 0%, transparent 50%),
    radial-gradient(circle at 100% 100%, rgba(17, 180, 74, 0.08) 0%, transparent 40%);
  background-attachment: fixed;
}
.wrap { max-width: 1440px; margin: 0 auto; padding: 40px 24px 120px; position: relative; z-index: 2; }
@media (max-width: 480px) { .wrap { padding: 20px 12px 60px; } }

.glass {
  background: var(--bg-card); backdrop-filter: blur(30px) saturate(180%); -webkit-backdrop-filter: blur(30px) saturate(180%);
  border: 1px solid var(--glass-border); border-radius: var(--radius-lg); transition: var(--transition-smooth);

/* --- Widescreen Landing Page --- */

/* --- Modern Donut Layout Matrix --- */

.circadian-canvas-stage { display: flex; align-items: flex-end; gap: 4px; height: 140px; border-bottom: 1px solid rgba(0,0,0,0.06); padding: 16px 8px 0; width: 100%; position: relative; min-width: 0; }
.circadian-canvas-stage .hour-bar-column { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; height: 100%; z-index: 2; }

footer { margin-top: 80px; padding: 32px 24px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(0,0,0,0.05); font-family: var(--mono); font-size: 11px; color: var(--text-light); flex-wrap: wrap; gap: 12px; }

<script>
const CLIENT_ID = "8bda4fd165494fd5bfc4646ad1fc6d27"; 
const SCOPES = "user-top-read user-read-recently-played playlist-modify-public playlist-modify-private";
const REDIRECT = location.origin + location.pathname;
const appStage = document.getElementById("appRootStage");

const storageController = {
  get: k => localStorage.getItem("sai_tlm_" + k),
  set: (k, v) => localStorage.setItem("sai_tlm_" + k, v),
  del: k => localStorage.removeItem("sai_tlm_" + k),
};

const PALETTE_MATRIX = ["#1473E6", "#7A5CFF", "#FF66B2", "#FFAA00", "#00E5FF"];
let DATA_STORE_NODE = null;
let activeTrackLimitConfig = 25;   
let currentActiveDayIndex = 1;

function displayNotificationToast(msg) {
  const toast = document.getElementById("toastEngine");
  document.getElementById("toastMessageTarget").textContent = msg;
  toast.classList.add("active");
  setTimeout(() => toast.classList.remove("active"), 3500);
}

function generateRandomStateString(len) {
  const c = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  const vals = crypto.getRandomValues(new Uint8Array(len));
  return Array.from(vals, v => c[v % c.length]).join("");
}
async function computeSha256Challenge(verifier) {
  const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
async function initiateOAuthRoute() {
  const verifier = generateRandomStateString(64);
  storageController.set("verifier", verifier);
  const challenge = await computeSha256Challenge(verifier);
  const params = new URLSearchParams({
    response_type: "code", client_id: CLIENT_ID, scope: SCOPES, redirect_uri: REDIRECT,
    code_challenge_method: "S256", code_challenge: challenge,
  });
  location.href = "https://accounts.spotify.com/authorize?" + params;
}
async function executeTokenExchange(code) {
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ grant_type: "authorization_code", code, redirect_uri: REDIRECT, client_id: CLIENT_ID, code_verifier: storageController.get("verifier") }),
  });
  const payload = await res.json();
  storageController.set("token", payload.access_token);
  storageController.set("token_expiry", Date.now() + payload.expires_in * 1000);
}
async function dispatchSecureApiCall(endpoint, parameters = {}) {
  const res = await fetch("https://api.spotify.com/v1" + endpoint, {
    ...parameters, headers: { ...parameters.headers, Authorization: "Bearer " + storageController.get("token") },
  });
  if (res.status === 401) { storageController.del("token"); renderAuthorizationGate(); return; }
  return res.json();
}

function renderAuthorizationGate() {
  appStage.innerHTML = `
    <div class="landing-navbar">
      <div class="brand-name">spotify<span>.ai</span></div>
    </div>
    <div class="landing-wrapper">
      <div class="full-hero-container">

        <p>A pristine widescreen data environment translating account diagnostic metadata records into area-line metrics matrices, active ledger panes, and fluid cloud bubble web registries.</p>
        <button class="btn-spotify-connect" id="bootTriggerBtn">Connect Spotify Account Profile</button>
      </div>
    </div>
  `;
  document.getElementById("bootTriggerBtn").onclick = () => initiateOAuthRoute();
}

function compileMasterReportLayout() {
  const { me, topTracks } = DATA_STORE_NODE;
  const shortPool = topTracks?.short_term?.items || [];
  const mediumPool = topTracks?.medium_term?.items || [];
  const longPool = topTracks?.long_term?.items || [];
  const activeProcessingArray = mediumPool.length ? mediumPool : (shortPool.length ? shortPool : longPool);
  
  const totalPopularitySum = activeProcessingArray.reduce((sum, track) => sum + (track?.popularity || 0), 0);
  const averagePopularityIndex = activeProcessingArray.length ? (totalPopularitySum / activeProcessingArray.length) : 50;
  const coreObscurityMetric = Math.round(100 - averagePopularityIndex);
  
  const calendarYearArray = activeProcessingArray.map(t => parseInt((t?.album?.release_date || "").slice(0, 4))).filter(Boolean);
  const operationalMidpointYear = calendarYearArray.length ? Math.round(calendarYearArray.reduce((acc, y) => acc + y, 0) / calendarYearArray.length) : "—";
  
  // Cleaned evaluation mathematical expression with zero reference bugs
  const parentalExplicitContentVolume = activeProcessingArray.length ? Math.round(100 * activeProcessingArray.filter(t => t?.explicit).length / activeProcessingArray.length) : 0;
  const productionTimestamp = new Date();

  appStage.innerHTML = `
    <header class="glass" style="border:none; margin-bottom: 32px; border-radius:var(--radius-md); background:#11141A; color:#FFF; display:flex; justify-content:space-between; align-items:center; padding: 18px 32px;">
      <div class="logo-container"><h1 style="color:#FFF; font-size:18px;">spotify<span>.ai</span></h1></div>
      <div class="user-badge">${(me?.display_name || "User Node").toLowerCase()}</div>
    </header>

    <div class="main-layout-grid">
      <div class="widget-stack">
        <div class="glass widget-pane">
          <div class="eyebrow">Chronological Volume Ledger</div>
          <div class="widget-title-area">
            <h2>Annual Frequency Matrix</h2>
            <div class="sub-narrative">Volumetric tracking showing minutes listened over space-time alongside an adaptive moving median line threshold block.</div>
          </div>
          <div class="frequency-chart-stage">
            <div id="chartValueHoverToast" class="chart-hover-toast">0 Mins</div>
            <div id="annualFrequencyChartContainer"></div>
          </div>
        </div>

        <div class="glass widget-pane">
          <div class="eyebrow">Framework Quantization Tables</div>
          <div class="control-filter-cluster">
            <div class="toggle-bay">
              <button class="toggleBayBtn" data-type="range" data-value="short_term" aria-pressed="true">4 weeks</button>
              <button class="toggleBayBtn" data-type="range" data-value="medium_term" aria-pressed="false">6 months</button>
              <button class="toggleBayBtn" data-type="range" data-value="long_term" aria-pressed="false">all time</button>
            </div>
            <div class="toggle-bay">
              <button class="toggleBayBtn" data-type="limit" data-value="25" aria-pressed="true">Top 25</button>
              <button class="toggleBayBtn" data-type="limit" data-value="50" aria-pressed="false">Top 50</button>
            </div>
            <button class="btn-core" onclick="dispatchPlaylistDeploymentSequence()" style="margin-left:auto;">Export Playlist</button>
          </div>
          <div class="accordion-wrapper expanded" id="tracksAccordionWrapper">
            <button class="accordion-trigger" onclick="toggleTracksAccordion()"><span>Toggle Track Matrix Window View</span></button>
            <div class="accordion-content"><div class="music-table-view two-col" id="tracksArrayTargetEngine"></div></div>
          </div>
        </div>

        <div class="glass widget-pane">
          <div class="eyebrow">Roster Standings Profile</div>
          <div class="widget-title-area"><h2>Top Artist Bubble Web</h2><div class="sub-narrative">Dynamic algorithmic layout mapping core artists paired with estimated timeline listening durations.</div></div>
          <div class="artists-web-container" id="artistsWebTargetEngine"></div>
        </div>
      </div>

      <div class="widget-stack">
        <div class="glass widget-pane">
          <div class="eyebrow">Telemetry Analytics Ledger</div>

function calculateAndDrawAreaFrequencyChart() {
  const stage = document.getElementById("annualFrequencyChartContainer");
  if (!stage) return;
  const segmentValuesArray = [1240, 1520, 1100, 1340, 1850, 1690, 2300, 1420, 1250, 1580, 1920, 2550];
  const categoriesLabelArray = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  const highestPeakVolume = Math.max(...segmentValuesArray, 3000);

  let svgHeight = 210, svgWidth = 650, paddingBottom = 25, paddingTop = 15;
  let graphHeight = svgHeight - paddingBottom - paddingTop;
  let horizontalBarWidthSpace = svgWidth / segmentValuesArray.length;
  let areaCoordinatesPointsArray = [], rawBarsStringHtml = "";
  
  segmentValuesArray.forEach((minutesVal, idx) => {
    let scalarFactorHeight = (minutesVal / highestPeakVolume) * graphHeight;
    let horizontalCoordX = (idx * horizontalBarWidthSpace) + (horizontalBarWidthSpace * 0.5);
    let verticalCoordY = svgHeight - paddingBottom - scalarFactorHeight;
    let computedWidth = horizontalBarWidthSpace * 0.6;
    let barLeftX = horizontalCoordX - (computedWidth / 2);

    areaCoordinatesPointsArray.push(`${horizontalCoordX},${verticalCoordY}`);
    rawBarsStringHtml += `<rect class="freq-bar" x="${barLeftX}" y="${verticalCoordY}" width="${computedWidth}" height="${scalarFactorHeight}" fill="rgba(20,115,230,0.06)" rx="3" data-mins="${minutesVal}" data-label="${categoriesLabelArray[idx]}" onmouseover="executeBarHoverMetrics(event, true)" onmouseout="executeBarHoverMetrics(event, false)" /><text class="axis-text" x="${horizontalCoordX}" y="${svgHeight - 6}" text-anchor="middle">${categoriesLabelArray[idx]}</text>`;
  });

  let linePointsCoordinatesString = areaCoordinatesPointsArray.join(" ");
  stage.innerHTML = `
    <svg viewBox="0 0 ${svgWidth} ${svgHeight}" preserveAspectRatio="none" style="width:100%; height:100%; overflow:visible;">
      <defs><linearGradient id="chartAreaGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(20,115,230,0.18)" /><stop offset="100%" stop-color="rgba(20,115,230,0.00)" /></linearGradient></defs>
      <line x1="0" y1="${svgHeight - paddingBottom}" x2="${svgWidth}" y2="${svgHeight - paddingBottom}" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
      <path d="M ${svgWidth / segmentValuesArray.length / 2} ${svgHeight - paddingBottom} L ${linePointsCoordinatesString} L ${svgWidth - (svgWidth / segmentValuesArray.length / 2)} ${svgHeight - paddingBottom} Z" fill="url(#chartAreaGradient)" />
      <polyline points="${linePointsCoordinatesString}" fill="none" stroke="var(--chart-line)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
      ${rawBarsStringHtml}
    </svg>`;
}

function executeBarHoverMetrics(event, isEntering) {
  const toast = document.getElementById("chartValueHoverToast");
  if (!toast) return;
  if (!isEntering) { toast.style.opacity = "0"; return; }
  const minsVal = event.target.getAttribute("data-mins");
  const labelVal = event.target.getAttribute("data-label");
  toast.innerHTML = `${labelVal}: <b>${parseInt(minsVal).toLocaleString()} Mins</b>`;
  const parentBounds = event.target.ownerSVGElement.parentElement.getBoundingClientRect();
  const targetBounds = event.target.getBoundingClientRect();
  toast.style.left = `${targetBounds.left - parentBounds.left + (targetBounds.width / 2) - 55}px`;
  toast.style.top = `${targetBounds.top - parentBounds.top - 35}px`;
  toast.style.opacity = "1";
}

function renderTracksDisplayDataPool(timeRangeString, dataSliceLimit) {
  const collectionItems = DATA_STORE_NODE.topTracks[timeRangeString]?.items || [];
  const container = document.getElementById("tracksArrayTargetEngine");
  if (!container) return;
  
  container.innerHTML = collectionItems.slice(0, dataSliceLimit).map((track, i) => {
    const computedListenCyclesWeight = Math.round((collectionItems.length - i) * 0.4 + 3);
    return drawStructuralTelemetryRow(track, i, `${computedListenCyclesWeight} streams`);
  }).join("");
}

function renderArtistsWebCluster() {
  const datasetItems = DATA_STORE_NODE.topArtists.medium_term?.items || [];
  const container = document.getElementById("artistsWebTargetEngine");
  if (!container) return;
  container.innerHTML = datasetItems.slice(0, 15).map((artist, idx) => {
    const weightsValue = Math.round((datasetItems.length - idx) * 140 + 300);
    return `<div class="artist-bubble-node"><img src="${artist.images?.[2]?.url || artist.images?.[0]?.url || ''}"><span>${artist.name.toLowerCase()}</span><span class="a-mins">${weightsValue}m</span></div>`;
  }).join("");
}

function calculateDecadesDonutProfile() {
  const historyProfileTracks = DATA_STORE_NODE.topTracks.medium_term?.items || [];
  const metricsCache = {};
  historyProfileTracks.forEach(t => {
    const releaseYearValue = parseInt((t.album?.release_date || "").slice(0, 4));
    if (!releaseYearValue) return;
    const computedDecadeBucketIndex = Math.floor(releaseYearValue / 10) * 10;
    metricsCache[computedDecadeBucketIndex] = (metricsCache[computedDecadeBucketIndex] || 0) + 1;
  });
  const dataRowsSorted = Object.entries(metricsCache).sort((a, b) => b[1] - a[1]).slice(0, 4);
  const totalWeightVolume = dataRowsSorted.reduce((s, [, v]) => s + v, 0) || 1;
  
  let accumulatedPercentageCircumferenceValue = 0;
  const ringRadius = 55;
  const pieCircumference = 2 * Math.PI * ringRadius;

  let donutSlicesHtmlString = "";
  let textLabelsHtmlString = "";

  dataRowsSorted.forEach(([decade, count], i) => {
    const sliceRatioPercentage = count / totalWeightVolume;
    const strokeDashArrayString = `${sliceRatioPercentage * pieCircumference} ${pieCircumference}`;
    const strokeDashOffsetValue = -accumulatedPercentageCircumferenceValue * pieCircumference;
    const segmentColorHexToken = PALETTE_MATRIX[i % PALETTE_MATRIX.length];
    
    const midAngleAngleRadian = ((accumulatedPercentageCircumferenceValue + (sliceRatioPercentage / 2)) * 360 * Math.PI) / 180;
    const labelCoordinateX = 80 + (ringRadius + 24) * Math.cos(midAngleAngleRadian);
    const labelCoordinateY = 80 + (ringRadius + 24) * Math.sin(midAngleAngleRadian);

    donutSlicesHtmlString += `
      <circle class="donut-slice-segment" cx="80" cy="80" r="${ringRadius}"
              stroke="${segmentColorHexToken}" stroke-dasharray="${strokeDashArrayString}" stroke-dashoffset="${strokeDashOffsetValue}"
              data-pct="${Math.round(sliceRatioPercentage * 100)}" data-decade="${decade}s"
              onmouseover="executeDonutSegmentHover(event, true)" onmouseout="executeDonutSegmentHover(event, false)" />
    `;
    textLabelsHtmlString += `<text class="donut-axis-text-label" x="${labelCoordinateX}" y="${labelCoordinateY}">${decade}s</text>`;
    accumulatedPercentageCircumferenceValue += sliceRatioPercentage;
  });

  document.getElementById("decadesDonutTargetEngine").innerHTML = `
    <div class="donut-stage">
      <svg class="donut-svg-viewport" viewBox="0 0 160 160">${donutSlicesHtmlString}${textLabelsHtmlString}</svg>
      <div class="donut-center-lbl" id="donutCoreDataTag">ERAS<br><span style="font-weight:700; color:var(--text-light)">PROFILE</span></div>
    </div>
    <div class="era-legend-list" id="decadesLegendMatrixTarget"></div>
  `;
  
  document.getElementById("decadesLegendMatrixTarget").innerHTML = dataRowsSorted.map(([decade, count], i) => `<div class="era-legend-item"><span style="width:10px; height:10px; border-radius:50%; background:${PALETTE_MATRIX[i % PALETTE_MATRIX.length]}"></span><span>${decade}s Framework</span><span style="margin-left:auto; font-family:var(--mono); font-size:11px; font-weight:600;">${count}</span></div>`).join("");
}

function executeDonutSegmentHover(event, isEntering) {
  const coreLabelNode = document.getElementById("donutCoreDataTag");
  if (!coreLabelNode) return;
  if (!isEntering) { coreLabelNode.innerHTML = `ERAS<br><span style="font-weight:700; color:var(--text-light)">PROFILE</span>`; return; }
  const pctStr = event.target.getAttribute("data-pct");
  const decadeStr = event.target.getAttribute("data-decade");
  coreLabelNode.innerHTML = `<span style="font-size:16px; font-weight:900; color:var(--chart-line);">${pctStr}%</span><br><span style="font-size:9px; font-weight:600; color:var(--text-light);">${decadeStr}</span>`;
}

function switchActiveListeningDay(dayIdx, btnElement) {
  document.querySelectorAll(".day-btn").forEach(b => b.classList.remove("active"));
  btnElement.classList.add("active"); currentActiveDayIndex = dayIdx;
  calculateCircadianDensityProfile();
}

function calculateCircadianDensityProfile() {
  const hourlyArray = new Array(24).fill(0);
  const playLogs = DATA_STORE_NODE.recent?.items || [];
  
  let completeWeeklyTotalArray = new Array(24).fill(0);
  playLogs.forEach(log => completeWeeklyTotalArray[new Date(log.played_at).getHours()]++);
  const combinedMeanBaselineValue = (completeWeeklyTotalArray.reduce((s, c) => s + c, 0) / 24) || 1;

  playLogs.forEach(playEventLog => {
    if(new Date(playEventLog.played_at).getDay() === currentActiveDayIndex) { hourlyArray[new Date(playEventLog.played_at).getHours()]++; }
  });
  
  const scalingMaximumPeak = Math.max(...hourlyArray, 1);
  const containerHeightStage = 140; 
  const meanVectorTopPixelCoordinate = Math.max(15, containerHeightStage - 20 - ((combinedMeanBaselineValue / scalingMaximumPeak) * (containerHeightStage - 20)));

  let inlineBarsHtmlPayload = `
    <div class="weekly-mean-vector-line" style="top: ${meanVectorTopPixelCoordinate}px;"></div>
    <div class="weekly-mean-badge-node" style="top: ${meanVectorTopPixelCoordinate - 10}px;">MEAN: ${combinedMeanBaselineValue.toFixed(1)} UNITS</div>
  `;

  hourlyArray.forEach((hourlyCount) => {
    inlineBarsHtmlPayload += `<div class="hour-bar-column"><div class="bar-vector ${hourlyCount > 0 ? 'active-glow' : ''}" style="height:${Math.max(hourlyCount / scalingMaximumPeak * 100, 4)}%;"></div></div>`;
  });

  document.getElementById("circadianBarsTargetEngine").innerHTML = inlineBarsHtmlPayload;
  document.getElementById("circadianLabelsTargetEngine").innerHTML = Array.from({ length: 24 }, (_, hourIndex) => `<span>${hourIndex % 6 === 0 ? (hourIndex === 0 ? "12am" : hourIndex === 12 ? "12pm" : hourIndex > 12 ? (hourIndex - 12) + "pm" : hourIndex + "am") : ""}</span>`).join("");
}

async function dispatchPlaylistDeploymentSequence() {
  try {
    const rangeToken = appStage.querySelector(".toggleBayBtn[data-type='range'][aria-pressed='true']").dataset.value;
    const limitToken = parseInt(appStage.querySelector(".toggleBayBtn[data-type='limit'][aria-pressed='true']").dataset.value);
    const tracks = DATA_STORE_NODE.topTracks[rangeToken]?.items || []; if (!tracks.length) return;
    displayNotificationToast("Deploying platform automation track synchronization profiles...");
    const playlist = await dispatchSecureApiCall(`/users/${DATA_STORE_NODE.me.id}/playlists`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name: `Spotify.AI Generation Profile`, public: false }) });
    await dispatchSecureApiCall(`/playlists/${playlist.id}/tracks`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ uris: tracks.slice(0, limitToken).map(t => t.uri) }) });
    displayNotificationToast("Playlist integrated successfully.");
  } catch (e) { displayNotificationToast("Pipeline handshake request rejected."); }
}

  const processUrlParameters = new URLSearchParams(location.search);
  if (processUrlParameters.get("code")) { await executeTokenExchange(processUrlParameters.get("code")); history.replaceState({}, "", REDIRECT); }
