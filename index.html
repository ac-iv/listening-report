<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>spotify.ai — your listening, decoded</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,300..900&family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #EEF0F4;
  --ink: #101319;
  --muted: #4E5666;
  --faint: #8A92A3;
  --card: rgba(255, 255, 255, 0.72);
  --card-solid: #FFFFFF;
  --line: rgba(16, 19, 25, 0.07);
  --green: #1DB954;
  --green-hover: #1ed760;
  --blue: #1473E6;
  --purple: #7A5CFF;
  --pink: #FF66B2;
  --amber: #F5A300;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Archivo', sans-serif;
  --serif: 'Instrument Serif', serif;
  --r-lg: 22px;
  --r-md: 15px;
  --r-sm: 10px;
  --ease: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; background: var(--bg); }
body {
  font-family: var(--sans); color: var(--ink); line-height: 1.55;
  -webkit-font-smoothing: antialiased; min-height: 100vh; overflow-x: hidden;
  background: var(--bg);
  background-image:
    radial-gradient(circle at 8% -5%, rgba(20, 115, 230, 0.13) 0%, transparent 42%),
    radial-gradient(circle at 96% 4%, rgba(29, 185, 84, 0.14) 0%, transparent 45%),
    radial-gradient(circle at 92% 96%, rgba(255, 102, 178, 0.10) 0%, transparent 42%),
    radial-gradient(circle at 4% 100%, rgba(122, 92, 255, 0.10) 0%, transparent 45%);
  background-attachment: fixed;
}
:focus-visible { outline: 2px solid var(--green); outline-offset: 2px; border-radius: 6px; }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition: none !important; animation: none !important; } }

.wrap { max-width: 1280px; margin: 0 auto; padding: 28px 24px 100px; }
@media (max-width: 640px) { .wrap { padding: 16px 14px 80px; } }

/* ---------- glass surfaces ---------- */
.glass {
  background: var(--card);
  backdrop-filter: blur(26px) saturate(170%);
  -webkit-backdrop-filter: blur(26px) saturate(170%);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.85), 0 4px 18px rgba(150, 162, 182, 0.14), 0 16px 44px rgba(28, 36, 52, 0.05);
  transition: var(--ease);
}

/* ---------- header ---------- */
.top {
  display: flex; justify-content: space-between; align-items: center; gap: 12px;
  background: var(--ink); color: #FFF; border-radius: var(--r-md);
  padding: 16px 26px; margin-bottom: 22px;
}
.brand { font-size: 17px; font-weight: 800; letter-spacing: -0.02em; text-transform: lowercase; }
.brand span { color: var(--green); }
.user-chip { display: flex; align-items: center; gap: 9px; font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.65); background: rgba(255,255,255,0.07); padding: 5px 13px 5px 6px; border-radius: 30px; }
.user-chip img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
.user-chip.no-img { padding-left: 13px; }

/* ---------- tab nav ---------- */
.tabs {
  display: flex; gap: 4px; padding: 5px; border-radius: 40px; width: fit-content;
  margin: 0 auto 30px; max-width: 100%; overflow-x: auto; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  font-family: var(--mono); font-size: 11px; font-weight: 600; text-transform: lowercase;
  letter-spacing: 0.02em; padding: 10px 19px; border: 0; border-radius: 30px;
  background: transparent; color: var(--muted); cursor: pointer; white-space: nowrap; transition: var(--ease);
}
.tab-btn:hover { color: var(--ink); }
.tab-btn.active { background: var(--ink); color: #FFF; }
@media (max-width: 640px) { .tabs { justify-content: flex-start; width: 100%; } }

/* ---------- panes & type ---------- */
.pane { padding: 30px; display: flex; flex-direction: column; gap: 20px; }
@media (max-width: 640px) { .pane { padding: 20px 16px; } }
.kicker { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faint); display: flex; align-items: center; gap: 12px; }
.kicker::after { content: ""; flex: 1; height: 1px; background: var(--line); }
.pane h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.2; }
.pane h2 em { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--green); letter-spacing: 0; }
.pane .sub { font-size: 13.5px; color: var(--muted); max-width: 62ch; margin-top: -12px; }
.caption { font-family: var(--mono); font-size: 10px; color: var(--faint); }

.grid-2 { display: grid; grid-template-columns: 1.12fr 0.88fr; gap: 24px; align-items: start; }
@media (max-width: 1080px) { .grid-2 { grid-template-columns: 1fr; } }
.stack { display: flex; flex-direction: column; gap: 24px; }

/* ---------- buttons & controls ---------- */
.btn {
  font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: lowercase;
  border: none; border-radius: 40px; padding: 13px 26px; cursor: pointer; transition: var(--ease);
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-green { background: var(--green); color: #04220F; }
.btn-green:hover { background: var(--green-hover); transform: translateY(-1px); box-shadow: 0 10px 24px rgba(29,185,84,0.3); }
.btn-ink { background: var(--ink); color: #FFF; }
.btn-ink:hover { background: #23272F; transform: translateY(-1px); }
.btn-ghost { background: rgba(16,19,25,0.05); color: var(--ink); }
.btn-ghost:hover { background: rgba(16,19,25,0.1); }

.pills { display: inline-flex; background: rgba(16, 19, 25, 0.05); padding: 3px; border-radius: 12px; }
.pill {
  font-family: var(--mono); font-size: 10.5px; font-weight: 600; padding: 7px 15px; border: 0;
  background: transparent; color: var(--muted); border-radius: 9px; cursor: pointer; transition: var(--ease); white-space: nowrap;
}
.pill[aria-pressed="true"] { background: #FFF; color: var(--ink); box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
.controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding-bottom: 16px; border-bottom: 1px solid var(--line); }

/* ---------- stat cards ---------- */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
@media (max-width: 640px) { .stats { grid-template-columns: 1fr 1fr; gap: 10px; } }
.stat { background: var(--card-solid); border: 1px solid var(--line); border-radius: var(--r-md); padding: 20px; display: flex; flex-direction: column; gap: 8px; }
.stat .s-label { font-family: var(--mono); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--faint); }
.stat .s-value { font-size: 32px; font-weight: 900; letter-spacing: -0.03em; line-height: 1.05; display: flex; align-items: baseline; gap: 3px; }
.stat .s-value small { font-size: 13px; font-weight: 600; color: var(--faint); letter-spacing: 0; }
.stat .s-desc { font-size: 12px; color: var(--muted); line-height: 1.45; }
@media (max-width: 640px) { .stat { padding: 15px; } .stat .s-value { font-size: 25px; } }

/* ---------- ranked track rows ---------- */
.track-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 0 26px; }
@media (max-width: 880px) { .track-cols { grid-template-columns: 1fr; } }
.row {
  display: grid; grid-template-columns: 34px 46px 1fr 66px; gap: 14px; align-items: center;
  padding: 9px 10px; border-radius: var(--r-sm); border-bottom: 1px solid rgba(16,19,25,0.04); transition: var(--ease);
}
.row:hover { background: #FFF; }
.rank { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--faint); text-align: center; }
.rank.medal {
  width: 26px; height: 26px; margin: 0 auto; border-radius: 50%; background: var(--green); color: #04220F;
  font-weight: 600; display: flex; align-items: center; justify-content: center; font-size: 11px;
}
.art { width: 46px; height: 46px; border-radius: 8px; overflow: hidden; background: rgba(16,19,25,0.04); flex-shrink: 0; }
.art img { width: 100%; height: 100%; object-fit: cover; display: block; }
.row-meta { min-width: 0; }
.row-meta .t-name { font-weight: 650; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-meta .t-artist { font-size: 12.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.pop-cell { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.pop-cell .pop-num { font-family: var(--mono); font-size: 10.5px; color: var(--faint); }
.pop-track { width: 52px; height: 4px; border-radius: 3px; background: rgba(16,19,25,0.07); overflow: hidden; }
.pop-fill { height: 100%; border-radius: 3px; background: var(--green); }

/* ---------- artist cards ---------- */
.artist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(235px, 1fr)); gap: 14px; }
@media (max-width: 640px) { .artist-grid { grid-template-columns: 1fr; } }
.artist-card {
  position: relative; display: flex; align-items: center; gap: 14px; padding: 14px 16px;
  background: var(--card-solid); border: 1px solid var(--line); border-radius: var(--r-md); transition: var(--ease);
}
.artist-card:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(28,36,52,0.08); }
.artist-card img, .artist-card .a-fallback { width: 54px; height: 54px; border-radius: 50%; object-fit: cover; background: rgba(16,19,25,0.05); flex-shrink: 0; }
.artist-card .a-fallback { display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--faint); }
.artist-card .a-meta { min-width: 0; }
.artist-card .a-name { font-weight: 700; font-size: 14.5px; text-transform: lowercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 28px; }
.artist-card .a-genres { font-size: 11.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.artist-card .a-rank { position: absolute; top: 10px; right: 12px; font-family: var(--mono); font-size: 10px; font-weight: 600; color: var(--faint); }
.artist-card.top .a-rank { color: var(--green); }

.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  display: inline-flex; align-items: center; gap: 8px; padding: 7px 14px; background: var(--card-solid);
  border: 1px solid var(--line); border-radius: 30px; font-size: 12.5px; font-weight: 600; text-transform: lowercase;
}
.chip .c-count { font-family: var(--mono); font-size: 10px; color: var(--blue); background: rgba(20,115,230,0.06); padding: 1px 7px; border-radius: 20px; }

/* ---------- charts ---------- */
.chart-box { background: var(--card-solid); border: 1px solid var(--line); border-radius: var(--r-md); padding: 22px 18px 14px; }
.bars { display: flex; align-items: flex-end; gap: 6px; height: 150px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; gap: 5px; min-width: 0; }
.bar-col .bar-val { font-family: var(--mono); font-size: 9.5px; color: var(--faint); }
.bar-col .bar { width: 100%; max-width: 34px; border-radius: 5px 5px 2px 2px; background: rgba(16,19,25,0.06); min-height: 4px; transition: height 0.4s ease; }
.bar-col .bar.on { background: var(--blue); }
.bar-labels { display: flex; gap: 6px; margin-top: 8px; }
.bar-labels span { flex: 1; font-family: var(--mono); font-size: 9px; color: var(--faint); text-align: center; overflow: hidden; white-space: nowrap; }
.empty-note { font-size: 12.5px; color: var(--faint); text-align: center; padding: 34px 12px; }

.era-split { display: grid; grid-template-columns: 0.9fr 1.1fr; gap: 26px; align-items: center; }
@media (max-width: 600px) { .era-split { grid-template-columns: 1fr; } }
.donut-stage { display: flex; justify-content: center; align-items: center; position: relative; }
.donut-lbl { position: absolute; font-family: var(--mono); font-size: 10px; font-weight: 600; color: var(--faint); text-transform: uppercase; letter-spacing: 0.08em; pointer-events: none; }
.legend { display: flex; flex-direction: column; gap: 8px; }
.legend-item { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; padding: 9px 13px; background: var(--card-solid); border: 1px solid var(--line); border-radius: var(--r-sm); }
.legend-item .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.legend-item .l-val { font-family: var(--mono); font-size: 10.5px; color: var(--faint); margin-left: auto; }

/* ---------- playlist studio ---------- */
.preset-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(215px, 1fr)); gap: 14px; }
.preset {
  text-align: left; background: var(--card-solid); border: 1px solid var(--line); border-radius: var(--r-md);
  padding: 20px; cursor: pointer; transition: var(--ease); font-family: var(--sans); display: flex; flex-direction: column; gap: 6px;
}
.preset:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(28,36,52,0.09); border-color: rgba(29,185,84,0.4); }
.preset .p-emoji { font-size: 20px; }
.preset .p-name { font-weight: 750; font-size: 15px; letter-spacing: -0.01em; }
.preset .p-desc { font-size: 12px; color: var(--muted); line-height: 1.45; }
.preset .p-tag { font-family: var(--mono); font-size: 9.5px; color: var(--green); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }

.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-family: var(--mono); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--faint); }
.field input[type="text"], .field select {
  font-family: var(--sans); font-size: 14px; font-weight: 500; color: var(--ink);
  background: var(--card-solid); border: 1px solid rgba(16,19,25,0.12); border-radius: var(--r-sm);
  padding: 12px 14px; width: 100%; transition: var(--ease); appearance: none;
}
.field input[type="text"]:focus, .field select:focus { border-color: var(--green); outline: none; box-shadow: 0 0 0 3px rgba(29,185,84,0.12); }
.field input[type="range"] { accent-color: var(--green); width: 100%; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } }
.switch-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: var(--card-solid); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 12px 14px; }
.switch-row .sw-label { font-size: 13px; font-weight: 600; }
.switch-row .sw-hint { font-size: 11px; color: var(--faint); }
.switch { position: relative; width: 42px; height: 24px; flex-shrink: 0; }
.switch input { opacity: 0; width: 100%; height: 100%; position: absolute; cursor: pointer; z-index: 2; margin: 0; }
.switch .knob { position: absolute; inset: 0; background: rgba(16,19,25,0.15); border-radius: 30px; transition: var(--ease); }
.switch .knob::after { content: ""; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; background: #FFF; border-radius: 50%; transition: var(--ease); box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
.switch input:checked + .knob { background: var(--green); }
.switch input:checked + .knob::after { transform: translateX(18px); }
.result-chip {
  display: inline-flex; align-items: center; gap: 10px; background: rgba(29,185,84,0.08); border: 1px solid rgba(29,185,84,0.3);
  border-radius: 40px; padding: 10px 18px; font-size: 13px; font-weight: 600;
}
.result-chip a { color: #12833B; font-weight: 700; text-decoration: none; }
.result-chip a:hover { text-decoration: underline; }

/* ---------- story cards ---------- */
.story-split { display: grid; grid-template-columns: 1fr 300px; gap: 30px; align-items: start; }
@media (max-width: 880px) { .story-split { grid-template-columns: 1fr; } }
.story-preview-frame { display: flex; justify-content: center; }
#storyCanvas {
  width: 100%; max-width: 262px; height: auto; border-radius: 20px;
  box-shadow: 0 24px 60px rgba(28,36,52,0.22); border: 1px solid var(--line); display: block;
}
.opt-group { display: flex; flex-direction: column; gap: 8px; }

/* ---------- login / loader / toast / footer ---------- */
.hero { padding: 76px 46px; display: flex; flex-direction: column; align-items: flex-start; gap: 20px; }
@media (max-width: 640px) { .hero { padding: 46px 22px; } }
.hero-tag { font-family: var(--mono); font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: var(--blue); background: rgba(20,115,230,0.07); padding: 7px 15px; border-radius: 30px; }
.hero h1 { font-size: clamp(34px, 5.4vw, 58px); font-weight: 900; letter-spacing: -0.04em; line-height: 1.08; max-width: 21ch; }
.hero h1 em { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--green); letter-spacing: -0.01em; }
.hero p { font-size: 16.5px; color: var(--muted); max-width: 54ch; }
.hero .fine { font-family: var(--mono); font-size: 10.5px; color: var(--faint); }

.loader { display: flex; flex-direction: column; align-items: center; gap: 18px; padding: 32vh 0; font-family: var(--mono); font-size: 12px; color: var(--faint); }
.spinner { width: 34px; height: 34px; border-radius: 50%; border: 3px solid rgba(16,19,25,0.06); border-top-color: var(--green); animation: spin 0.75s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast {
  position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(16px);
  background: var(--ink); color: #FFF; padding: 12px 24px; border-radius: 40px;
  font-family: var(--mono); font-size: 11.5px; opacity: 0; pointer-events: none;
  transition: var(--ease); z-index: 200; box-shadow: 0 14px 34px rgba(16,19,25,0.3); max-width: 90vw; text-align: center;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

footer { margin-top: 70px; padding-top: 26px; display: flex; justify-content: space-between; align-items: center; gap: 12px; border-top: 1px solid var(--line); font-family: var(--mono); font-size: 10.5px; color: var(--faint); flex-wrap: wrap; }
.logout { cursor: pointer; transition: var(--ease); background: none; border: none; font: inherit; color: inherit; }
.logout:hover { color: var(--ink); }
</style>

<body>

<div id="toast" class="toast" role="status"></div>
<div class="wrap"><div id="app"></div></div>

<script>
/* ============================================================
   spotify.ai — config, auth (PKCE), data loading
   ============================================================ */
const CLIENT_ID = "8bda4fd165494fd5bfc4646ad1fc6d27";
const SCOPES = "user-top-read user-read-recently-played playlist-modify-public playlist-modify-private";
const REDIRECT = location.origin + location.pathname;

const app = document.getElementById("app");
const store = {
  get: k => localStorage.getItem("sai_tlm_" + k),
  set: (k, v) => localStorage.setItem("sai_tlm_" + k, v),
  del: k => localStorage.removeItem("sai_tlm_" + k),
};

const PALETTE = ["#1473E6", "#7A5CFF", "#FF66B2", "#F5A300", "#00C2D8", "#1DB954"];
const RANGE_LABEL = { short_term: "last 4 weeks", medium_term: "last 6 months", long_term: "all time" };

let DATA = null;
const state = {
  tab: "overview",
  trackRange: "short_term",
  trackLimit: 25,
  artistRange: "short_term",
  storyTemplate: "tracks",
  storyRange: "short_term",
  storyTheme: "glass",
  lastPlaylist: null,
};

/* ---------- tiny utils ---------- */
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove("show"), 3400);
}
function shuffleArr(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ---------- OAuth (PKCE) ---------- */
function randString(len) {
  const c = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  const vals = crypto.getRandomValues(new Uint8Array(len));
  return Array.from(vals, v => c[v % c.length]).join("");
}
async function sha256Challenge(verifier) {
  const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
async function login() {
  const verifier = randString(64);
  store.set("verifier", verifier);
  const challenge = await sha256Challenge(verifier);
  const params = new URLSearchParams({
    response_type: "code", client_id: CLIENT_ID, scope: SCOPES, redirect_uri: REDIRECT,
    code_challenge_method: "S256", code_challenge: challenge,
  });
  location.href = "https://accounts.spotify.com/authorize?" + params;
}
async function exchangeToken(code) {
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ grant_type: "authorization_code", code, redirect_uri: REDIRECT, client_id: CLIENT_ID, code_verifier: store.get("verifier") }),
  });
  const payload = await res.json();
  store.set("token", payload.access_token);
  store.set("token_expiry", Date.now() + payload.expires_in * 1000);
}
async function api(endpoint, opts = {}) {
  const res = await fetch("https://api.spotify.com/v1" + endpoint, {
    ...opts, headers: { ...opts.headers, Authorization: "Bearer " + store.get("token") },
  });
  if (res.status === 401) { store.del("token"); renderLogin(); throw new Error("expired"); }
  if (res.status === 204) return {};
  return res.json();
}

/* ---------- data ---------- */
async function loadData() {
  app.innerHTML = `<div class="loader"><div class="spinner"></div>pulling your listening data…</div>`;
  try {
    const safe = p => p.catch(() => ({ items: [] }));
    const [me, recent, tS, tM, tL, aS, aM, aL] = await Promise.all([
      api("/me"),
      safe(api("/me/player/recently-played?limit=50")),
      safe(api("/me/top/tracks?time_range=short_term&limit=50")),
      safe(api("/me/top/tracks?time_range=medium_term&limit=50")),
      safe(api("/me/top/tracks?time_range=long_term&limit=50")),
      safe(api("/me/top/artists?time_range=short_term&limit=50")),
      safe(api("/me/top/artists?time_range=medium_term&limit=50")),
      safe(api("/me/top/artists?time_range=long_term&limit=50")),
    ]);
    DATA = {
      me,
      recent,
      topTracks: { short_term: tS, medium_term: tM, long_term: tL },
      topArtists: { short_term: aS, medium_term: aM, long_term: aL },
    };
    renderShell();
  } catch (e) {
    if (e.message !== "expired") renderLogin();
  }
}

/* ---------- derived numbers ---------- */
function analysisPool() {
  const t = DATA.topTracks;
  return (t.medium_term?.items?.length ? t.medium_term.items : (t.short_term?.items?.length ? t.short_term.items : (t.long_term?.items || [])));
}
function statObscurity() {
  const pool = analysisPool();
  if (!pool.length) return "—";
  const avg = pool.reduce((s, t) => s + (t.popularity || 0), 0) / pool.length;
  return Math.round(100 - avg);
}
function statAvgYear() {
  const years = analysisPool().map(t => parseInt((t.album?.release_date || "").slice(0, 4))).filter(Boolean);
  return years.length ? Math.round(years.reduce((s, y) => s + y, 0) / years.length) : "—";
}
function statExplicit() {
  const pool = analysisPool();
  return pool.length ? Math.round(100 * pool.filter(t => t.explicit).length / pool.length) : 0;
}
function topGenres(limit = 6) {
  const arts = DATA.topArtists.medium_term?.items?.length ? DATA.topArtists.medium_term.items : (DATA.topArtists.short_term?.items || []);
  const counts = {};
  arts.forEach(a => (a.genres || []).forEach(g => { counts[g] = (counts[g] || 0) + 1; }));
  return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, limit);
}
function peakHour() {
  const items = DATA.recent?.items || [];
  if (!items.length) return null;
  const hours = new Array(24).fill(0);
  items.forEach(i => hours[new Date(i.played_at).getHours()]++);
  const max = Math.max(...hours);
  const h = hours.indexOf(max);
  return h === 0 ? "12am" : h === 12 ? "12pm" : h > 12 ? (h - 12) + "pm" : h + "am";
}

function chartRecentDays() {
  const items = DATA.recent?.items || [];
  if (!items.length) return `<div class="empty-note">Play some music and check back — Spotify only shares your most recent plays.</div>`;
  const days = [...Array(7)].map((_, i) => {
    const d = new Date(); d.setHours(0, 0, 0, 0); d.setDate(d.getDate() - 6 + i);
    return d;
  });
  const counts = days.map(d => items.filter(it => {
    const p = new Date(it.played_at);
    return p.getFullYear() === d.getFullYear() && p.getMonth() === d.getMonth() && p.getDate() === d.getDate();
  }).length);
  const max = Math.max(...counts, 1);
  return `
    <div class="bars">${counts.map(c => `
      <div class="bar-col"><span class="bar-val">${c || ""}</span><div class="bar ${c ? "on" : ""}" style="height:${Math.max(c / max * 100, 3)}%"></div></div>`).join("")}
    </div>
    <div class="bar-labels">${days.map(d => `<span>${d.toLocaleDateString("en-US", { weekday: "short" }).toLowerCase()}</span>`).join("")}</div>`;
}

function chartClock() {
  const items = DATA.recent?.items || [];
  if (!items.length) return `<div class="empty-note">No recent plays to map yet.</div>`;
  const hours = new Array(24).fill(0);
  items.forEach(i => hours[new Date(i.played_at).getHours()]++);
  const max = Math.max(...hours, 1);
  return `
    <div class="bars" style="gap:3px;">${hours.map(h => `
      <div class="bar-col"><div class="bar ${h ? "on" : ""}" style="height:${Math.max(h / max * 100, 3)}%"></div></div>`).join("")}
    </div>
    <div class="bar-labels" style="gap:3px;">${hours.map((_, i) => `<span>${i % 6 === 0 ? (i === 0 ? "12am" : i === 12 ? "12pm" : i > 12 ? (i - 12) + "pm" : i + "am") : ""}</span>`).join("")}</div>`;
}

function chartDecades() {
  const pool = analysisPool();
  const counts = {};
  pool.forEach(t => {
    const y = parseInt((t.album?.release_date || "").slice(0, 4));
    if (!y) return;
    const dec = Math.floor(y / 10) * 10;
    counts[dec] = (counts[dec] || 0) + 1;
  });
  const rows = Object.entries(counts).sort((a, b) => a[0] - b[0]);
  const total = rows.reduce((s, [, v]) => s + v, 0) || 1;
  if (!rows.length) return { donut: `<div class="empty-note">Not enough data yet.</div>`, legend: "" };

  let svg = `<svg viewBox="0 0 200 200" width="150" height="150" style="transform: rotate(-90deg);" aria-hidden="true">`;
  let angle = 0;
  rows.forEach(([dec, count], i) => {
    const slice = (count / total) * 360;
    if (rows.length === 1) {
      svg += `<circle cx="100" cy="100" r="85" fill="${PALETTE[i % PALETTE.length]}"/>`;
      angle += slice;
      return;
    }
    const x1 = 100 + 85 * Math.cos(angle * Math.PI / 180);
    const y1 = 100 + 85 * Math.sin(angle * Math.PI / 180);
    angle += slice;
    const x2 = 100 + 85 * Math.cos(angle * Math.PI / 180);
    const y2 = 100 + 85 * Math.sin(angle * Math.PI / 180);
    svg += `<path d="M 100 100 L ${x1} ${y1} A 85 85 0 ${slice > 180 ? 1 : 0} 1 ${x2} ${y2} Z" fill="${PALETTE[i % PALETTE.length]}" stroke="#FFFFFF" stroke-width="2.5"/>`;
  });
  svg += `<circle cx="100" cy="100" r="50" fill="#FFFFFF"/></svg><span class="donut-lbl">eras</span>`;
  const legend = rows.map(([dec, count], i) =>
    `<div class="legend-item"><span class="dot" style="background:${PALETTE[i % PALETTE.length]}"></span>${dec}s<span class="l-val">${Math.round(count / total * 100)}%</span></div>`).join("");
  return { donut: svg, legend };
}

function createCustomPlaylist() {
  createPlaylist({
    name: document.getElementById("plName").value.trim() || "my spotify.ai mix",
    desc: document.getElementById("plDesc").value.trim() || "made with spotify.ai",
    range: document.getElementById("plRange").value,
    count: parseInt(document.getElementById("plCount").value),

async function createPlaylist(opts) {
  try {
    if (!DATA.me?.id) { toast("Reconnect your account to create playlists."); return; }
    const pool = DATA.topTracks[opts.range]?.items || [];
    let tracks = opts.filterBefore
      ? pool.filter(t => { const y = parseInt((t.album?.release_date || "").slice(0, 4)); return y && y < opts.filterBefore; })
      : pool.slice();
    if (tracks.length < 3) { toast(opts.filterBefore ? "Not enough older songs in your charts for that one." : "Not enough listening history for that window yet."); return; }
    if (opts.shuffle) shuffleArr(tracks);
    tracks = tracks.slice(0, opts.count);
    toast("Creating your playlist…");
    const pl = await api(`/users/${DATA.me.id}/playlists`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: opts.name, description: opts.desc || "made with spotify.ai", public: !!opts.isPublic }),
    });
    if (!pl?.id) { toast("Spotify didn't accept that. Try disconnecting and reconnecting."); return; }
    await api(`/playlists/${pl.id}/tracks`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ uris: tracks.map(t => t.uri) }),
    });
    state.lastPlaylist = { name: opts.name, url: pl.external_urls?.spotify, count: tracks.length };
    toast(`"${opts.name}" is in your library.`);
    const target = document.getElementById("playlistResult");
    if (target) target.innerHTML = playlistResultChip();
  } catch (e) {
    if (e.message !== "expired") toast("Something went wrong creating the playlist. Try again.");
  }
}

    ink: "#F4F6FA", muted: "#B7BECD", faint: "#6C7688", divider: "rgba(255,255,255,0.07)",
    orbs: [
      { x: 0.1, y: 0.02, r: 0.55, color: "rgba(29,185,84,0.20)" },
      { x: 0.95, y: 0.1, r: 0.5, color: "rgba(20,115,230,0.18)" },
      { x: 0.9, y: 0.95, r: 0.55, color: "rgba(122,92,255,0.18)" },
      { x: 0.05, y: 0.9, r: 0.5, color: "rgba(255,102,178,0.14)" },
    ],
  },
};

function viewStory() {
  return `
    <div class="glass pane">
      <div class="kicker">made for sharing</div>
      <h2>Story cards, <em>ready to post</em></h2>
      <div class="sub">A 1080×1920 image sized for Instagram and TikTok stories. Pick a look, hit download, post it.</div>
      <div class="story-split">
        <div class="stack" style="gap:18px;">
          <div class="opt-group">
            <label class="caption" style="letter-spacing:0.08em; text-transform:uppercase;">what to show</label>
            <div class="pills">
              <button class="pill" aria-pressed="${state.storyTemplate === "tracks"}" onclick="setStoryOpt('storyTemplate','tracks')">top tracks</button>
              <button class="pill" aria-pressed="${state.storyTemplate === "artists"}" onclick="setStoryOpt('storyTemplate','artists')">top artists</button>
            </div>
          </div>
          <div class="opt-group">
            <label class="caption" style="letter-spacing:0.08em; text-transform:uppercase;">time window</label>
            <div class="pills">
              ${["short_term", "medium_term", "long_term"].map(r => `<button class="pill" aria-pressed="${state.storyRange === r}" onclick="setStoryOpt('storyRange','${r}')">${RANGE_LABEL[r]}</button>`).join("")}
            </div>
          </div>
          <div class="opt-group">
            <label class="caption" style="letter-spacing:0.08em; text-transform:uppercase;">look</label>
            <div class="pills">
              <button class="pill" aria-pressed="${state.storyTheme === "glass"}" onclick="setStoryOpt('storyTheme','glass')">glass</button>
              <button class="pill" aria-pressed="${state.storyTheme === "ink"}" onclick="setStoryOpt('storyTheme','ink')">ink</button>
            </div>
          </div>
          <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:6px;">
            <button class="btn btn-green" onclick="downloadStory()">download png</button>
          </div>
          <div class="caption">tip: post it and tag the artist — they might repost you</div>
        </div>
        <div class="story-preview-frame">
          <canvas id="storyCanvas" width="1080" height="1920" aria-label="Story card preview"></canvas>
        </div>
      </div>
    </div>`;
}
function setStoryOpt(key, val) { state[key] = val; setTab("story"); }

function loadImg(url) {
  return new Promise(res => {
    if (!url) return res(null);
    const im = new Image();
    im.crossOrigin = "anonymous";
    im.onload = () => res(im);
    im.onerror = () => res(null);
    im.src = url;
  });
}
function rr(c, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

async function renderStoryCard() {
  const cv = document.getElementById("storyCanvas");
  if (!cv) return;
  const ctx = cv.getContext("2d");
  const W = 1080, H = 1920;
  const theme = STORY_THEMES[state.storyTheme];
  const isTracks = state.storyTemplate === "tracks";
  const pool = isTracks
    ? (DATA.topTracks[state.storyRange]?.items || [])
    : (DATA.topArtists[state.storyRange]?.items || []);
  const items = pool.slice(0, 5);

  try {
    await Promise.all([
      document.fonts.load('900 96px Archivo'),
      document.fonts.load('800 44px Archivo'),
      document.fonts.load('500 30px Archivo'),
      document.fonts.load('italic 400 96px "Instrument Serif"'),
      document.fonts.load('600 26px "IBM Plex Mono"'),
    ]);
  } catch (e) { /* draw with fallbacks */ }

  /* background + orbs */
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = theme.bg;
  ctx.fillRect(0, 0, W, H);
  theme.orbs.forEach(o => {
    const g = ctx.createRadialGradient(o.x * W, o.y * H, 0, o.x * W, o.y * H, o.r * W);
    g.addColorStop(0, o.color);
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  });

  /* glass card */
  const cx = 70, cy = 200, cw = W - 140, ch = 1520;
  ctx.save();
  ctx.shadowColor = "rgba(20,26,40,0.18)";
  ctx.shadowBlur = 70;
  ctx.shadowOffsetY = 26;
  rr(ctx, cx, cy, cw, ch, 56);
  ctx.fillStyle = theme.card;
  ctx.fill();
  ctx.restore();
  rr(ctx, cx, cy, cw, ch, 56);
  ctx.strokeStyle = theme.cardStroke;
  ctx.lineWidth = 2;
  ctx.stroke();

  /* header */
  const rangeText = RANGE_LABEL[state.storyRange].toUpperCase();
  ctx.textBaseline = "alphabetic";
  ctx.textAlign = "left";
  try { ctx.letterSpacing = "6px"; } catch (e) {}
  ctx.font = '600 25px "IBM Plex Mono", monospace';
  ctx.fillStyle = "#1DB954";
  ctx.fillText("SPOTIFY.AI  ·  " + rangeText, cx + 74, cy + 118);
  try { ctx.letterSpacing = "0px"; } catch (e) {}

  const word1 = isTracks ? "on" : "heavy";
  const word2 = isTracks ? "repeat" : "rotation";
  ctx.font = "900 104px Archivo, sans-serif";
  ctx.fillStyle = theme.ink;
  ctx.fillText(word1, cx + 70, cy + 246);
  const w1 = ctx.measureText(word1).width;
  ctx.font = 'italic 400 104px "Instrument Serif", serif';
  ctx.fillText(" " + word2, cx + 70 + w1, cy + 246);
  const w2 = ctx.measureText(" " + word2).width;
  ctx.font = "900 104px Archivo, sans-serif";
  ctx.fillStyle = "#1DB954";
  ctx.fillText(".", cx + 70 + w1 + w2, cy + 246);

  ctx.font = "500 30px Archivo, sans-serif";
  ctx.fillStyle = theme.muted;
  ctx.fillText(isTracks ? "my top 5 tracks right now" : "my top 5 artists right now", cx + 74, cy + 306);

  /* rows */
  const rowsTop = cy + 380;
  const rowH = 200;
  const artSize = 144;
  const imgs = await Promise.all(items.map(it => {
    const url = isTracks
      ? (it.album?.images?.[0]?.url || it.album?.images?.[1]?.url)
      : (it.images?.[0]?.url || it.images?.[1]?.url);
    return loadImg(url);
  }));

  if (!items.length) {
    ctx.font = "500 34px Archivo, sans-serif";
    ctx.fillStyle = theme.faint;
    ctx.fillText("not enough listening history for this window yet", cx + 74, rowsTop + 60);
  }

  items.forEach((it, i) => {
    const ry = rowsTop + i * rowH;
    const artX = cx + 70, artY = ry;

    /* divider */
    if (i > 0) {
      ctx.strokeStyle = theme.divider;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx + 70, ry - 28);
      ctx.lineTo(cx + cw - 70, ry - 28);
      ctx.stroke();
    }

    /* artwork (rounded / circular for artists) */
    ctx.save();
    if (isTracks) { rr(ctx, artX, artY, artSize, artSize, 26); }
    else { ctx.beginPath(); ctx.arc(artX + artSize / 2, artY + artSize / 2, artSize / 2, 0, Math.PI * 2); }
    ctx.clip();
    if (imgs[i]) {
      ctx.drawImage(imgs[i], artX, artY, artSize, artSize);
    } else {
      ctx.fillStyle = PALETTE[i % PALETTE.length];
      ctx.fillRect(artX, artY, artSize, artSize);
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.font = "800 64px Archivo, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText((it.name || "?")[0].toUpperCase(), artX + artSize / 2, artY + artSize / 2 + 22);
      ctx.textAlign = "left";
    }
    ctx.restore();

    /* text */
    const textX = artX + artSize + 44;
    const maxTextW = cx + cw - 70 - textX - 90;
    const name = it.name || "";
    const subLine = isTracks
      ? (it.artists || []).map(a => a.name).join(", ")
      : ((it.genres || [])[0] || "");
    ctx.font = "800 44px Archivo, sans-serif";
    ctx.fillStyle = theme.ink;
    ctx.fillText(clipText(ctx, name, maxTextW), textX, ry + 68);
    ctx.font = "500 32px Archivo, sans-serif";
    ctx.fillStyle = theme.muted;
    ctx.fillText(clipText(ctx, subLine, maxTextW), textX, ry + 116);

    /* rank */
    ctx.font = '600 30px "IBM Plex Mono", monospace';
    ctx.fillStyle = i === 0 ? "#1DB954" : theme.faint;
    ctx.textAlign = "right";
    ctx.fillText(String(i + 1).padStart(2, "0"), cx + cw - 74, ry + 92);
    ctx.textAlign = "left";
  });

  /* card footer */
  const user = (DATA.me?.display_name || "me").toLowerCase();
  const dateStr = new Date().toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" }).toLowerCase();
  ctx.font = '500 26px "IBM Plex Mono", monospace';
  ctx.fillStyle = theme.faint;
  ctx.fillText("@" + user, cx + 74, cy + ch - 66);
  ctx.textAlign = "right";
  ctx.fillText(dateStr, cx + cw - 74, cy + ch - 66);
  ctx.textAlign = "left";

  /* page footer */
  ctx.textAlign = "center";
  ctx.font = '600 26px "IBM Plex Mono", monospace';
  ctx.fillStyle = theme.faint;
  ctx.fillText("spotify.ai", W / 2, cy + ch + 92);
  ctx.textAlign = "left";
}

function clipText(ctx, text, maxW) {
  if (ctx.measureText(text).width <= maxW) return text;
  let t = text;
  while (t.length > 1 && ctx.measureText(t + "…").width > maxW) t = t.slice(0, -1);
  return t + "…";
}

function downloadStory() {
  const cv = document.getElementById("storyCanvas");
  if (!cv) return;
  try {
    const a = document.createElement("a");
    a.download = `spotify-ai-${state.storyTemplate}-${state.storyRange}.png`;
    a.href = cv.toDataURL("image/png");
    a.click();
    toast("Story card downloaded.");
  } catch (e) {
    toast("Couldn't export the image — some album art blocked it. Try a different time window.");
  }
}

(async function boot() {
  const params = new URLSearchParams(location.search);
  if (params.get("code")) {
    await exchangeToken(params.get("code"));
    history.replaceState({}, "", REDIRECT);
  }
  if (store.get("token") && Date.now() < +(store.get("token_expiry") || 0)) {
    await loadData();
  } else {
    renderLogin();
  }
})();
