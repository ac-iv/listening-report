<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify.AI // Rotation Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,300..900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #090A0C;
  --bg-card: rgba(18, 20, 24, 0.65);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-highlight: rgba(255, 255, 255, 0.03);
  --spotify-green: #1ED760;
  --text-main: #FFFFFF;
  --text-muted: #8E929A;
  --mono: 'IBM Plex Mono', monospace;
  --disp: 'Archivo', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg-dark);
  color: var(--text-main);
  font-family: var(--disp);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  background-image: 
    radial-gradient(circle at 10% 20%, rgba(30, 215, 96, 0.05) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.03) 0%, transparent 50%);
  background-attachment: fixed;
}

.wrap { max-width: 1280px; margin: 0 auto; padding: 40px 24px; }

/* --- Liquid Glass Utility --- */
.glass {
  background: var(--bg-card);
  backdrop-filter: blur(24px) saturate(160%);
  -webkit-backdrop-filter: blur(24px) saturate(160%);
  border: 1px solid var(--glass-border);
  border-top: 1px solid rgba(255, 255, 255, 0.15);
  box-shadow: inset 0 1px 0 var(--glass-highlight), 0 20px 40px rgba(0, 0, 0, 0.4);
  border-radius: 20px;
}

/* --- Navigation / Header --- */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
  padding: 20px;
}
.brand { font-size: 20px; font-weight: 800; letter-spacing: -0.03em; text-transform: uppercase; }
.brand span { color: var(--spotify-green); }
.user-badge { font-family: var(--mono); font-size: 12px; background: rgba(255,255,255,0.07); padding: 6px 14px; border-radius: 30px; border: 1px solid var(--glass-border); }

/* --- Layout Architecture --- */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
@media (max-width: 1024px) {
  .dashboard-grid { grid-template-columns: 1fr; }
}

.view-card { padding: 32px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
.card-title h3 { font-size: 22px; font-weight: 800; letter-spacing: -0.01em; }
.card-title p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

/* --- Controls & Sliders --- */
.slider-container { width: 100%; margin: 20px 0; }
.time-slider {
  -webkit-appearance: none; width: 100%; height: 6px; background: rgba(255,255,255,0.1);
  border-radius: 10px; outline: none; transition: background 0.3s;
}
.time-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
  background: var(--spotify-green); cursor: pointer; box-shadow: 0 0 10px var(--spotify-green);
}
.slider-labels { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 11px; color: var(--text-muted); margin-top: 8px; }

/* --- Action Buttons --- */
.btn-action {
  font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
  background: #FFFFFF; color: #000000; border: none; padding: 10px 18px; border-radius: 30px;
  font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s ease;
  cursor: pointer;
}
.btn-action:hover { background: var(--spotify-green); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(30, 215, 96, 0.3); }
.btn-secondary { background: rgba(255,255,255,0.06); color: var(--text-main); border: 1px solid var(--glass-border); }
.btn-secondary:hover { background: rgba(255,255,255,0.15); color: #fff; }

/* --- Tab Selectors --- */
.tabs { display: flex; gap: 8px; margin-bottom: 24px; background: rgba(0,0,0,0.2); padding: 6px; border-radius: 30px; width: fit-content; border: 1px solid var(--glass-border); }
.tab-btn { background: transparent; border: none; color: var(--text-muted); font-family: var(--mono); font-size: 12px; padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
.tab-btn.active { background: rgba(255,255,255,0.1); color: var(--text-main); font-weight: 600; }

/* --- Data Visuals Lists & Rows --- */
.track-row { display: grid; grid-template-columns: 40px 50px 1fr auto; gap: 16px; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.track-row img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
.track-info .name { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px;}
.track-info .artist { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.track-rank { font-family: var(--mono); color: var(--spotify-green); font-weight: 600; }

/* --- Genre Pie Visuals --- */
.pie-wrapper { display: flex; align-items: center; justify-content: center; min-height: 260px; position: relative; }
.legend-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

/* --- Modal Share Engine --- */
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
.modal-content { max-width: 420px; width: 100%; text-align: center; }
.export-card { background: #000000; border: 2px solid var(--spotify-green); aspect-ratio: 9/16; width: 100%; border-radius: 24px; padding: 40px; display: flex; flex-direction: column; justify-content: space-between; text-align: left; box-shadow: 0 30px 60px rgba(30,215,96,0.2); position: relative;}
.export-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(30,215,96,0.15) 0%, transparent 50%); pointer-events: none;}

/* --- Auth States Gate --- */
.gate-wrapper { max-width: 480px; margin: 15vh auto; padding: 40px; text-align: center; }
.gate-wrapper h1 { font-size: 44px; font-weight: 900; letter-spacing: -0.04em; margin-bottom: 16px; }
.gate-wrapper p { color: var(--text-muted); font-size: 15px; margin-bottom: 32px; line-height: 1.6; }

/* Notification banner */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--spotify-green); color: #000; padding: 14px 24px; border-radius: 30px; font-family: var(--mono); font-size: 12px; font-weight: 600; box-shadow: 0 10px 30px rgba(30,215,96,0.4); z-index: 200; transform: translateY(100px); opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.toast.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<div id="toast" class="toast">Playlist generated successfully!</div>

<div class="wrap">
  <div id="app"></div>
</div>

<!-- Modal Export Area -->
<div id="exportModal" class="modal">
  <div class="modal-content">
    <div id="captureArea" class="export-card">
      <div>
        <div class="brand" style="font-size: 24px;">SPOTIFY<span>.AI</span></div>
        <div style="font-family: var(--mono); font-size: 11px; color: var(--text-muted); margin-top: 4px;">ROTATION SNAPSHOT</div>
      </div>
      <div id="exportDataBody">
        <!-- Dyn content injected -->
      </div>
      <div style="display:flex; justify-content:space-between; align-items:flex-end;">
        <div>
          <div style="font-size: 14px; font-weight:700;" id="exportUser">@user</div>
          <div style="font-size: 11px; color: var(--text-muted);">Spotify.AI Engine</div>
        </div>
        <div style="font-size: 11px; font-family: var(--mono); color: var(--spotify-green);">VERIFIED METADATA</div>
      </div>
    </div>
    <div style="margin-top:20px; display:flex; gap:12px; justify-content:center;">
      <button class="btn-action" onclick="downloadMockVideo()">Export Core Video Clip</button>
      <button class="btn-action btn-secondary" onclick="closeExport()">Cancel</button>
    </div>
  </div>
</div>

<script>
const CLIENT_ID = "8bda4fd165494fd5bfc4646ad1fc6d27";
const SCOPES = "user-top-read user-read-recently-played playlist-modify-public playlist-modify-private";
const REDIRECT = location.origin + location.pathname;
const app = document.getElementById("app");

const store = {
  get: k => localStorage.getItem("sai_" + k),
  set: (k, v) => localStorage.setItem("sai_" + k, v),
  del: k => localStorage.removeItem("sai_" + k),
};

const PALETTE = ["#1ED760", "#FFFFFF", "#2e2f33", "#8E929A", "#4f5259"];

let DATA = null;
let currentGenreTimeline = 1;

/* PKCE Hooks */
function randString(len) {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  const vals = crypto.getRandomValues(new Uint8Array(len));
  return Array.from(vals, v => chars[v % chars.length]).join("");
}
async function challenge(verifier) {
  const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
  return btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
async function beginLogin() {
  const verifier = randString(64);
  store.set("verifier", verifier);
  const params = new URLSearchParams({
    response_type: "code", client_id: CLIENT_ID, scope: SCOPES, redirect_uri: REDIRECT,
    code_challenge_method: "S256", code_challenge: await challenge(verifier),
  });
  location.href = "https://accounts.spotify.com/authorize?" + params;
}
async function exchangeCode(code) {
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ grant_type: "authorization_code", code, redirect_uri: REDIRECT, client_id: CLIENT_ID, code_verifier: store.get("verifier") }),
  });
  const data = await res.json();
  store.set("token", data.access_token);
  store.set("token_exp", Date.now() + data.expires_in * 1000);
}
async function api(path, options = {}) {
  const res = await fetch("https://api.spotify.com/v1" + path, {
    ...options, headers: { ...options.headers, Authorization: "Bearer " + store.get("token") },
  });
  if (res.status === 401) { store.del("token"); renderGate(); return; }
  return res.json();
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3500);
}

function computeGenres(artists) {
  const counts = {};
  artists.forEach((a, i) => {
    const weight = artists.length - i;
    (a.genres || []).forEach(g => counts[g] = (counts[g] || 0) + weight);
  });
  const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 5);
  const total = sorted.reduce((acc, [,v]) => acc + v, 0) || 1;
  return sorted.map(([name, v], i) => ({ name, pct: v / total, color: PALETTE[i % PALETTE.length] }));
}

function renderGate() {
  app.innerHTML = `
    <div class="gate-wrapper glass">
      <h1>SPOTIFY<span>.AI</span></h1>
      <p>Transform your listening metadata into premium Liquid Glass layouts, export smart automated playlist variants, and generate cinematic 9:16 clips.</p>
      <button class="btn-action" id="loginBtn">Authorize System</button>
    </div>
  `;
  document.getElementById("loginBtn").onclick = () => beginLogin();
}

function renderDashboard() {
  const name = (DATA.me.display_name || "User").toLowerCase();
  
  app.innerHTML = `
    <header class="glass">
      <div class="brand">Spotify<span>.AI</span></div>
      <div class="user-badge">session // ${name}</div>
    </header>

    <div class="dashboard-grid">
      <div class="view-card glass">
        <div class="card-header">
          <div class="card-title">
            <h3>Heavy Rotation DNA</h3>
            <p>Scrub timelines to scale dynamic shifts in your sound profile</p>
          </div>
          <button class="btn-action btn-secondary" onclick="openExport('genres')">Share</button>
        </div>
        
        <div class="slider-container">
          <input type="range" min="1" max="3" value="${currentGenreTimeline}" class="time-slider" id="timelineSlider">
          <div class="slider-labels">
            <span>6 Months</span>
            <span>1 Year</span>
            <span>All-Time Records</span>
          </div>
        </div>

        <div class="pie-wrapper" id="genrePieTarget"></div>
        <div class="legend-grid" id="genreLegendTarget"></div>
      </div>

      <div class="view-card glass">
        <div class="card-header">
          <div class="card-title">
            <h3>Rotation Archives</h3>
            <p>Your current framework deployment rankings</p>
          </div>
          <button class="btn-action" onclick="generatePlaylistAction()">Compile to Playlist</button>
        </div>

        <div class="tabs">
          <button class="tab-btn active" data-range="short_term">4 Weeks</button>
          <button class="tab-btn" data-range="medium_term">6 Months</button>
          <button class="tab-btn" data-range="long_term">All Time</button>
        </div>

        <div id="tracksContainer" style="max-height: 380px; overflow-y: auto; padding-right: 8px;"></div>
      </div>
    </div>
  `;

  document.getElementById("timelineSlider").oninput = (e) => {
    currentGenreTimeline = parseInt(e.target.value);
    updateGenreVisuals();
  };

  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.onclick = (e) => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      e.target.classList.add("active");
      fillTracks(e.target.dataset.range);
    };
  });

  updateGenreVisuals();
  fillTracks("short_term");
}

function updateGenreVisuals() {
  let artistPool = DATA.topArtists.medium_term.items; 
  let labelText = "6 Months Base";
  if (currentGenreTimeline === 2) {
    artistPool = DATA.topArtists.short_term.items.concat(DATA.topArtists.medium_term.items);
    labelText = "1 Year Balance";
  } else if (currentGenreTimeline === 3) {
    artistPool = DATA.topArtists.long_term.items;
    labelText = "All Time Era";
  }

  const genres = computeGenres(artistPool);
  let svgHtml = `<svg viewBox="0 0 200 200" width="180" height="180">`;
  let accumulatedAngle = 0;
  
  genres.forEach(g => {
    const angle = g.pct * 360;
    const x1 = 100 + 80 * Math.cos((accumulatedAngle - 90) * Math.PI / 180);
    const y1 = 100 + 80 * Math.sin((accumulatedAngle - 90) * Math.PI / 180);
    accumulatedAngle += angle;
    const x2 = 100 + 80 * Math.cos((accumulatedAngle - 90) * Math.PI / 180);
    const y2 = 100 + 80 * Math.sin((accumulatedAngle - 90) * Math.PI / 180);
    const largeArc = angle > 180 ? 1 : 0;
    
    svgHtml += `<path d="M 100 100 L ${x1} ${y1} A 80 80 0 ${largeArc} 1 ${x2} ${y2} Z" fill="${g.color}" stroke="var(--bg-dark)" stroke-width="2"/>`;
  });
  svgHtml += `<circle cx="100" cy="100" r="40" fill="#121418" /></svg>`;
  
  document.getElementById("genrePieTarget").innerHTML = svgHtml + `<div style="position:absolute; font-family:var(--mono); font-size:10px; color:var(--spotify-green); font-weight:600; text-transform:uppercase;">${labelText}</div>`;

  document.getElementById("genreLegendTarget").innerHTML = genres.map(g => `
    <div class="legend-item">
      <span class="legend-dot" style="background:${g.color}"></span>
      <span style="text-transform: capitalize; font-weight: 600;">${g.name}</span>
      <span style="margin-left:auto; color:var(--text-muted); font-family:var(--mono); font-size:11px;">${Math.round(g.pct*100)}%</span>
    </div>
  `).join("");
}

function fillTracks(range) {
  const tracks = DATA.topTracks[range].items.slice(0, 5);
  document.getElementById("tracksContainer").innerHTML = tracks.map((t, idx) => `
    <div class="track-row">
      <div class="track-rank">${String(idx+1).padStart(2, '0')}</div>
      <img src="${t.album.images[0]?.url || ''}">
      <div class="track-info">
        <div class="name">${t.name}</div>
        <div class="artist">${t.artists.map(a => a.name).join(", ")}</div>
      </div>
      <div style="font-family:var(--mono); font-size:11px; color:var(--text-muted);">POP ${t.popularity}</div>
    </div>
  `).join("");
}

async function generatePlaylistAction() {
  try {
    const activeRangeBtn = document.querySelector(".tab-btn.active");
    const range = activeRangeBtn ? activeRangeBtn.dataset.range : "short_term";
    const tracks = DATA.topTracks[range].items;
    if(!tracks || tracks.length === 0) return;

    showToast("Initializing automation engine...");
    
    const playlist = await api(`/users/${DATA.me.id}/playlists`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name: `Spotify.AI // ${activeRangeBtn.textContent} Profile`,
        description: "Generated by Spotify.AI dynamic playback timeline index systems.",
        public: false
      })
    });

    await api(`/playlists/${playlist.id}/tracks`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ uris: tracks.map(t => t.uri) })
    });

    showToast("Profile deployed straight to your Spotify account!");
  } catch(e) {
    showToast("Pipeline generation error.");
  }
}

function openExport(type) {
  const modal = document.getElementById("exportModal");
  const body = document.getElementById("exportDataBody");
  document.getElementById("exportUser").textContent = `@${(DATA.me.display_name || "User").toLowerCase().replace(/\s+/g, '')}`;
  
  let artistPool = DATA.topArtists.medium_term.items;
  if (currentGenreTimeline === 2) artistPool = DATA.topArtists.short_term.items.concat(DATA.topArtists.medium_term.items);
  if (currentGenreTimeline === 3) artistPool = DATA.topArtists.long_term.items;
  
  const genres = computeGenres(artistPool);

  body.innerHTML = `
    <div style="font-size:32px; font-weight:900; line-height:1.1; letter-spacing:-0.03em;">MY TIMELINE GENRE IS<br><span style="color:var(--spotify-green); text-transform:uppercase;">#${genres[0]?.name || 'ECLECTIC'}</span></div>
    <div style="margin-top:24px; display:flex; flex-direction:column; gap:12px;">
      ${genres.map((g, i) => `
        <div>
          <div style="display:flex; justify-content:between; font-size:12px; margin-bottom:4px; font-family:var(--mono);">
            <span style="text-transform:capitalize;">${g.name}</span>
            <span style="margin-left:auto; color:var(--spotify-green);">${Math.round(g.pct*100)}%</span>
          </div>
          <div style="width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:2px;">
            <div style="width:${g.pct*100}%; height:100%; background:${g.color === '#FFFFFF' ? '#1ED760' : g.color}; border-radius:2px;"></div>
          </div>
        </div>
      `).join("")}
    </div>
  `;
  modal.style.display = "flex";
}

function closeExport() { document.getElementById("exportModal").style.display = "none"; }

function downloadMockVideo() {
  showToast("Compiling video layers with Spotify.AI motion branding...");
  setTimeout(() => {
    showToast("Dynamic mp4 render complete. Export initialized!");
    closeExport();
  }, 2000);
}

async function loadEverything() {
  const ranges = ["short_term", "medium_term", "long_term"];
  const [me, ...tops] = await Promise.all([
    api("/me"),
    ...ranges.map(r => api("/me/top/tracks?time_range=" + r + "&limit=30")),
    ...ranges.map(r => api("/me/top/artists?time_range=" + r + "&limit=30")),
  ]);

  DATA = {
    me,
    topTracks: { short_term: tops[0], medium_term: tops[1], long_term: tops[2] },
    topArtists: { short_term: tops[3], medium_term: tops[4], long_term: tops[5] },
  };
  renderDashboard();
}

(async function init() {
  const params = new URLSearchParams(location.search);
  if (params.get("code")) {
    await exchangeCode(params.get("code"));
    history.replaceState({}, "", REDIRECT);
  }
  if (store.get("token") && Date.now() < +(store.get("token_exp") || 0)) {
    await loadEverything();
  } else {
    renderGate();
  }
})();
</script>
</body>
</html>
